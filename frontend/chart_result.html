<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0;url=/chart">
    <title>重定向中...</title>
</head>
<body>
    <p>正在跳转到排盘页面... <a href="/chart">点击此处手动跳转</a></p>
    <script>
        // Preserve query parameters when redirecting
        const params = window.location.search;
        window.location.replace('/chart' + params);
    </script>
</body>
</html>
