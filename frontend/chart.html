<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 - 命盘展示</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .chart-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .chart-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .chart-section h3 {
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }
        .mini-pillar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .mini-pillar-item {
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .mini-pillar-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .mini-pillar-gan {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
        }
        .mini-pillar-zhi {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        .info-line {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .info-line .label {
            color: var(--accent-gold);
        }
        .planet-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.3rem;
            font-size: 0.8rem;
        }
        .planet-mini-item {
            background: var(--bg-card);
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
        }
        .gua-info {
            text-align: center;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 8px;
        }
        .gua-name {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }
        .dong-yao {
            color: var(--text-primary);
        }
        .qimen-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.3rem;
            font-size: 0.75rem;
        }
        .qimen-mini-cell {
            background: var(--bg-card);
            padding: 0.4rem;
            border-radius: 4px;
            text-align: center;
        }
        .qimen-mini-gong {
            color: var(--text-muted);
            font-size: 0.65rem;
        }
        .qimen-mini-gan {
            color: var(--accent-gold);
            font-weight: bold;
        }
        .qimen-mini-men {
            color: var(--text-primary);
        }
        .liuren-ke {
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .liuren-ke-item {
            background: var(--bg-card);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
        }
        .taiyi-info {
            text-align: center;
            padding: 1rem;
        }
        .taiyi-gong {
            font-size: 1.5rem;
            color: var(--accent-gold);
        }
        .qa-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        .qa-section h3 {
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }
        .qa-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .qa-input input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: inherit;
        }
        .qa-result {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }
        .qa-result.active {
            display: block;
        }
        .qa-answer {
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .qa-confidence {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 1rem;
        }
        .qa-keypoints {
            margin-top: 1rem;
        }
        .qa-keypoint {
            background: rgba(212, 165, 116, 0.1);
            border-left: 3px solid var(--accent-gold);
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 0 4px 4px 0;
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent-gold);
        }
        @media (max-width: 1024px) {
            .chart-layout {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">跳过导航</a>

    <nav class="nav" class="nav-sticky" aria-label="主导航">
        <a href="/" class="nav-brand">玄照 <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/">排盘</a>
            <a href="/perspectives" aria-label="108视角分析">108视角</a>
            <a href="/debate" aria-label="辩论台">辩论台</a>
        </div>
    </nav>

    <div class="container" id="main-content">
        <a href="/" class="back-link">&larr; 返回输入</a>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>正在排盘，请稍候...</p>
        </div>

        <div id="error" class="error-message" style="display:none;"></div>

        <div id="chartContent">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <div id="engineStatus" style="display:flex;flex-wrap:wrap;gap:0.3rem;"></div>
                <div>
                    <button class="btn btn-primary" onclick="window.print()" style="font-size:0.8rem;padding:0.3rem 0.8rem;">🖨️ 打印</button>
                    <button class="btn btn-primary" onclick="shareChart()" style="font-size:0.8rem;padding:0.3rem 0.8rem;margin-left:0.3rem;">📤 分享</button>
                </div>
            </div>
            <div class="chart-layout" id="chartLayout"></div>

            <!-- 问答 -->
            <div class="qa-section" id="qaSection" style="display:none;">
                <h3>向命盘提问</h3>
                <div class="qa-input">
                    <input type="text" id="qaQuestion" aria-label="输入问题" placeholder="例如：此人事业如何？感情运势怎样？健康状况？">
                    <button class="btn btn-primary" onclick="askQuestion()" aria-label="提交问题">提问</button>
                </div>
                <div class="qa-result" id="qaResult">
                    <div style="display:flex; align-items:center; margin-bottom:0.5rem;">
                        <span id="qaType" style="color:var(--accent-gold);"></span>
                        <span class="qa-confidence" id="qaConfidence"></span>
                    </div>
                    <div class="qa-answer" id="qaAnswer"></div>
                    <div class="qa-keypoints" id="qaKeypoints"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        try {
        // 解析URL参数
        const params = new URLSearchParams(window.location.search);
        const birth = params.get('birth');
        const location = params.get('location') || '';
        const gender = params.get('gender') || '男';
        const name = params.get('name') || '';
        if (!birth) { document.getElementById('error').textContent = '缺少出生时间参数'; document.getElementById('error').style.display = 'block'; }

        let chartData = null;

        async function loadChart() {
            showLoading(true);
            try {
                const data = await api.getChart(birth, location, gender, name);
                chartData = data;
                renderChart(data);
                document.getElementById('qaSection').style.display = 'block';
                showLoading(false);
            } catch (e) {
                showLoading(false);
                showError(e.message);
            }
        }

        function renderChart(data) {
            const layout = document.getElementById('chartLayout');
            layout.innerHTML = '';

            // 引擎状态指示
            const engineNames = {bazi:'八字',ziwei:'紫微',astro:'占星',liuyao:'六爻',qimen:'奇门',liuren:'大六壬',taiyi:'太乙',xingming:'姓名'};
            const statusDiv = document.getElementById('engineStatus');
            statusDiv.innerHTML = '';
            for (const [key, name] of Object.entries(engineNames)) {
                const hasData = data[key] && typeof data[key] === 'object' && Object.keys(data[key]).length > 2;
                const color = hasData ? '#4ecdc4' : '#ff6b6b';
                statusDiv.innerHTML += `<span style="background:var(--bg-card);padding:0.2rem 0.5rem;border-radius:4px;font-size:0.7rem;border:1px solid ${color};color:${color};">${hasData?'✓':'✗'} ${name}</span>`;
            }

            // 八字
            if (data.bazi) {
                layout.appendChild(createBaziSection(data.bazi));
            }

            // 紫微
            if (data.ziwei) {
                layout.appendChild(createZiweiSection(data.ziwei));
            }

            // 占星
            if (data.astro) {
                layout.appendChild(createAstroSection(data.astro));
            }

            // 六爻
            if (data.liuyao) {
                layout.appendChild(createLiuyaoSection(data.liuyao));
            }

            // 奇门
            if (data.qimen) {
                layout.appendChild(createQimenSection(data.qimen));
            }

            // 大六壬
            if (data.liuren) {
                layout.appendChild(createLiurenSection(data.liuren));
            }

            // 太乙
            if (data.taiyi) {
                layout.appendChild(createTaiyiSection(data.taiyi));
            }

            // 姓名学
            if (data.xingming) {
                layout.appendChild(createXingmingSection(data.xingming, data.input?.name));
            }
        }

        function createSection(title) {
            const section = document.createElement('div');
            section.className = 'chart-section';
            const h3 = document.createElement('h3');
            h3.textContent = title;
            section.appendChild(h3);
            return section;
        }

        function createBaziSection(bazi) {
            const section = createSection('八字');
            const pillars = ['year', 'month', 'day', 'time'];
            const labels = ['年柱', '月柱', '日柱', '时柱'];
            const currentYear = new Date().getFullYear();
            const shenshaPerPillar = bazi.shensha_per_pillar || {};
            const changshengData = bazi.changsheng || {};

            const SHISHEN_MAP = {
                '甲': {'甲':'比肩','乙':'劫财','丙':'食神','丁':'伤官','戊':'偏财','己':'正财','庚':'七杀','辛':'正官','壬':'偏印','癸':'正印'},
                '乙': {'乙':'比肩','甲':'劫财','丁':'食神','丙':'伤官','己':'偏财','戊':'正财','辛':'七杀','庚':'正官','癸':'偏印','壬':'正印'},
                '丙': {'丙':'比肩','丁':'劫财','戊':'食神','己':'伤官','庚':'偏财','辛':'正财','壬':'七杀','癸':'正官','甲':'偏印','乙':'正印'},
                '丁': {'丁':'比肩','丙':'劫财','己':'食神','戊':'伤官','辛':'偏财','庚':'正财','癸':'七杀','壬':'正官','乙':'偏印','甲':'正印'},
                '戊': {'戊':'比肩','己':'劫财','庚':'食神','辛':'伤官','壬':'偏财','癸':'正财','甲':'七杀','乙':'正官','丙':'偏印','丁':'正印'},
                '己': {'己':'比肩','戊':'劫财','辛':'食神','庚':'伤官','癸':'偏财','壬':'正财','乙':'七杀','甲':'正官','丁':'偏印','丙':'正印'},
                '庚': {'庚':'比肩','辛':'劫财','壬':'食神','癸':'伤官','甲':'偏财','乙':'正财','丙':'七杀','丁':'正官','戊':'偏印','己':'正印'},
                '辛': {'辛':'比肩','庚':'劫财','癸':'食神','壬':'伤官','乙':'偏财','甲':'正财','丁':'七杀','丙':'正官','己':'偏印','戊':'正印'},
                '壬': {'壬':'比肩','癸':'劫财','甲':'食神','乙':'伤官','丙':'偏财','丁':'正财','戊':'七杀','己':'正官','庚':'偏印','辛':'正印'},
                '癸': {'癸':'比肩','壬':'劫财','乙':'食神','甲':'伤官','丁':'偏财','丙':'正财','己':'七杀','戊':'正官','辛':'偏印','庚':'正印'}
            };
            function getShishen(dm, gan) { return SHISHEN_MAP[dm]?.[gan] || ''; }

            let expandedDayunIdx = null;
            let expandedLiunianGanzhi = null;

            function renderTable() {
                const shishenGan = bazi.shishen_gan || {};
                const hiddenGans = bazi.hidden_gans || {};
                const shishenZhi = bazi.shishen_zhi || {};
                const nayin = bazi.nayin || {};
                const dayunList = bazi.dayun || [];

                let cols = [];
                if (expandedLiunianGanzhi) {
                    const lnData = bazi._currentLiunian || {};
                    cols.push({type:'liunian', ganzhi: expandedLiunianGanzhi, label: expandedLiunianGanzhi, shensha: lnData.shensha || [], nayin: lnData.nayin || '', changsheng: ''});
                }
                if (expandedDayunIdx !== null) {
                    const dy = dayunList[expandedDayunIdx];
                    cols.push({type:'dayun', ganzhi: dy.ganzhi, label: dy.start_age+'岁', sub: String(dy.start_year), isCurrent: currentYear >= dy.start_year && currentYear <= dy.start_year + 9, shensha: dy.shensha || [], nayin: dy.nayin || '', changsheng: dy.changsheng || ''});
                }
                pillars.forEach((p, i) => {
                    cols.push({type:'natal', ganzhi: bazi[p], label: labels[i], pillar: p, shensha: shenshaPerPillar[p] || [], nayin: nayin[p] || '', changsheng: changshengData[p] || ''});
                });
                const sepIdx = cols.findIndex(c => c.type === 'natal');

                function colShishen(col) {
                    if (col.type === 'natal') return shishenGan[col.pillar] || '';
                    return getShishen(bazi.day_master, col.ganzhi[0]);
                }
                const bs = 'border-right:3px solid var(--accent-gold);';
                function brd(i) { return (i === sepIdx - 1) ? bs : ''; }
                function cc(c) { return c.type === 'liunian' ? '#ff6b6b' : c.type === 'dayun' ? 'var(--accent-jade)' : 'var(--accent-gold)'; }
                function cb(c) { return c.type !== 'natal' ? 'background:var(--bg-card);' : ''; }

                let h = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;text-align:center;font-size:0.85rem;">';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.4rem;font-size:0.75rem;color:'+cc(c)+';font-weight:600;'+brd(i)+'">'+c.label+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.4rem;font-size:0.8rem;color:var(--text-muted);'+brd(i)+'">'+colShishen(c)+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.6rem;font-size:1.3rem;font-weight:bold;color:'+cc(c)+';'+cb(c)+brd(i)+'">'+c.ganzhi[0]+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.6rem;font-size:1.3rem;font-weight:bold;color:var(--text-primary);'+cb(c)+brd(i)+'">'+c.ganzhi[1]+'</td>'; }); h += '</tr>';
                h += '<tr>';
                cols.forEach((c,i) => {
                    if (c.type === 'natal') {
                        const hg = hiddenGans[c.pillar] || []; const zs = shishenZhi[c.pillar] || [];
                        h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'">'+hg.map((g,gi) => '<div style="font-size:0.7rem;color:var(--text-muted);">'+g+(zs[gi]||'')+'</div>').join('')+'</td>';
                    } else if (c.type === 'dayun') {
                        const hg = dayunList[expandedDayunIdx]?.hidden_gans || [];
                        h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'">'+hg.map(g => '<div style="font-size:0.7rem;color:var(--text-muted);">'+g+'</div>').join('')+'</td>';
                    } else { h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'"></td>'; }
                });
                h += '</tr>';
                h += '<tr style="border-top:1px solid var(--border-color);">';
                cols.forEach((c,i) => { h += '<td style="padding:0.3rem;font-size:0.7rem;color:var(--text-muted);'+brd(i)+'">'+(c.nayin||'')+'</td>'; });
                h += '</tr>';
                h += '<tr>';
                cols.forEach((c,i) => { h += '<td style="padding:0.3rem;font-size:0.7rem;color:var(--text-muted);'+brd(i)+'">'+(c.changsheng||'')+'</td>'; });
                h += '</tr>';
                h += '<tr style="border-top:1px solid var(--border-color);">';
                cols.forEach((c,i) => {
                    const ss = (c.shensha || []).join(' ');
                    h += '<td style="padding:0.3rem;font-size:0.65rem;color:#ffd93d;'+brd(i)+'">'+ss+'</td>';
                });
                h += '</tr>';
                h += '</table></div>';
                return h;
            }

            const tableDiv = document.createElement('div');
            tableDiv.id = 'baziTableContainer';
            section.appendChild(tableDiv);
            function refreshTable() { tableDiv.innerHTML = renderTable(); }
            refreshTable();

            section.innerHTML += '<div style="margin-top:0.8rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">日主：</span>'+(bazi.day_master||'')+'（'+(bazi.day_master_wuxing||'')+'）</span>'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">调候：</span>'+(bazi.tiaohou||'')+'</span>'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">空亡：</span>'+(bazi.xunkong?.year||'')+' '+(bazi.xunkong?.day||'')+'</span>'
                +'</div>';

            if (bazi.xi_yong) {
                const xy = bazi.xi_yong;
                section.innerHTML += '<div style="margin-top:0.5rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;border-left:3px solid var(--accent-gold);font-size:0.85rem;">'
                    +'<span style="color:#4ecdc4;">喜：'+(xy.xi||[]).join(' ')+'</span>　'
                    +'<span style="color:#ff6b6b;">忌：'+(xy.ji||[]).join(' ')+'</span>　'
                    +'<span style="color:var(--text-muted);">'+(xy.strength||'')+'（'+(xy.ratio||0)+'%）</span></div>';
            }

            let gsInfo = [];
            if (bazi.ming_gong) gsInfo.push('命宫 '+bazi.ming_gong);
            if (bazi.tai_yuan) gsInfo.push('胎元 '+bazi.tai_yuan);
            if (bazi.shen_gong) gsInfo.push('身宫 '+bazi.shen_gong);
            if (gsInfo.length > 0) section.innerHTML += '<div style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted);">'+gsInfo.join(' · ')+'</div>';

            if (bazi.features && bazi.features.length > 0) {
                section.innerHTML += '<div style="margin-top:0.5rem;font-size:0.8rem;color:var(--text-muted);">'+bazi.features.join('　')+'</div>';
            }

            // 十神心性详解
            const shishenXinXing = {
                '比肩': '自我意识强，独立自主，竞争心重，不服输',
                '劫财': '果断刚毅，重义气，但也易冲动破财',
                '食神': '才华横溢，享受生活，口福好，有艺术天分',
                '伤官': '聪明过人，叛逆创新，口才好，但也易得罪人',
                '偏财': '慷慨大方，人缘好，善于经营，但也易挥霍',
                '正财': '勤俭持家，务实稳重，重视物质安全感',
                '七杀': '果断有魄力，好胜心强，有领导才能，但也易招灾',
                '正官': '正直守规，有责任感，重视名誉地位',
                '偏印': '聪明好学，思维独特，但也易孤僻多疑',
                '正印': '仁慈宽厚，重视学问，有贵人运'
            };
            const daySS = getShishen(bazi.day_master, bazi.day_master);
            if (bazi.shishen_gan) {
                let ssHtml = '<div style="margin-top:0.8rem;"><div style="font-size:0.85rem;color:var(--accent-gold);margin-bottom:0.4rem;">十神分布</div>';
                ssHtml += '<div style="display:flex;flex-wrap:wrap;gap:0.3rem;">';
                ['year','month','day','time'].forEach((p,i) => {
                    const ss = bazi.shishen_gan[p] || '';
                    const desc = shishenXinXing[ss] || '';
                    const labels = ['年柱','月柱','日柱','时柱'];
                    ssHtml += `<div style="background:var(--bg-card);padding:0.4rem;border-radius:4px;font-size:0.75rem;flex:1;min-width:120px;">
                        <div style="color:var(--accent-gold);font-weight:600;">${labels[i]} ${ss}</div>
                        <div style="color:var(--text-muted);font-size:0.65rem;">${desc}</div>
                    </div>`;
                });
                ssHtml += '</div></div>';
                section.innerHTML += ssHtml;
            }

            // 十二长生详解
            const changshengDesc = {
                '长生': '万物初生，欣欣向荣',
                '沐浴': '初生沐浴，桃花运重',
                '冠带': '渐趋成熟，学业有成',
                '临官': '出仕做官，事业起步',

        function createAstroSection(astro) {
            const section = createSection('西洋占星');

            // 星盘SVG
            const wheelSize = 280;
            const cx = wheelSize / 2, cy = wheelSize / 2, r = 120;
            const signs = ['白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯','水瓶','双鱼'];
            const signColors = ['#ff6b6b','#ffd93d','#4ecdc4','#a78bfa','#ff6b6b','#ffd93d','#4ecdc4','#a78bfa','#ff6b6b','#ffd93d','#4ecdc4','#a78bfa'];

            // 计算宫头位置
            function signToAngle(signName) {
                const idx = signs.indexOf(signName);
                return idx >= 0 ? idx * 30 : 0;
            }

            // 行星符号
            const planetSymbols = {'太阳':'☉','月亮':'☽','水星':'☿','金星':'♀','火星':'♂','木星':'♃','土星':'♄','天王星':'♅','海王星':'♆','冥王星':'♇'};
            const planetColors = {'太阳':'#ffd93d','月亮':'#e8e8e8','水星':'#4ecdc4','金星':'#ff9ff3','火星':'#ff6b6b','木星':'#a78bfa','土星':'#6ea8fe','天王星':'#4ecdc4','海王星':'#6ea8fe','冥王星':'#a78bfa'};

            let svg = `<svg width="${wheelSize}" height="${wheelSize}" viewBox="0 0 ${wheelSize} ${wheelSize}" style="display:block;margin:0 auto;">`;

            // 外圈12宫
            for (let i = 0; i < 12; i++) {
                const a1 = (i * 30 - 90) * Math.PI / 180;
                const a2 = ((i + 1) * 30 - 90) * Math.PI / 180;
                const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
                const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
                const xm = cx + (r - 18) * Math.cos((i * 30 + 15 - 90) * Math.PI / 180);
                const ym = cy + (r - 18) * Math.sin((i * 30 + 15 - 90) * Math.PI / 180);
                svg += `<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="rgba(212,165,116,0.2)" stroke-width="0.5"/>`;
                svg += `<text x="${xm}" y="${ym}" fill="${signColors[i]}" font-size="9" text-anchor="middle" dominant-baseline="middle">${signs[i]}</text>`;
            }
            svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(212,165,116,0.4)" stroke-width="1.5"/>`;
            svg += `<circle cx="${cx}" cy="${cy}" r="${r-25}" fill="none" stroke="rgba(212,165,116,0.15)" stroke-width="0.5"/>`;

            // 上升点标记
            if (astro.ascendant_sign) {
                const ascAngle = (signToAngle(astro.ascendant_sign) + (astro.ascendant % 30) - 90) * Math.PI / 180;
                const ax = cx + (r + 12) * Math.cos(ascAngle);
                const ay = cy + (r + 12) * Math.sin(ascAngle);
                svg += `<text x="${ax}" y="${ay}" fill="var(--accent-gold)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-weight="bold">ASC</text>`;
            }

            // 行星
            const planets = astro.planets || {};
            const placedPlanets = [];
            for (const [name, info] of Object.entries(planets)) {
                const angle = (info.longitude - 90) * Math.PI / 180;
                // 避免重叠：微调位置
                let pr = r - 40;
                const sym = planetSymbols[name] || name[0];
                const color = planetColors[name] || 'var(--text-primary)';
                let px = cx + pr * Math.cos(angle);
                let py = cy + pr * Math.sin(angle);
                // 简单防重叠
                for (const pp of placedPlanets) {
                    const dist = Math.hypot(px - pp.x, py - pp.y);
                    if (dist < 14) {
                        pr -= 12;
                        px = cx + pr * Math.cos(angle);
                        py = cy + pr * Math.sin(angle);
                    }
                }
                placedPlanets.push({x: px, y: py});
                svg += `<text x="${px}" y="${py}" fill="${color}" font-size="13" text-anchor="middle" dominant-baseline="middle">${sym}</text>`;
            }

            svg += '</svg>';

            // 行星列表
            let planetListHtml = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.3rem;font-size:0.75rem;margin-top:0.5rem;">';
            for (const [name, info] of Object.entries(planets)) {
                const sym = planetSymbols[name] || '';
                const color = planetColors[name] || 'var(--text-primary)';
                planetListHtml += `<div style="background:var(--bg-card);padding:0.3rem 0.5rem;border-radius:4px;"><span style="color:${color};">${sym}</span> ${name} <span style="color:var(--accent-gold);">${info.sign||''}</span> ${info.degree?.toFixed(1)||''}°</div>`;
            }
            planetListHtml += '</div>';

            section.innerHTML += svg;
            section.innerHTML += planetListHtml;

            // 相位
            if (astro.aspects && astro.aspects.length > 0) {
                const aspectSymbols = {'合相':'☌','六合':'⚹','刑':'□','三相':'△','冲':'☍'};
                const aspectColors = {'合相':'#ffd93d','六合':'#4ecdc4','刑':'#ff6b6b','三相':'#4ecdc4','冲':'#ff6b6b'};
                let aspHtml = '<div style="margin-top:0.8rem;"><div style="font-size:0.85rem;color:var(--accent-gold);margin-bottom:0.4rem;">相位</div>';
                aspHtml += '<div style="display:flex;flex-wrap:wrap;gap:0.3rem;">';
                astro.aspects.forEach(a => {
                    const sym = aspectSymbols[a.aspect] || a.aspect;
                    const color = aspectColors[a.aspect] || 'var(--text-muted)';

                bmHtml += '<div style="display:flex;flex-wrap:wrap;gap:0.3rem;">';
                for (const [gong, men] of Object.entries(baMen)) {
                    bmHtml += `<div style="background:var(--bg-card);padding:0.3rem 0.5rem;border-radius:4px;font-size:0.75rem;">
                        <span style="color:var(--accent-gold);">${gong}</span>：<span style="color:var(--text-primary);">${men}</span>
                    </div>`;
                }
                bmHtml += '</div></div>';
                section.innerHTML += bmHtml;
            }

            // 综合判断
            const suanAnalysis = taiyi.suan_analysis || {};
            if (suanAnalysis.pan_duan) {
                section.innerHTML += `<div style="margin-top:0.5rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;border-left:3px solid var(--accent-gold);font-size:0.8rem;color:var(--text-primary);">
                    ${suanAnalysis.pan_duan}
                </div>`;
            }

            // 各类神煞
            const extras = [
                {name:'天一', val:taiyi.tian_yi},
                {name:'地一', val:taiyi.di_yi},
                {name:'四神', val:taiyi.si_shen},
                {name:'太岁', val:taiyi.tai_su_su},
                {name:'岁计', val:taiyi.shi_ji_su},
                {name:'天干喻', val:taiyi.tian_gan_yu},
                {name:'主客', val:taiyi.zhu_ke},
                {name:'胜负', val:taiyi.sheng_fu},
            ];
            let exHtml = '<div style="margin-top:0.5rem;font-size:0.75rem;color:var(--text-muted);">';
            extras.forEach(e => {
                if (e.val) exHtml += `<div style="margin-bottom:0.2rem;"><span style="color:var(--accent-gold);">${e.name}：</span>${e.val}</div>`;
            });
            exHtml += '</div>';
            section.innerHTML += exHtml;

            return section;
        }

        async function askQuestion() {
            const question = document.getElementById('qaQuestion').value;
            if (!question) return;

            const resultDiv = document.getElementById('qaResult');
            resultDiv.classList.remove('active');

            try {
                // 调用问答API（通过 api.js 封装，带超时处理）
                const data = await api.ask(birth, location, gender, question);

                document.getElementById('qaType').textContent = data.question_type || '';
                const confBadge = document.getElementById('qaConfidence');
                confBadge.textContent = (data.confidence || '') + '置信度';
                confBadge.className = 'qa-confidence confidence-' + (data.confidence || 'low').toLowerCase();

                document.getElementById('qaAnswer').textContent = data.answer || '';

                const kpDiv = document.getElementById('qaKeypoints');
                kpDiv.innerHTML = '';
                (data.key_points || []).forEach(p => {
                    kpDiv.innerHTML += `<div class="qa-keypoint">${p}</div>`;
                });

                resultDiv.classList.add('active');
            } catch (e) {
                showError(e.message);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function shareChart() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    alert('链接已复制到剪贴板');
                }).catch(() => {
                    prompt('复制此链接分享：', url);
                });
            } else {
                prompt('复制此链接分享：', url);
            }
        }

        // 加载
        loadChart();
        } catch(e) { document.body.innerHTML = '<div style="padding:2rem;color:#ff6b6b;font-size:1rem;background:#1a1a2e;min-height:100vh;"><b>JS错误:</b> ' + e.message + '<br><b>文件:</b> ' + (e.filename||'') + '<br><b>行:</b> ' + (e.lineno||'') + '<br><b>列:</b> ' + (e.colno||'') + '</div>'; }
    </script>
</body>
</html>
