<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄照 v2.0 - 八术排盘</title>
<style>
:root{--bg:#080810;--bg1:#0c0c1a;--bg2:#12122a;--bg3:#181838;--bg4:#1e1e40;--gold:#c9a96e;--gold-dim:rgba(201,169,110,.15);--gold-border:rgba(201,169,110,.25);--txt:#e8dcc8;--txt2:#b0a890;--txt3:#606080;--fire:#e84040;--wood:#40a060;--water:#4080d0;--metal:#c0a040;--earth:#a08050;--jade:#3aaf6a;--purple:#8060c0;--blue:#4a90d9;--crimson:#d43050}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

/* Header */
.hdr{background:var(--bg1);border-bottom:1px solid var(--gold-border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:2px}
.hdr-info{font-size:.75rem;color:var(--txt2)}
.hdr-pills{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.hdr-pill{font-size:.65rem;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--txt3);border:1px solid rgba(255,255,255,.05)}

/* Tabs */
.tabs{display:flex;background:var(--bg1);border-bottom:2px solid var(--gold-border);overflow-x:auto;position:sticky;top:44px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:0;padding:10px 0;text-align:center;font-size:.85rem;font-weight:600;color:var(--txt3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.2s;white-space:nowrap}
.tab:hover{color:var(--txt2)}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-dim)}

/* Panels */
.panels{max-width:860px;margin:0 auto;padding:10px}
.panel{display:none}.panel.on{display:block}
.sec{background:var(--bg2);border:1px solid rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sec-t{font-size:.75rem;font-weight:700;color:var(--gold);padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);border-left:3px solid var(--gold);background:rgba(201,169,110,.03);letter-spacing:1px}
.sec-b{padding:10px 12px}

/* Loading */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 八字四柱大表 ===== */
.bz-table{width:100%;border-collapse:collapse;text-align:center}
.bz-table th{padding:5px 4px;font-size:.65rem;color:var(--txt3);font-weight:600;background:var(--bg3);border:1px solid rgba(255,255,255,.04)}
.bz-table td{padding:4px;border:1px solid rgba(255,255,255,.04);background:var(--bg)}
.bz-gan{font-size:1.6rem;font-weight:800;line-height:1.2;padding:10px 4px!important}
.bz-zhi{font-size:1.6rem;font-weight:800;line-height:1.2;padding:10px 4px!important}
.bz-sub{font-size:.7rem;color:var(--txt2)}
.bz-ss{font-size:.75rem;color:var(--gold)}
.bz-small{font-size:.65rem;color:var(--txt3)}
.wx-j{color:var(--metal)}.wx-m{color:var(--wood)}.wx-s{color:var(--water)}.wx-h{color:var(--fire)}.wx-t{color:var(--earth)}

/* 五行柱 */
.wx-bars{display:flex;flex-direction:column;gap:6px;padding:4px 0}
.wx-row{display:flex;align-items:center;gap:6px}
.wx-lbl{width:24px;text-align:center;font-weight:700;font-size:.9rem}
.wx-trk{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden}
.wx-fill{height:100%;border-radius:3px;transition:width .5s}
.wx-val{width:30px;text-align:right;font-size:.7rem;color:var(--txt3)}

/* 大运横滚 */
.dy-scroll{overflow-x:auto;padding:6px 0;-webkit-overflow-scrolling:touch}
.dy-row{display:flex;gap:2px;min-width:max-content}
.dy-col{min-width:52px;text-align:center;background:var(--bg);border-radius:4px;padding:4px 2px}
.dy-col.now{border:1px solid var(--gold);background:var(--gold-dim)}
.dy-age{font-size:.6rem;color:var(--txt3)}
.dy-g,.dy-z{font-size:1rem;font-weight:700}
.dy-yr{font-size:.55rem;color:var(--txt3)}

/* 喜忌标签 */
.xy-tags{display:flex;gap:6px;flex-wrap:wrap}
.xy-t{padding:4px 12px;border-radius:14px;font-size:.8rem;font-weight:600}
.xy-xi{background:rgba(58,175,106,.12);color:var(--jade);border:1px solid rgba(58,175,106,.25)}
.xy-ji{background:rgba(212,48,80,.12);color:var(--crimson);border:1px solid rgba(212,48,80,.25)}
.xy-reason{font-size:.78rem;color:var(--txt2);margin-top:6px}

/* 神煞 */
.ss-tags{display:flex;flex-wrap:wrap;gap:5px}
.ss-t{font-size:.7rem;padding:2px 8px;border-radius:10px;background:var(--bg3);color:var(--txt2);border:1px solid rgba(255,255,255,.04)}

/* ===== 紫微宫格 ===== */
.zw-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(3,1fr);gap:1px;min-height:500px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.zw-c{background:var(--bg);padding:6px;display:flex;flex-direction:column;min-height:150px;position:relative}
.zw-c.center{background:var(--bg3);align-items:center;justify-content:center;text-align:center}
.zw-name{font-size:.78rem;font-weight:700;color:var(--gold)}
.zw-gz{font-size:.6rem;color:var(--txt3);margin:1px 0}
.zw-stars{flex:1;display:flex;flex-wrap:wrap;gap:2px;align-content:flex-start;margin-top:3px}
.zw-s{font-size:.65rem;padding:1px 3px;border-radius:2px;background:rgba(201,169,110,.08);color:var(--txt)}
.zw-s.main{color:var(--gold);font-weight:700;background:rgba(201,169,110,.15)}
.zw-s.lu{color:var(--jade)}.zw-s.quan{color:var(--purple)}.zw-s.ke{color:var(--blue)}.zw-s.ji{color:var(--crimson)}
.zw-sh{position:absolute;top:2px;right:3px;font-size:.55rem;color:var(--crimson);font-weight:700}
.zw-sihua{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.zw-sh-item{text-align:center;padding:8px 4px;background:var(--bg);border-radius:6px}
.zw-sh-type{font-size:.6rem;color:var(--txt3)}.zw-sh-star{font-size:.9rem;font-weight:700}

/* ===== 六爻 ===== */
.ly-dual{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.ly-gua{background:var(--bg);padding:8px;border-radius:4px}
.ly-gua-t{text-align:center;font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.ly-gua-sub{text-align:center;font-size:.65rem;color:var(--txt3);margin-bottom:6px}
.ly-row{display:grid;grid-template-columns:28px 1fr 36px 36px 36px;gap:3px;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.75rem}
.ly-row.hdr{font-size:.6rem;color:var(--txt3);font-weight:600;border-bottom:1px solid var(--gold-border)}
.ly-yao{display:flex;align-items:center;justify-content:center;height:14px}
.ly-yao.yang{background:var(--gold);border-radius:2px}
.ly-yao.yin{background:linear-gradient(var(--gold) 40%,transparent 40%,transparent 60%,var(--gold) 60%);border-radius:2px}
.ly-shi{color:var(--crimson);font-weight:700;font-size:.65rem}
.ly-bian{color:var(--fire);font-size:.6rem}

/* ===== 奇门九宫 ===== */
.qm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.qm-cell{background:var(--bg);padding:6px;min-height:120px;position:relative}
.qm-gong{position:absolute;top:2px;left:4px;font-size:.55rem;color:var(--txt3)}
.qm-shen{position:absolute;top:2px;right:4px;font-size:.55rem;color:var(--purple)}
.qm-star{font-size:.7rem;color:var(--gold);margin-top:12px}
.qm-men{font-size:.65rem;color:var(--jade)}
.qm-tg{font-size:.6rem;color:var(--wood)}
.qm-dg{font-size:.6rem;color:var(--fire)}
.qm-info{font-size:.7rem;color:var(--txt2);margin-bottom:8px;line-height:1.8}
.qm-mark{display:inline-block;font-size:.5rem;padding:1px 4px;border-radius:3px;margin-left:4px}
.qm-mark.ma{background:rgba(232,64,64,.15);color:var(--fire)}
.qm-mark.kong{background:rgba(96,96,128,.15);color:var(--txt3)}

/* ===== 大六壬 ===== */
.lr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.lr-cell{background:var(--bg);padding:5px;min-height:60px;text-align:center}
.lr-zhi{font-size:1rem;font-weight:700;color:var(--gold)}
.lr-jun{font-size:.55rem;color:var(--txt3)}
.lr-info{font-size:.7rem;color:var(--txt2);margin-bottom:8px;line-height:1.8}
.lr-sk{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lr-sk-item{background:var(--bg);padding:6px;border-radius:4px}
.lr-sk-label{font-size:.6rem;color:var(--txt3);margin-bottom:3px}
.lr-sk-val{font-size:.8rem;font-weight:600}

/* ===== 太乙 ===== */
.ty-table{width:100%;border-collapse:collapse;font-size:.75rem}
.ty-table th{padding:4px 6px;background:var(--bg3);color:var(--txt3);font-weight:600;text-align:left;border:1px solid rgba(255,255,255,.04)}
.ty-table td{padding:4px 6px;border:1px solid rgba(255,255,255,.04)}
.ty-suan{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.ty-suan-item{background:var(--bg);padding:8px;border-radius:6px;text-align:center}
.ty-suan-label{font-size:.6rem;color:var(--txt3)}.ty-suan-val{font-size:1.2rem;font-weight:700;color:var(--gold)}

/* ===== 占星 ===== */
.astro-wrap{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.astro-legend{flex:1;min-width:200px;font-size:.7rem}
.astro-p{display:flex;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.astro-p-name{width:36px;font-weight:700;color:var(--gold)}
.astro-p-sign{flex:1}
.astro-p-house{width:30px;text-align:right;color:var(--txt3)}

/* ===== 姓名学 ===== */
.xm-score{text-align:center;padding:16px}
.xm-num{font-size:2.5rem;font-weight:800;color:var(--gold)}
.xm-lbl{font-size:.75rem;color:var(--txt3);margin-top:4px}
.xm-wg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.xm-wg-i{text-align:center;padding:8px 4px;background:var(--bg);border-radius:6px}
.xm-wg-l{font-size:.6rem;color:var(--txt3)}
.xm-wg-n{font-size:1.2rem;font-weight:700;margin:4px 0}
.xm-wg-wx{font-size:.55rem;color:var(--txt3)}
.xm-wg-j{font-size:.6rem;padding:1px 4px;border-radius:3px;margin-top:4px}
.xm-wg-j.ok{background:rgba(58,175,106,.12);color:var(--jade)}
.xm-wg-j.bad{background:rgba(212,48,80,.12);color:var(--crimson)}
.sc-card{background:var(--bg);padding:10px;border-radius:6px}
.sc-wx{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:4px}
.sc-rst{font-size:.8rem;font-weight:600;margin-bottom:4px}
.sc-desc{font-size:.75rem;color:var(--txt2)}
.sl-card{background:var(--bg);padding:8px;border-radius:4px;margin-bottom:6px}
.sl-title{font-size:.8rem;font-weight:600;margin-bottom:4px}
.sl-ji{font-size:.65rem;padding:1px 6px;border-radius:3px;margin-left:4px}
.sl-ji.ok{background:rgba(58,175,106,.12);color:var(--jade)}
.sl-ji.bad{background:rgba(212,48,80,.12);color:var(--crimson)}
.sl-body{font-size:.75rem;color:var(--txt2)}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-title">玄照</span>
  <span class="hdr-info" id="hBirth"></span>
  <span class="hdr-info" id="hLoc"></span>
  <div class="hdr-pills" id="hPills"></div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab on" data-m="bazi">八字</button>
  <button class="tab" data-m="ziwei">紫微</button>
  <button class="tab" data-m="liuyao">六爻</button>
  <button class="tab" data-m="qimen">奇门</button>
  <button class="tab" data-m="liuren">大六壬</button>
  <button class="tab" data-m="taiyi">太乙</button>
  <button class="tab" data-m="astro">占星</button>
  <button class="tab" data-m="xm">姓名</button>
</nav>

<div class="ld" id="loader"><div class="spinner"></div><div style="color:var(--txt3);font-size:.85rem">排盘中…</div></div>

<main class="panels" id="panels" style="display:none">

<!-- 综合评估 -->
<section class="panel on" id="p-bazi">
  <div class="sec" id="overviewSection" style="display:none"><div class="sec-t">综合评估</div><div class="sec-b" id="overviewPanel"></div></div>
  <div class="sec"><div class="sec-t">四柱命盘</div><div class="sec-b" id="bzPillars"></div></div>
  <div class="sec"><div class="sec-t">五行旺衰</div><div class="sec-b" id="bzWx"></div></div>
  <div class="sec"><div class="sec-t">十神</div><div class="sec-b" id="bzSs"></div></div>
  <div class="sec"><div class="sec-t">神煞</div><div class="sec-b" id="bzShensha"></div></div>
  <div class="sec"><div class="sec-t">大运流年</div><div class="sec-b" id="bzDayun"></div></div>
  <div class="sec"><div class="sec-t">喜用神</div><div class="sec-b" id="bzXiYong"></div></div>
</section>

<!-- 紫微 -->
<section class="panel" id="p-ziwei">
  <div class="sec"><div class="sec-t">紫微命盘</div><div class="sec-b" id="zwGrid"></div></div>
  <div class="sec"><div class="sec-t">四化飞星</div><div class="sec-b" id="zwSihua"></div></div>
</section>

<!-- 六爻 -->
<section class="panel" id="p-liuyao">
  <div class="sec"><div class="sec-t">六爻排盘</div><div class="sec-b" id="lyGua"></div></div>
  <div class="sec"><div class="sec-t">六神</div><div class="sec-b" id="lyShen"></div></div>
</section>

<!-- 奇门 -->
<section class="panel" id="p-qimen">
  <div class="sec"><div class="sec-t">奇门遁甲</div><div class="sec-b"><div class="qm-info" id="qmInfo"></div><div class="qm-grid" id="qmGrid"></div></div></div>
</section>

<!-- 大六壬 -->
<section class="panel" id="p-liuren">
  <div class="sec"><div class="sec-t">大六壬</div><div class="sec-b"><div class="lr-info" id="lrInfo"></div><div id="lrPan"></div></div></div>
  <div class="sec"><div class="sec-t">四课三传</div><div class="sec-b" id="lrSk"></div></div>
</section>

<!-- 太乙 -->
<section class="panel" id="p-taiyi">
  <div class="sec"><div class="sec-t">太乙神数</div><div class="sec-b" id="tyInfo"></div></div>
  <div class="sec"><div class="sec-t">三基五福</div><div class="sec-b" id="tySanji"></div></div>
  <div class="sec"><div class="sec-t">主客算</div><div class="sec-b" id="tySuan"></div></div>
</section>

<!-- 占星 -->
<section class="panel" id="p-astro">
  <div class="sec"><div class="sec-t">星盘</div><div class="sec-b"><div class="astro-wrap"><svg id="astroSvg" width="320" height="320" viewBox="0 0 320 320"></svg><div class="astro-legend" id="astroLg"></div></div></div></div>
  <div class="sec"><div class="sec-t">行星落座</div><div class="sec-b" id="astroPlanets"></div></div>
  <div class="sec"><div class="sec-t">相位</div><div class="sec-b" id="astroAspects"></div></div>
</section>

<!-- 姓名 -->
<section class="panel" id="p-xm">
  <div class="sec"><div class="sec-b"><div class="xm-score"><div class="xm-num" id="xmScore">0</div><div class="xm-lbl">姓名评分</div></div></div></div>
  <div class="sec"><div class="sec-t">五格命盘</div><div class="sec-b" id="xmWuge"></div></div>
  <div class="sec"><div class="sec-t">三才配置</div><div class="sec-b" id="xmSancai"></div></div>
  <div class="sec"><div class="sec-t">数理剖析</div><div class="sec-b" id="xmShuli"></div></div>
</section>

</main>

<script>
(function(){
'use strict';
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),
WX={'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水','子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'},
WXC={'金':'var(--metal)','木':'var(--wood)','水':'var(--water)','火':'var(--fire)','土':'var(--earth)'},
WXCL={'金':'#c0a040','木':'#40a060','水':'#4080d0','火':'#e84040','土':'#a08050'},
WXK={'金':'wx-j','木':'wx-m','水':'wx-s','火':'wx-h','土':'wx-t'},
esc=s=>{if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML},
wxC=c=>WXK[WX[c]]||'';

// Tab
$$('.tab').forEach(t=>t.onclick=()=>{
  $$('.tab').forEach(x=>x.classList.remove('on'));
  $$('.panel').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  const p=$('#p-'+t.dataset.m);
  if(p)p.classList.add('on');
});

// Params
const u=new URL(location.href),BIRTH=u.searchParams.get('birth')||'',LOC=u.searchParams.get('location')||'北京',GENDER=u.searchParams.get('gender')||'男',NAME=u.searchParams.get('name')||'';

async function init(){
  if(!BIRTH){alert('缺少出生时间');return}
  $('#hBirth').textContent=BIRTH;$('#hLoc').textContent=LOC;
  let url=`/api/chart?birth=${encodeURIComponent(BIRTH)}&location=${encodeURIComponent(LOC)}&gender=${encodeURIComponent(GENDER)}`;
  if(NAME)url+=`&name=${encodeURIComponent(NAME)}`;
  try{
    const r=await fetch(url),d=await r.json();
    if(d.error)throw new Error(d.error);
    $('#loader').style.display='none';$('#panels').style.display='block';
    renderPills(d);
    if(d.bazi)renderBazi(d.bazi);
    if(d.ziwei)renderZiwei(d.ziwei);
    if(d.liuyao)renderLiuyao(d.liuyao);
    if(d.qimen)renderQimen(d.qimen);
    if(d.liuren)renderLiuren(d.liuren);
    if(d.taiyi)renderTaiyi(d.taiyi);
    if(d.astro)renderAstro(d.astro);
    if(d.xingming)renderXm(d.xingming);
    // 异步加载综合评估
    loadOverview();
  }catch(e){
    $('#loader').innerHTML=`<div style="color:var(--crimson);text-align:center"><div style="font-size:1.1rem;margin-bottom:6px">排盘失败</div><div style="font-size:.8rem;color:var(--txt3)">${esc(e.message)}</div></div>`;
  }
}

function renderPills(d){
  const p=[];
  if(d.corrected_time&&d.corrected_time.diff_minutes!==undefined&&d.corrected_time.diff_minutes!==0)p.push(`真太阳时 ${(d.corrected_time.diff_minutes>0?'+':'')+d.corrected_time.diff_minutes}分`);
  (d.methods||[]).forEach(m=>p.push(m));
  $('#hPills').innerHTML=p.map(x=>`<span class="hdr-pill">${esc(x)}</span>`).join('');
}

/* ===== 综合评估 ===== */
async function loadOverview(){
  try{
    let url=`/api/cross-validate?birth=${encodeURIComponent(BIRTH)}&location=${encodeURIComponent(LOC)}&gender=${encodeURIComponent(GENDER)}`;
    const r=await fetch(url),d=await r.json();
    if(d.comprehensive_judgment)renderOverview(d);
  }catch(e){/* 静默失败 */}
}

function renderOverview(d){
  const cj=d.comprehensive_judgment||{};
  const conf=d.overall_confidence||'';
  const methods=d.available_methods||[];

  // 维度卡片
  const dims=[
    {key:'事业',icon:'💼'},
    {key:'财运',icon:'💰'},
    {key:'感情',icon:'❤️'},
    {key:'健康',icon:'🏥'},
    {key:'学业',icon:'📚'},
    {key:'人际关系',icon:'🤝'}
  ];

/* ===== 占星 ===== */
function renderAstro(a){
  // SVG圆形星盘
  const svg=$('#astroSvg');
  const cx=160,cy=160,r=140;
  let svgH='';
  // 外圈
  svgH+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold-border)" stroke-width="1"/>`;
  svgH+=`<circle cx="${cx}" cy="${cy}" r="${r*0.6}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
  // 12宫分隔线
  const houses=a.houses||[];
  for(let i=0;i<12;i++){
    const angle=i*30-90;
    const rad=angle*Math.PI/180;
    const x1=cx+r*Math.cos(rad),y1=cy+r*Math.sin(rad);
    const x2=cx+r*0.6*Math.cos(rad),y2=cy+r*0.6*Math.sin(rad);
    svgH+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
  }
  // 行星
  const planets=a.planets||[];
  const PLANET_SYMBOLS={'☉','☽','☿','♀','♂','♃','♄','♅','♆','☊'};
  planets.forEach((p,i)=>{
    const signIdx=['白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯','水瓶','双鱼'].indexOf(p.sign)||0;
    const angle=signIdx*30+p.degree-90;
    const rad=angle*Math.PI/180;
    const pr=r*0.75-i*8;
    const px=cx+pr*Math.cos(rad),py=cy+pr*Math.sin(rad);
    svgH+=`<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="middle" fill="var(--gold)" font-size="10" font-weight="700">${esc(p.name?.substring(0,1)||'?')}</text>`;
  });
  svg.innerHTML=svgH;

  // 行星落座表
  let lgH='';
  planets.forEach(p=>{
    lgH+=`<div class="astro-p"><span class="astro-p-name">${esc(p.name)}</span><span class="astro-p-sign">${esc(p.sign)} ${p.degree?.toFixed(1)||''}°</span><span class="astro-p-house">${p.house||''}宫</span></div>`;
  });
  $('#astroLg').innerHTML=lgH;

  // 行星详细表
  let pH='<table class="ty-table"><tr><th>行星</th><th>星座</th><th>度数</th><th>宫位</th><th>逆行</th></tr>';
  planets.forEach(p=>{
    pH+=`<tr><td style="color:var(--gold)">${esc(p.name)}</td><td>${esc(p.sign)}</td><td>${p.degree?.toFixed(1)||''}°</td><td>${p.house||''}宫</td><td>${p.retrograde?'R':''}</td></tr>`;
  });
  pH+='</table>';
  $('#astroPlanets').innerHTML=pH;

  // 相位
  const aspects=a.aspects||[];
  if(aspects.length){
    let ah='<table class="ty-table"><tr><th>行星1</th><th>相位</th><th>行星2</th><th>容许度</th></tr>';
    aspects.forEach(a=>{
      ah+=`<tr><td style="color:var(--gold)">${esc(a.planet1||a[0]||'')}</td><td>${esc(a.aspect||a.type||a[1]||'')}</td><td style="color:var(--gold)">${esc(a.planet2||a[2]||'')}</td><td>${esc(a.orb||a[3]||'')}</td></tr>`;
    });
    ah+='</table>';
    $('#astroAspects').innerHTML=ah;
  }
}

/* ===== 姓名学 ===== */
function renderXm(xm){
  const score=xm.total_score||xm.score||0;
  $('#xmScore').textContent=score;
  const wg=xm.wu_ge||xm.wuge||{};
  const names=['天格','人格','地格','外格','总格'],keys=['tiange','renge','dige','waige','zongge'];
  let wh='<div class="xm-wg">';
  names.forEach((n,i)=>{
    const ge=wg[keys[i]]||wg[n]||{};
    const num=ge.score||ge.num||'',wx=ge.wuxing||'',ji=ge.ji_xiong||'';
    const jCls=ji.includes('吉')?'ok':'bad';
    wh+=`<div class="xm-wg-i"><div class="xm-wg-l">${n}</div><div class="xm-wg-n" style="color:${WXC[wx]||'var(--txt)'}">${num}</div><div class="xm-wg-wx">${esc(wx)}</div><div class="xm-wg-j ${jCls}">${esc(ji)}</div></div>`;
  });
  wh+='</div>';
  $('#xmWuge').innerHTML=wh;

  const sc=xm.san_cai||xm.sancai||{};
  const scWx=sc.wuxing||'',scRst=sc.result||sc.ji_xiong||'',scDesc=sc.description||sc.analysis||'';
  $('#xmSancai').innerHTML=`<div class="sc-card"><div class="sc-wx">${esc(scWx)}</div><div class="sc-rst">${esc(scRst)}</div><div class="sc-desc">${esc(scDesc)}</div></div>`;

  const sl=xm.shu_li||xm.shuli||xm.ge_analysis||{};
  let slh='';
  names.forEach((n,i)=>{
    const ge=sl[keys[i]]||sl[n]||wg[keys[i]]||wg[n]||{};
    const num=ge.score||ge.num||'',ji=ge.ji_xiong||'',desc=ge.analysis||ge.description||ge.detail||ge.含义||'';
    if(!num&&!desc)return;
    const jCls=ji.includes('吉')?'ok':'bad';
    slh+=`<div class="sl-card"><div class="sl-title">${n} <span style="color:var(--gold)">(${num})</span>${ji?`<span class="sl-ji ${jCls}">${esc(ji)}</span>`:''}</div><div class="sl-body">${esc(desc)}</div></div>`;
  });
  $('#xmShuli').innerHTML=slh||'<div style="color:var(--txt3);font-size:.8rem">数理数据不可用</div>';
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
