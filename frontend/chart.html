<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зҺ„з…§ v2.0 - е‘Ҫзӣҳеұ•зӨә</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .chart-layout {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .chart-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }
        .chart-section h3 {
            color: var(--accent-gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }
        .mini-pillar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.3rem;
            text-align: center;
            margin-bottom: 0.8rem;
        }
        .mini-pillar-item {
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: 4px;
        }
        .mini-pillar-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .mini-pillar-gan {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-gold);
        }
        .mini-pillar-zhi {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-primary);
        }
        .info-line {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }
        .info-line .label {
            color: var(--accent-gold);
        }
        .planet-mini {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.3rem;
            font-size: 0.8rem;
        }
        .planet-mini-item {
            background: var(--bg-card);
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
        }
        .gua-info {
            text-align: center;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 8px;
        }
        .gua-name {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 0.5rem;
        }
        .dong-yao {
            color: var(--text-primary);
        }
        .qimen-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.3rem;
            font-size: 0.75rem;
        }
        .qimen-mini-cell {
            background: var(--bg-card);
            padding: 0.4rem;
            border-radius: 4px;
            text-align: center;
        }
        .qimen-mini-gong {
            color: var(--text-muted);
            font-size: 0.65rem;
        }
        .qimen-mini-gan {
            color: var(--accent-gold);
            font-weight: bold;
        }
        .qimen-mini-men {
            color: var(--text-primary);
        }
        .liuren-ke {
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
        }
        .liuren-ke-item {
            background: var(--bg-card);
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
        }
        .taiyi-info {
            text-align: center;
            padding: 1rem;
        }
        .taiyi-gong {
            font-size: 1.5rem;
            color: var(--accent-gold);
        }
        .qa-section {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        .qa-section h3 {
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }
        .qa-input {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .qa-input input {
            flex: 1;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-family: inherit;
        }
        .qa-result {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 1rem;
            display: none;
        }
        .qa-result.active {
            display: block;
        }
        .qa-answer {
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .qa-confidence {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-left: 1rem;
        }
        .qa-keypoints {
            margin-top: 1rem;
        }
        .qa-keypoint {
            background: rgba(212, 165, 116, 0.1);
            border-left: 3px solid var(--accent-gold);
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.3rem;
            border-radius: 0 4px 4px 0;
            font-size: 0.85rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent-gold);
        }
        @media (max-width: 1024px) {
            .chart-layout {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .chart-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">и·іиҝҮеҜјиҲӘ</a>

    <nav class="nav" class="nav-sticky" aria-label="дё»еҜјиҲӘ">
        <a href="/" class="nav-brand">зҺ„з…§ <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/" aria-label="жҺ’зӣҳе…ҘеҸЈ">жҺ’зӣҳ</a>
            <a href="/perspectives" aria-label="108и§Ҷи§’еҲҶжһҗ">108и§Ҷи§’</a>
            <a href="/debate" aria-label="иҫ©и®әеҸ°">иҫ©и®әеҸ°</a>
        </div>
    </nav>

    <div class="container" id="main-content">
        <a href="/" class="back-link">&larr; иҝ”еӣһиҫ“е…Ҙ</a>

        <div id="loading" class="loading" style="display:none;">
            <div class="spinner"></div>
            <p>жӯЈеңЁжҺ’зӣҳпјҢиҜ·зЁҚеҖҷ...</p>
        </div>

        <div id="error" class="error-message" style="display:none;"></div>

        <div id="chartContent">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <div id="engineStatus" style="display:flex;flex-wrap:wrap;gap:0.3rem;"></div>
                <div>
                    <button class="btn btn-primary" onclick="window.print()" style="font-size:0.8rem;padding:0.3rem 0.8rem;">рҹ–ЁпёҸ жү“еҚ°</button>
                    <button class="btn btn-primary" onclick="shareChart()" style="font-size:0.8rem;padding:0.3rem 0.8rem;margin-left:0.3rem;">рҹ“Ө еҲҶдә«</button>
                </div>
            </div>
            <div class="chart-layout" id="chartLayout"></div>

            <!-- й—®зӯ” -->
            <div class="qa-section" id="qaSection" style="display:none;">
                <h3>еҗ‘е‘ҪзӣҳжҸҗй—®</h3>
                <div class="qa-input">
                    <input type="text" id="qaQuestion" aria-label="иҫ“е…Ҙй—®йўҳ" placeholder="дҫӢеҰӮпјҡжӯӨдәәдәӢдёҡеҰӮдҪ•пјҹж„ҹжғ…иҝҗеҠҝжҖҺж ·пјҹеҒҘеә·зҠ¶еҶөпјҹ">
                    <button class="btn btn-primary" onclick="askQuestion()" aria-label="жҸҗдәӨй—®йўҳ">жҸҗй—®</button>
                </div>
                <div class="qa-result" id="qaResult">
                    <div style="display:flex; align-items:center; margin-bottom:0.5rem;">
                        <span id="qaType" style="color:var(--accent-gold);"></span>
                        <span class="qa-confidence" id="qaConfidence"></span>
                    </div>
                    <div class="qa-answer" id="qaAnswer"></div>
                    <div class="qa-keypoints" id="qaKeypoints"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        try {
        // и§ЈжһҗURLеҸӮж•°
        const params = new URLSearchParams(window.location.search);
        const birth = params.get('birth');
        const location = params.get('location') || '';
        const gender = params.get('gender') || 'з”·';
        const name = params.get('name') || '';
        if (!birth) { document.getElementById('error').textContent = 'зјәе°‘еҮәз”ҹж—¶й—ҙеҸӮж•°'; document.getElementById('error').style.display = 'block'; }

        let chartData = null;

        async function loadChart() {
            showLoading(true);
            try {
                const data = await api.getChart(birth, location, gender, name);
                chartData = data;
                renderChart(data);
                document.getElementById('qaSection').style.display = 'block';
                showLoading(false);
                document.getElementById('chartContent').scrollIntoView({behavior:'smooth'});
            } catch (e) {
                showLoading(false);
                showError(e.message);
            }
        }

        function renderChart(data) {
            const layout = document.getElementById('chartLayout');
            layout.innerHTML = '';

            // еј•ж“ҺзҠ¶жҖҒжҢҮзӨә
            const engineNames = {bazi:'е…«еӯ—',ziwei:'зҙ«еҫ®',astro:'еҚ жҳҹ',liuyao:'е…ӯзҲ»',qimen:'еҘҮй—Ё',liuren:'еӨ§е…ӯеЈ¬',taiyi:'еӨӘд№ҷ',xingming:'е§“еҗҚ'};
            const statusDiv = document.getElementById('engineStatus');
            statusDiv.innerHTML = '';
            for (const [key, name] of Object.entries(engineNames)) {
                const hasData = data[key] && typeof data[key] === 'object' && Object.keys(data[key]).length > 2;
                const color = hasData ? '#4ecdc4' : '#ff6b6b';
                statusDiv.innerHTML += `<span style="background:var(--bg-card);padding:0.2rem 0.5rem;border-radius:4px;font-size:0.7rem;border:1px solid ${color};color:${color};">${hasData?'вң“':'вң—'} ${name}</span>`;
            }

            // е…«еӯ—
            if (data.bazi) {
                layout.appendChild(createBaziSection(data.bazi));
            }

            // зҙ«еҫ®
            if (data.ziwei) {
                layout.appendChild(createZiweiSection(data.ziwei));
            }

            // еҚ жҳҹ
            if (data.astro) {
                layout.appendChild(createAstroSection(data.astro));
            }

            // е…ӯзҲ»
            if (data.liuyao) {
                layout.appendChild(createLiuyaoSection(data.liuyao));
            }

            // еҘҮй—Ё
            if (data.qimen) {
                layout.appendChild(createQimenSection(data.qimen));
            }

            // еӨ§е…ӯеЈ¬
            if (data.liuren) {
                layout.appendChild(createLiurenSection(data.liuren));
            }

            // еӨӘд№ҷ
            if (data.taiyi) {
                layout.appendChild(createTaiyiSection(data.taiyi));
            }

            // е§“еҗҚеӯҰ
            if (data.xingming) {
                layout.appendChild(createXingmingSection(data.xingming, data.input?.name));
            }
        }

        function createSection(title) {
            const section = document.createElement('div');
            section.className = 'chart-section';
            const h3 = document.createElement('h3');
            h3.textContent = title;
            section.appendChild(h3);
            return section;
        }

        function createBaziSection(bazi) {
            const section = createSection('е…«еӯ—');
            const pillars = ['year', 'month', 'day', 'time'];
            const labels = ['е№ҙжҹұ', 'жңҲжҹұ', 'ж—Ҙжҹұ', 'ж—¶жҹұ'];
            const currentYear = new Date().getFullYear();
            const shenshaPerPillar = bazi.shensha_per_pillar || {};
            const changshengData = bazi.changsheng || {};

            const SHISHEN_MAP = {
                'з”І': {'з”І':'жҜ”иӮ©','д№ҷ':'еҠ«иҙў','дёҷ':'йЈҹзҘһ','дёҒ':'дјӨе®ҳ','жҲҠ':'еҒҸиҙў','е·ұ':'жӯЈиҙў','еәҡ':'дёғжқҖ','иҫӣ':'жӯЈе®ҳ','еЈ¬':'еҒҸеҚ°','зҷё':'жӯЈеҚ°'},
                'д№ҷ': {'д№ҷ':'жҜ”иӮ©','з”І':'еҠ«иҙў','дёҒ':'йЈҹзҘһ','дёҷ':'дјӨе®ҳ','е·ұ':'еҒҸиҙў','жҲҠ':'жӯЈиҙў','иҫӣ':'дёғжқҖ','еәҡ':'жӯЈе®ҳ','зҷё':'еҒҸеҚ°','еЈ¬':'жӯЈеҚ°'},
                'дёҷ': {'дёҷ':'жҜ”иӮ©','дёҒ':'еҠ«иҙў','жҲҠ':'йЈҹзҘһ','е·ұ':'дјӨе®ҳ','еәҡ':'еҒҸиҙў','иҫӣ':'жӯЈиҙў','еЈ¬':'дёғжқҖ','зҷё':'жӯЈе®ҳ','з”І':'еҒҸеҚ°','д№ҷ':'жӯЈеҚ°'},
                'дёҒ': {'дёҒ':'жҜ”иӮ©','дёҷ':'еҠ«иҙў','е·ұ':'йЈҹзҘһ','жҲҠ':'дјӨе®ҳ','иҫӣ':'еҒҸиҙў','еәҡ':'жӯЈиҙў','зҷё':'дёғжқҖ','еЈ¬':'жӯЈе®ҳ','д№ҷ':'еҒҸеҚ°','з”І':'жӯЈеҚ°'},
                'жҲҠ': {'жҲҠ':'жҜ”иӮ©','е·ұ':'еҠ«иҙў','еәҡ':'йЈҹзҘһ','иҫӣ':'дјӨе®ҳ','еЈ¬':'еҒҸиҙў','зҷё':'жӯЈиҙў','з”І':'дёғжқҖ','д№ҷ':'жӯЈе®ҳ','дёҷ':'еҒҸеҚ°','дёҒ':'жӯЈеҚ°'},
                'е·ұ': {'е·ұ':'жҜ”иӮ©','жҲҠ':'еҠ«иҙў','иҫӣ':'йЈҹзҘһ','еәҡ':'дјӨе®ҳ','зҷё':'еҒҸиҙў','еЈ¬':'жӯЈиҙў','д№ҷ':'дёғжқҖ','з”І':'жӯЈе®ҳ','дёҒ':'еҒҸеҚ°','дёҷ':'жӯЈеҚ°'},
                'еәҡ': {'еәҡ':'жҜ”иӮ©','иҫӣ':'еҠ«иҙў','еЈ¬':'йЈҹзҘһ','зҷё':'дјӨе®ҳ','з”І':'еҒҸиҙў','д№ҷ':'жӯЈиҙў','дёҷ':'дёғжқҖ','дёҒ':'жӯЈе®ҳ','жҲҠ':'еҒҸеҚ°','е·ұ':'жӯЈеҚ°'},
                'иҫӣ': {'иҫӣ':'жҜ”иӮ©','еәҡ':'еҠ«иҙў','зҷё':'йЈҹзҘһ','еЈ¬':'дјӨе®ҳ','д№ҷ':'еҒҸиҙў','з”І':'жӯЈиҙў','дёҒ':'дёғжқҖ','дёҷ':'жӯЈе®ҳ','е·ұ':'еҒҸеҚ°','жҲҠ':'жӯЈеҚ°'},
                'еЈ¬': {'еЈ¬':'жҜ”иӮ©','зҷё':'еҠ«иҙў','з”І':'йЈҹзҘһ','д№ҷ':'дјӨе®ҳ','дёҷ':'еҒҸиҙў','дёҒ':'жӯЈиҙў','жҲҠ':'дёғжқҖ','е·ұ':'жӯЈе®ҳ','еәҡ':'еҒҸеҚ°','иҫӣ':'жӯЈеҚ°'},
                'зҷё': {'зҷё':'жҜ”иӮ©','еЈ¬':'еҠ«иҙў','д№ҷ':'йЈҹзҘһ','з”І':'дјӨе®ҳ','дёҒ':'еҒҸиҙў','дёҷ':'жӯЈиҙў','е·ұ':'дёғжқҖ','жҲҠ':'жӯЈе®ҳ','иҫӣ':'еҒҸеҚ°','еәҡ':'жӯЈеҚ°'}
            };
            function getShishen(dm, gan) { return SHISHEN_MAP[dm]?.[gan] || ''; }

            let expandedDayunIdx = null;
            let expandedLiunianGanzhi = null;

            function renderTable() {
                const shishenGan = bazi.shishen_gan || {};
                const hiddenGans = bazi.hidden_gans || {};
                const shishenZhi = bazi.shishen_zhi || {};
                const nayin = bazi.nayin || {};
                const dayunList = bazi.dayun || [];

                let cols = [];
                if (expandedLiunianGanzhi) {
                    const lnData = bazi._currentLiunian || {};
                    cols.push({type:'liunian', ganzhi: expandedLiunianGanzhi, label: expandedLiunianGanzhi, shensha: lnData.shensha || [], nayin: lnData.nayin || '', changsheng: ''});
                }
                if (expandedDayunIdx !== null) {
                    const dy = dayunList[expandedDayunIdx];
                    cols.push({type:'dayun', ganzhi: dy.ganzhi, label: dy.start_age+'еІҒ', sub: String(dy.start_year), isCurrent: dy.is_current || (currentYear >= dy.start_year && currentYear <= dy.start_year + 9), shensha: dy.shensha || [], nayin: dy.nayin || '', changsheng: dy.changsheng || ''});
                }
                pillars.forEach((p, i) => {
                    cols.push({type:'natal', ganzhi: bazi[p], label: labels[i], pillar: p, shensha: shenshaPerPillar[p] || [], nayin: nayin[p] || '', changsheng: changshengData[p] || ''});
                });
                const sepIdx = cols.findIndex(c => c.type === 'natal');

                function colShishen(col) {
                    if (col.type === 'natal') return shishenGan[col.pillar] || '';
                    return getShishen(bazi.day_master, col.ganzhi[0]);
                }
                const bs = 'border-right:3px solid var(--accent-gold);';
                function brd(i) { return (i === sepIdx - 1) ? bs : ''; }
                function cc(c) { return c.type === 'liunian' ? '#ff6b6b' : c.type === 'dayun' ? 'var(--accent-jade)' : 'var(--accent-gold)'; }
                function cb(c) { return c.type !== 'natal' ? 'background:var(--bg-card);' : ''; }

                let h = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;text-align:center;font-size:0.85rem;">';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.4rem;font-size:0.75rem;color:'+cc(c)+';font-weight:600;'+brd(i)+'">'+c.label+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.4rem;font-size:0.8rem;color:var(--text-muted);'+brd(i)+'">'+colShishen(c)+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.6rem;font-size:1.3rem;font-weight:bold;color:'+cc(c)+';'+cb(c)+brd(i)+'">'+c.ganzhi[0]+'</td>'; }); h += '</tr>';
                h += '<tr>'; cols.forEach((c,i) => { h += '<td style="padding:0.6rem;font-size:1.3rem;font-weight:bold;color:var(--text-primary);'+cb(c)+brd(i)+'">'+c.ganzhi[1]+'</td>'; }); h += '</tr>';
                h += '<tr>';
                cols.forEach((c,i) => {
                    if (c.type === 'natal') {
                        const hg = hiddenGans[c.pillar] || []; const zs = shishenZhi[c.pillar] || [];
                        h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'">'+hg.map((g,gi) => '<div style="font-size:0.7rem;color:var(--text-muted);">'+g+(zs[gi]||'')+'</div>').join('')+'</td>';
                    } else if (c.type === 'dayun') {
                        const hg = dayunList[expandedDayunIdx]?.hidden_gans || [];
                        h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'">'+hg.map(g => '<div style="font-size:0.7rem;color:var(--text-muted);">'+g+'</div>').join('')+'</td>';
                    } else { h += '<td style="padding:0.3rem;'+cb(c)+brd(i)+'"></td>'; }
                });
                h += '</tr>';
                h += '<tr style="border-top:1px solid var(--border-color);">';
                cols.forEach((c,i) => { h += '<td style="padding:0.3rem;font-size:0.7rem;color:var(--text-muted);'+brd(i)+'">'+(c.nayin||'')+'</td>'; });
                h += '</tr>';
                h += '<tr>';
                cols.forEach((c,i) => { h += '<td style="padding:0.3rem;font-size:0.7rem;color:var(--text-muted);'+brd(i)+'">'+(c.changsheng||'')+'</td>'; });
                h += '</tr>';
                h += '<tr style="border-top:1px solid var(--border-color);">';
                cols.forEach((c,i) => {
                    const ss = (c.shensha || []).join(' ');
                    h += '<td style="padding:0.3rem;font-size:0.65rem;color:#ffd93d;'+brd(i)+'">'+ss+'</td>';
                });
                h += '</tr>';
                h += '</table></div>';
                return h;
            }

            const tableDiv = document.createElement('div');
            tableDiv.id = 'baziTableContainer';
            section.appendChild(tableDiv);
            function refreshTable() { tableDiv.innerHTML = renderTable(); }
            refreshTable();

            section.innerHTML += '<div style="margin-top:0.8rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center;">'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">ж—Ҙдё»пјҡ</span>'+(bazi.day_master||'')+'пјҲ'+(bazi.day_master_wuxing||'')+'пјү</span>'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">и°ғеҖҷпјҡ</span>'+(bazi.tiaohou||'')+'</span>'
                +'<span style="font-size:0.85rem;"><span style="color:var(--accent-gold);">з©әдәЎпјҡ</span>'+(bazi.xunkong?.year||'')+' '+(bazi.xunkong?.day||'')+'</span>'
                +'</div>';

            if (bazi.xi_yong) {
                const xy = bazi.xi_yong;

        function createAstroSection(astro) {
            const section = createSection('иҘҝжҙӢеҚ жҳҹ');

            // жҳҹзӣҳSVG
            const wheelSize = 280;
            const cx = wheelSize / 2, cy = wheelSize / 2, r = 120;
            const signs = ['зҷҪзҫҠ','йҮ‘зүӣ','еҸҢеӯҗ','е·Ёиҹ№','зӢ®еӯҗ','еӨ„еҘі','еӨ©з§Ө','еӨ©иқҺ','е°„жүӢ','ж‘©зҫҜ','ж°ҙз“¶','еҸҢйұј'];
            const signColors = ['#ff6b6b','#ffd93d','#4ecdc4','#a78bfa','#ff6b6b','#ffd93d','#4ecdc4','#a78bfa','#ff6b6b','#ffd93d','#4ecdc4','#a78bfa'];

            // и®Ўз®—е®«еӨҙдҪҚзҪ®
            function signToAngle(signName) {
                const idx = signs.indexOf(signName);
                return idx >= 0 ? idx * 30 : 0;
            }

            // иЎҢжҳҹз¬ҰеҸ·
            const planetSymbols = {'еӨӘйҳі':'вҳү','жңҲдә®':'вҳҪ','ж°ҙжҳҹ':'вҳҝ','йҮ‘жҳҹ':'вҷҖ','зҒ«жҳҹ':'вҷӮ','жңЁжҳҹ':'вҷғ','еңҹжҳҹ':'вҷ„','еӨ©зҺӢжҳҹ':'вҷ…','жө·зҺӢжҳҹ':'вҷҶ','еҶҘзҺӢжҳҹ':'вҷҮ'};
            const planetColors = {'еӨӘйҳі':'#ffd93d','жңҲдә®':'#e8e8e8','ж°ҙжҳҹ':'#4ecdc4','йҮ‘жҳҹ':'#ff9ff3','зҒ«жҳҹ':'#ff6b6b','жңЁжҳҹ':'#a78bfa','еңҹжҳҹ':'#6ea8fe','еӨ©зҺӢжҳҹ':'#4ecdc4','жө·зҺӢжҳҹ':'#6ea8fe','еҶҘзҺӢжҳҹ':'#a78bfa'};

            let svg = `<svg width="${wheelSize}" height="${wheelSize}" viewBox="0 0 ${wheelSize} ${wheelSize}" style="display:block;margin:0 auto;">`;

            // еӨ–еңҲ12е®«
            for (let i = 0; i < 12; i++) {
                const a1 = (i * 30 - 90) * Math.PI / 180;
                const a2 = ((i + 1) * 30 - 90) * Math.PI / 180;
                const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
                const x2 = cx + r * Math.cos(a2), y2 = cy + r * Math.sin(a2);
                const xm = cx + (r - 18) * Math.cos((i * 30 + 15 - 90) * Math.PI / 180);
                const ym = cy + (r - 18) * Math.sin((i * 30 + 15 - 90) * Math.PI / 180);
                svg += `<line x1="${cx}" y1="${cy}" x2="${x1}" y2="${y1}" stroke="rgba(212,165,116,0.2)" stroke-width="0.5"/>`;
                svg += `<text x="${xm}" y="${ym}" fill="${signColors[i]}" font-size="9" text-anchor="middle" dominant-baseline="middle">${signs[i]}</text>`;
            }
            svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(212,165,116,0.4)" stroke-width="1.5"/>`;
            svg += `<circle cx="${cx}" cy="${cy}" r="${r-25}" fill="none" stroke="rgba(212,165,116,0.15)" stroke-width="0.5"/>`;

            // дёҠеҚҮзӮ№ж Үи®°
            if (astro.ascendant_sign) {
                const ascAngle = (signToAngle(astro.ascendant_sign) + (astro.ascendant % 30) - 90) * Math.PI / 180;
                const ax = cx + (r + 12) * Math.cos(ascAngle);
                const ay = cy + (r + 12) * Math.sin(ascAngle);
                svg += `<text x="${ax}" y="${ay}" fill="var(--accent-gold)" font-size="11" text-anchor="middle" dominant-baseline="middle" font-weight="bold">ASC</text>`;
            }

            // еӨ©йЎ¶MCж Үи®°
            if (astro.mc_sign) {
                const mcAngle = (signToAngle(astro.mc_sign) + ((astro.mc || 0) % 30) - 90) * Math.PI / 180;
                const mx = cx + (r + 12) * Math.cos(mcAngle);
                const my = cy + (r + 12) * Math.sin(mcAngle);
                svg += `<text x="${mx}" y="${my}" fill="#ffd93d" font-size="10" text-anchor="middle" dominant-baseline="middle" font-weight="bold">MC</text>`;
            }

            // жңҲдәӨзӮ№ж Үи®°
            if (astro.north_node) {
                const nn = typeof astro.north_node === 'object' ? astro.north_node : {};
                const nnSign = nn.sign || '';
                const nnDeg = nn.degree || nn.longitude || 0;
                if (nnSign) {
                    const nnAngle = (signToAngle(nnSign) + (nnDeg % 30) - 90) * Math.PI / 180;
                    const nnx = cx + (r - 55) * Math.cos(nnAngle);
                    const nny = cy + (r - 55) * Math.sin(nnAngle);
                    svg += `<text x="${nnx}" y="${nny}" fill="#a78bfa" font-size="11" text-anchor="middle" dominant-baseline="middle">вҳҠ</text>`;
                }
            }
            if (astro.south_node) {
                const sn = typeof astro.south_node === 'object' ? astro.south_node : {};
                const snSign = sn.sign || '';
                const snDeg = sn.degree || sn.longitude || 0;
                if (snSign) {
                    const snAngle = (signToAngle(snSign) + (snDeg % 30) - 90) * Math.PI / 180;
                    const snx = cx + (r - 55) * Math.cos(snAngle);
                    const sny = cy + (r - 55) * Math.sin(snAngle);
                    svg += `<text x="${snx}" y="${sny}" fill="#a78bfa" font-size="11" text-anchor="middle" dominant-baseline="middle">вҳӢ</text>`;
                }
            }

            // иЎҢжҳҹ
            const planets = astro.planets || {};
            const placedPlanets = [];
            for (const [name, info] of Object.entries(planets)) {
                const angle = (info.longitude - 90) * Math.PI / 180;
                // йҒҝе…ҚйҮҚеҸ пјҡеҫ®и°ғдҪҚзҪ®
                let pr = r - 40;
                const sym = planetSymbols[name] || name[0];
                const color = planetColors[name] || 'var(--text-primary)';
                let px = cx + pr * Math.cos(angle);
                let py = cy + pr * Math.sin(angle);
                // з®ҖеҚ•йҳІйҮҚеҸ 
                for (const pp of placedPlanets) {
                    const dist = Math.hypot(px - pp.x, py - pp.y);
                    if (dist < 14) {
                        pr -= 12;
                        px = cx + pr * Math.cos(angle);
                        py = cy + pr * Math.sin(angle);
                    }
                }
                placedPlanets.push({x: px, y: py});
                svg += `<text x="${px}" y="${py}" fill="${color}" font-size="13" text-anchor="middle" dominant-baseline="middle">${sym}</text>`;
            }

            svg += '</svg>';

            // иЎҢжҳҹеҲ—иЎЁ
            let planetListHtml = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.3rem;font-size:0.75rem;margin-top:0.5rem;">';
            for (const [name, info] of Object.entries(planets)) {

            }
            planetListHtml += '</div>';

            section.innerHTML += svg;
            section.innerHTML += planetListHtml;

            // иЎҢжҳҹиҜҰжғ…пјҲйҖҶиЎҢгҖҒйҖҹеәҰгҖҒе°Ҡиҙөпјү
            const planetaryDetails = astro.planetary_details || {};
            let detailHtml = '';
            for (const [name, info] of Object.entries(planets)) {
                const sym = planetSymbols[name] || '';

                const extra = planetaryDetails[name] || {};
                const isRetrograde = info.retrograde || extra.retrograde;
                const dignity = info.dignity || extra.dignity;
                const speed = info.speed ?? extra.speed;
                let badges = '';
                if (isRetrograde) badges += '<span style="color:#ff6b6b;font-size:0.6rem;background:rgba(255,107,107,0.15);padding:0.1rem 0.3rem;border-radius:3px;">RйҖҶиЎҢ</span> ';
                if (dignity) badges += `<span style="color:#ffd93d;font-size:0.6rem;background:rgba(255,217,61,0.12);padding:0.1rem 0.3rem;border-radius:3px;">${dignity}</span> `;
                if (speed !== undefined && speed !== null) badges += `<span style="color:var(--text-muted);font-size:0.6rem;">йҖҹ${typeof speed==='number'?speed.toFixed(2):speed}В°/d</span>`;
                if (info.house) badges += `<span style="color:var(--text-muted);font-size:0.6rem;">H${info.house}</span>`;
                if (badges) {
                    if (!detailHtml) detailHtml = '<div style="margin-top:0.5rem;font-size:0.75rem;">';
                    detailHtml += `<div style="margin-bottom:0.15rem;"><span style="color:${color};">${sym}</span> <span style="color:var(--text-primary);">${name}</span> ${badges}</div>`;
                }
            }
            if (detailHtml) { detailHtml += '</div>'; section.innerHTML += detailHtml; }

            // жңҲдәӨзӮ№ & еӨ©йЎ¶
            const nodes = astro.nodes || {};
            const northNode = nodes.north_node || astro.north_node;
            const southNode = nodes.south_node || astro.south_node;
            const mcData = astro.mc || astro.midheaven;
            let extraPoints = '';
            if (northNode) {
                const nn = typeof northNode === 'object' ? northNode : {};
                extraPoints += `<div style="background:var(--bg-card);padding:0.3rem 0.5rem;border-radius:4px;font-size:0.75rem;"><span style="color:#a78bfa;">вҳҠ</span> еҢ—дәӨ <span style="color:var(--accent-gold);">${nn.sign||northNode}</span> ${nn.degree?.toFixed(1)||''}В°</div>`;
            }
            if (southNode) {
                const sn = typeof southNode === 'object' ? southNode : {};
                extraPoints += `<div style="background:var(--bg-card);padding:0.3rem 0.5rem;border-radius:4px;font-size:0.75rem;"><span style="color:#a78bfa;">вҳӢ</span> еҚ—дәӨ <span style="color:var(--accent-gold);">${sn.sign||southNode}</span> ${sn.degree?.toFixed(1)||''}В°</div>`;
            }
            if (mcData) {

            // зӣёдҪҚ

            section.innerHTML += `<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.5rem;">
                е№ҙжҹұпјҡ${taiyi.year_ganzhi||''} В· жңҲжҹұпјҡ${taiyi.month_ganzhi||''} В· ж—Ҙжҹұпјҡ${taiyi.day_ganzhi||''} В· ж—¶жҹұпјҡ${taiyi.hour_ganzhi||''}

            let sjHtml = '<div style="margin-top:0.5rem;"><div style="font-size:0.85rem;color:var(--accent-gold);margin-bottom:0.4rem;">еӣӣи®Ў</div>';

                гҖҖ<span style="color:var(--accent-gold);">дә”зҰҸпјҡ</span>${wuFu}

            // дё»е®ўе®ҡз®—
            const zhuSuan = taiyi.zhu_suan || [];
            const keSuan = taiyi.ke_suan || [];
            const dingSuan = taiyi.ding_suan || [];
            section.innerHTML += `<div style="margin-top:0.5rem;font-size:0.8rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;">
                <span style="color:#4ecdc4;">дё»з®—пјҡ${Array.isArray(zhuSuan)?zhuSuan.join(' '):zhuSuan}</span> В·
                <span style="color:#ff6b6b;">е®ўз®—пјҡ${Array.isArray(keSuan)?keSuan.join(' '):keSuan}</span> В·
                <span style="color:var(--accent-gold);">е®ҡз®—пјҡ${Array.isArray(dingSuan)?dingSuan.join(' '):dingSuan}</span>

            // еӨӘд№ҷе…«й—Ё
            const baMen = taiyi.ba_men_dist || {};

                section.innerHTML += bmHtml;
            }

            // з»јеҗҲеҲӨж–ӯ
            const suanAnalysis = taiyi.suan_analysis || {};
            if (suanAnalysis.pan_duan) {
                section.innerHTML += `<div style="margin-top:0.5rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;border-left:3px solid var(--accent-gold);font-size:0.8rem;color:var(--text-primary);">

            // еҗ„зұ»зҘһз…һ
            const extras = [

                {name:'дё»е®ў', val:taiyi.zhu_ke},
                {name:'иғңиҙҹ', val:taiyi.sheng_fu},
                {name:'еӨ§жёё', val:taiyi.da_you},

            let exHtml = '<div style="margin-top:0.5rem;font-size:0.75rem;color:var(--text-muted);">';
            extras.forEach(e => {
                if (e.val) exHtml += `<div style="margin-bottom:0.2rem;"><span style="color:var(--accent-gold);">${e.name}пјҡ</span>${e.val}</div>`;
            });
            exHtml += '</div>';
            section.innerHTML += exHtml;

            return section;
        }

        async function askQuestion() {
            const question = document.getElementById('qaQuestion').value;
            if (!question) return;

            const resultDiv = document.getElementById('qaResult');
            resultDiv.classList.remove('active');

            try {
                // и°ғз”Ёй—®зӯ”APIпјҲйҖҡиҝҮ api.js е°ҒиЈ…пјҢеёҰи¶…ж—¶еӨ„зҗҶпјү
                const data = await api.ask(birth, location, gender, question);

                document.getElementById('qaType').textContent = data.question_type || '';
                const confBadge = document.getElementById('qaConfidence');
                confBadge.textContent = (data.confidence || '') + 'зҪ®дҝЎеәҰ';
                confBadge.className = 'qa-confidence confidence-' + (data.confidence || 'low').toLowerCase();

                document.getElementById('qaAnswer').textContent = data.answer || '';

                const kpDiv = document.getElementById('qaKeypoints');
                kpDiv.innerHTML = '';
                (data.key_points || []).forEach(p => {
                    kpDiv.innerHTML += `<div class="qa-keypoint">${p}</div>`;
                });

                resultDiv.classList.add('active');
            } catch (e) {
                showError(e.message);
            }
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function shareChart() {
            const url = window.location.href;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(url).then(() => {
                    alert('й“ҫжҺҘе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ');
                }).catch(() => {
                    prompt('еӨҚеҲ¶жӯӨй“ҫжҺҘеҲҶдә«пјҡ', url);
                });
            } else {
                prompt('еӨҚеҲ¶жӯӨй“ҫжҺҘеҲҶдә«пјҡ', url);
            }
        }

        // еҠ иҪҪ
        loadChart();
        } catch(e) { document.body.innerHTML = '<div style="padding:2rem;color:#ff6b6b;font-size:1rem;background:#1a1a2e;min-height:100vh;"><b>JSй”ҷиҜҜ:</b> ' + e.message + '<br><b>ж–Үд»¶:</b> ' + (e.filename||'') + '<br><b>иЎҢ:</b> ' + (e.lineno||'') + '<br><b>еҲ—:</b> ' + (e.colno||'') + '</div>'; }
    </script>
