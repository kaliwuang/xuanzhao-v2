<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 - 辩论台</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <a href="#main-content" class="skip-link">跳过导航</a>

    <nav class="nav" class="nav-sticky" aria-label="主导航">
        <a href="/" class="nav-brand">玄照 <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/">排盘</a>
            <a href="/perspectives">108视角</a>
            <a href="/debate" class="active">辩论台</a>
        </div>
    </nav>

    <div class="container" id="main-content">
        <!-- 输入面板 -->
        <div class="input-panel">
            <h2>辩论问题</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>出生年份</label>
                    <select id="birthYear"><option value="">-- 年 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生月份</label>
                    <select id="birthMonth"><option value="">-- 月 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <select id="birthDay"><option value="">-- 日 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生时辰</label>
                    <select id="birthHour">
                        <option value="">-- 时辰 --</option>
                        <option value="00:00">子时 (23-01)</option>
                        <option value="01:00">丑时 (01-03)</option>
                        <option value="03:00">寅时 (03-05)</option>
                        <option value="05:00">卯时 (05-07)</option>
                        <option value="07:00">辰时 (07-09)</option>
                        <option value="09:00">巳时 (09-11)</option>
                        <option value="11:00">午时 (11-13)</option>
                        <option value="13:00">未时 (13-15)</option>
                        <option value="15:00">申时 (15-17)</option>
                        <option value="17:00">酉时 (17-19)</option>
                        <option value="19:00">戌时 (19-21)</option>
                        <option value="21:00">亥时 (21-23)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>出生地点</label>
                    <input type="text" id="location" placeholder="如 呼和浩特">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="男" selected>男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2">
                    <label>问题</label>
                    <input type="text" id="question" placeholder="请输入要问的问题">
                </div>
            </div>

            <!-- 人物选择 -->
            <div class="figure-select" id="figureSelect" style="margin-top:1.5rem">
                <div style="color:var(--accent-gold); margin-bottom:0.8rem; font-size:0.95rem;">
                    选择参与辩论的人物（留空则全部参与）
                </div>
                <div class="figure-grid" id="figureGrid">
                    <div class="data-muted">正在加载人物...</div>
                </div>
            </div>

            <div>
                <button class="btn btn-primary" onclick="startDebate()">开始辩论</button>
            </div>
        </div>

        <!-- 加载 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在召集人物，准备辩论...</p>
        </div>

        <!-- 错误 -->
        <div id="error" class="error-message hidden"></div>

        <!-- 辩论结果 -->
        <div id="debateResult" class="hidden">
            <!-- 参与者 -->
            <div class="card">
                <div class="card-title">参与者</div>
                <div class="debate-participants" id="participants"></div>
            </div>

            <!-- 第一轮：独白 -->
            <div class="card">
                <div class="card-title">第一轮：各抒己见</div>
                <div id="round1"></div>
            </div>

            <!-- 第二轮：交锋 -->
            <div class="card">
                <div class="card-title">第二轮：交锋辩论</div>
                <div id="round2"></div>
            </div>

            <!-- 共识与分歧 -->
            <div class="card">
                <div class="card-title">共识与分歧</div>
                <div style="margin-bottom:1rem">
                    <strong class="text-jade">共识：</strong>
                    <div id="consensus"></div>
                </div>
                <div>
                    <strong class="text-red">分歧：</strong>
                    <div id="disagreements"></div>
                </div>
            </div>

            <!-- 玄照视角 -->
            <div class="card" id="xuanzhaoCard" style="display:none; border-color:var(--accent-gold);">
                <div class="card-title data-gold">玄照视角 · 八术照见</div>
                <div id="xuanzhaoPerspective" style="line-height:1.8"></div>
            </div>

            <!-- 总结 -->
            <div class="card">
                <div class="card-title">&#x603B;&#x7ED3;</div>
                <div id="summary" style="line-height:1.8"></div>
            </div>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script>
        // 从URL参数读取
        const params = new URLSearchParams(window.location.search);
        // 填充年月下拉框
        (function() {
            const yearSel = document.getElementById('birthYear');
            for (let y = 2026; y >= 1930; y--) { const o = document.createElement('option'); o.value = y; o.textContent = y + '年'; yearSel.appendChild(o); }
            const monthSel = document.getElementById('birthMonth');
            for (let m = 1; m <= 12; m++) { const o = document.createElement('option'); o.value = m; o.textContent = m + '月'; monthSel.appendChild(o); }
            function updateDays() {
                const daySel = document.getElementById('birthDay'), cur = daySel.value;
                const y = parseInt(yearSel.value), m = parseInt(monthSel.value);
                const max = m === 2 ? (y && y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0) ? 29 : 28) : ([4,6,9,11].includes(m) ? 30 : 31);
                daySel.innerHTML = '<option value="">-- 日 --</option>';
                for (let d = 1; d <= (max || 31); d++) { const o = document.createElement('option'); o.value = d; o.textContent = d + '日'; daySel.appendChild(o); }
                if (cur && cur <= max) daySel.value = cur;
            }
            yearSel.addEventListener('change', updateDays);
            monthSel.addEventListener('change', updateDays);
            updateDays();
            // 从URL参数恢复
            const b = params.get('birth');
            if (b && b.match(/\d{4}-\d{2}-\d{2} \d{2}:\d{2}/)) {
                const parts = b.split(/[- :]/);
                yearSel.value = parts[0]; monthSel.value = parseInt(parts[1]); updateDays();
                document.getElementById('birthDay').value = parseInt(parts[2]);
                document.getElementById('birthHour').value = parts[3] + ':' + parts[4];
            }
            if (params.get('location')) document.getElementById('location').value = params.get('location');
            if (params.get('gender')) document.getElementById('gender').value = params.get('gender');
        })();
        function getBirth() {
            const y = document.getElementById('birthYear').value, m = document.getElementById('birthMonth').value;
            const d = document.getElementById('birthDay').value, h = document.getElementById('birthHour').value;
            if (!y || !m || !d || !h) return '';
            return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0') + ' ' + h;
        }

        let figureData = {};
        let selectedFigures = new Set();

        // 加载人物列表
        async function loadFigures() {
            try {
                const data = await api.getFigures();
                figureData = data;
                renderFigureGrid(data);
            } catch (e) {
                document.getElementById('figureGrid').innerHTML =
                    '<div style="color:var(--text-muted);">加载人物失败：' + e.message + '</div>';
            }
        }

        function renderFigureGrid(figures) {
            const grid = document.getElementById('figureGrid');
            grid.innerHTML = '';
            grid.className = 'figure-grid';

            Object.entries(figures).forEach(([id, f]) => {
                const card = document.createElement('div');
                card.className = 'figure-card' + (selectedFigures.has(id) ? ' selected' : '');
                card.dataset.id = id;
                card.onclick = () => toggleFigure(id, card);

                card.innerHTML = `
                    <div class="figure-card-name">${f.name}</div>
                    <div class="figure-card-title">${f.title || ''}</div>
                    <div class="figure-card-method">${f.primary_method || ''}</div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleFigure(id, card) {
            if (selectedFigures.has(id)) {
                selectedFigures.delete(id);
                card.classList.remove('selected');
            } else {
                selectedFigures.add(id);
                card.classList.add('selected');
            }
        }

        async function startDebate() {
            const birth = getBirth();
            const location = document.getElementById('location').value;
            const gender = document.getElementById('gender').value;
            const question = document.getElementById('question').value;

            if (!birth || !question) {
                showError('请输入出生时间和问题');
                return;
            }

            showLoading(true);
            hideError();

            const figures = selectedFigures.size > 0 ? Array.from(selectedFigures).join(',') : null;

            try {
                const data = await api.getDebate(birth, location, gender, question, figures);
                renderDebate(data);
                showLoading(false);
                document.getElementById('debateResult').style.display = 'block';
            } catch (e) {
                showLoading(false);
                showError(e.message);
            }
        }

        function renderDebate(data) {
            // 参与者统计
            const partContainer = document.getElementById('participants');
            partContainer.innerHTML = '';
            
            // 按阵营分组
            const factions = {};
            data.participants?.forEach(p => {
                const f = p.faction || '其他';
                if (!factions[f]) factions[f] = [];
                factions[f].push(p);
            });
            
            // 显示统计
            const statsDiv = document.createElement('div');
            statsDiv.style.cssText = 'margin-bottom:1rem; color:var(--text-muted); font-size:0.9rem;';
            statsDiv.innerHTML = `共 <strong class="data-gold">${data.participants?.length || 0}</strong> 位人物参与，涵盖 <strong class="data-gold">${Object.keys(factions).length}</strong> 个阵营`;
            partContainer.appendChild(statsDiv);
            
            // 按阵营展示参与者
            Object.entries(factions).forEach(([faction, members]) => {
                const factionDiv = document.createElement('div');
                factionDiv.style.cssText = 'margin-bottom:0.8rem;';
                factionDiv.innerHTML = `<div style="color:var(--accent-gold); font-size:0.85rem; margin-bottom:0.3rem;">${faction}（${members.length}人）</div>`;
                
                const membersDiv = document.createElement('div');
                membersDiv.style.cssText = 'display:flex; flex-wrap:wrap; gap:0.3rem;';
                members.forEach(p => {
                    const tag = document.createElement('span');
                    tag.style.cssText = 'padding:0.2rem 0.5rem; background:var(--bg-card); border-radius:4px; font-size:0.8rem; border:1px solid var(--border);';
                    tag.textContent = p.name;
                    tag.title = `${p.method}：${p.stance?.substring(0, 50) || ''}`;
                    membersDiv.appendChild(tag);
                });
                factionDiv.appendChild(membersDiv);
                partContainer.appendChild(factionDiv);
            });

            // 辩论发言（按时间顺序，区分陈述和反驳）
            const round1Container = document.getElementById('round1');
            round1Container.innerHTML = '';
            
            const exchanges = data.exchanges || [];
            exchanges.forEach((e, idx) => {
                const div = document.createElement('div');
                const isRebuttal = e.rebuttal_type?.includes('反驳');
                div.className = 'exchange' + (isRebuttal ? ' rebuttal' : '');
                div.style.cssText = isRebuttal 
                    ? 'border-left:3px solid var(--danger); padding-left:0.8rem; margin:0.5rem 0;'
                    : 'border-left:3px solid var(--accent-gold); padding-left:0.8rem; margin:0.5rem 0;';
                
                const typeBadge = isRebuttal 
                    ? '<span style="color:var(--danger); font-size:0.75rem;">【反驳】</span>'
                    : '<span style="color:var(--accent-gold); font-size:0.75rem;">【陈述】</span>';
                
                const targetInfo = e.target 
                    ? ` → <span class="exchange-target">${e.target}</span>`
                    : '';
                
                div.innerHTML = `
                    <div>${typeBadge} <span class="exchange-speaker">${e.speaker}</span>（${e.speaker_method}）${targetInfo}</div>
                    <div class="exchange-text">${e.argument}</div>
                `;
                round1Container.appendChild(div);
            });

            // 隐藏第二轮（新机制不再分轮）
            document.getElementById('round2').parentElement.style.display = 'none';

            // 共识
            const consensusContainer = document.getElementById('consensus');
            consensusContainer.innerHTML = '';
            data.consensus?.forEach(c => {
                const div = document.createElement('div');
                div.className = 'consensus-item';
                div.textContent = c;
                consensusContainer.appendChild(div);
            });

            // 分歧
            const disagreementsContainer = document.getElementById('disagreements');
            disagreementsContainer.innerHTML = '';
            data.disagreements?.forEach(d => {
                const div = document.createElement('div');
                div.className = 'conflict-item';
                div.innerHTML = `<strong>${d.between?.join(' vs ')}</strong>：${d.aspect || '观点对立'}`;
                disagreementsContainer.appendChild(div);
            });

            // 玄照视角
            const xuanzhaoCard = document.getElementById('xuanzhaoCard');
            const xuanzhaoContainer = document.getElementById('xuanzhaoPerspective');
            if (data.xuanzhao_perspective) {
                xuanzhaoCard.style.display = 'block';
                const xz = data.xuanzhao_perspective;
                let xzHtml = '';
                xzHtml += `<div style="font-size:1.1rem; color:var(--accent-gold); margin-bottom:0.5rem;">${xz.figure_name} · ${xz.figure_title}</div>`;
                xzHtml += `<div style="font-size:1rem; margin-bottom:0.8rem;"><strong>立场：</strong>${xz.stance}</div>`;
                xzHtml += `<div style="margin-bottom:0.5rem"><strong>置信度：</strong>${(xz.confidence * 100).toFixed(0)}%</div>`;
                if (xz.key_points?.length) {
                    xzHtml += `<div style="margin-bottom:0.5rem"><strong>关键要点：</strong>${xz.key_points.join(' · ')}</div>`;
                }
                // 深度推理（区分 LLM 模式和规则模式）
                if (typeof xz.reasoning === 'string' && xz.reasoning.length > 0) {
                    // LLM 合成模式：reasoning 是深度分析文本
                    xzHtml += `<div style="margin-top:0.8rem; padding:0.8rem; background:var(--bg-card); border-radius:8px; border-left:3px solid var(--accent-gold);">`;
                    xzHtml += `<div style="color:var(--accent-gold); font-size:0.85rem; margin-bottom:0.5rem;">深度综合分析</div>`;
                    xzHtml += `<div style="line-height:1.9; white-space:pre-wrap;">${xz.reasoning}</div>`;
                    xzHtml += `</div>`;
                } else if (xz.reasoning?.methods?.length) {
                    // 规则模式：reasoning 是统计信息对象
                    xzHtml += `<div style="color:var(--text-muted); font-size:0.9rem;">综合分析${xz.reasoning.participants}位人物 · ${xz.reasoning.methods.length}种术法</div>`;
                }
                // 合成模式标记
                if (xz.synthesis_mode) {
                    const modeLabel = xz.synthesis_mode === 'llm' ? '深度合成' : '规则推理';
                    const modeColor = xz.synthesis_mode === 'llm' ? 'var(--accent-gold)' : 'var(--text-muted)';
                    xzHtml += `<div style="margin-top:0.3rem; font-size:0.8rem; color:${modeColor};">合成模式：${modeLabel}</div>`;
                }
                // 玄照视角内的共识
                if (xz.consensus?.length) {
                    xzHtml += `<div style="margin-top:0.6rem;"><strong style="color:var(--success); font-size:0.85rem;">共识：</strong>`;
                    xzHtml += `<span style="font-size:0.85rem;">${xz.consensus.join(' · ')}</span></div>`;
                }
                // 玄照视角内的分歧
                if (xz.disagreements?.length) {
                    xzHtml += `<div style="margin-top:0.3rem;"><strong style="color:var(--danger); font-size:0.85rem;">分歧：</strong>`;
                    xz.disagreements.forEach(d => {
                        xzHtml += `<span style="font-size:0.85rem;">${d.between?.join(' vs ')}；</span>`;
                    });
                    xzHtml += `</div>`;
                }
                if (xz.quotes?.length) {
                    xzHtml += `<div style="margin-top:0.8rem; color:var(--accent-gold); font-style:italic;">「${xz.quotes[0]}」</div>`;
                }
                xuanzhaoContainer.innerHTML = xzHtml;
            } else {
                xuanzhaoCard.style.display = 'none';
            }

            // 总结
            document.getElementById('summary').textContent = data.summary || '';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // 页面加载时获取人物列表
        loadFigures();
    </script>
    <footer class="footer">
        <div class="footer-divider"></div>
        <p>玄照 v2.0 · 八术排盘 · 交叉验证 · 108视角群体智能</p>
    </footer>
</body>
</html>
