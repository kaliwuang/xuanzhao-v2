<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 - 串行审判辩论台</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .debate-container { max-width: 900px; margin: 0 auto; }
        .speaker-card { background: var(--bg-card); border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; border: 1px solid var(--border-color); }
        .speaker-card.active { border-color: var(--accent-gold); box-shadow: 0 0 20px rgba(212,165,116,0.15); }
        .speaker-card.passed { border-left: 4px solid #4ecdc4; }
        .speaker-card.failed { border-left: 4px solid #ff6b6b; }
        .statement-box { background: var(--bg-secondary); border-radius: 8px; padding: 1rem; margin: 0.8rem 0; line-height: 1.8; font-size: 0.9rem; }
        .judgment-item { display: flex; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .judgment-pass { color: #4ecdc4; }
        .judgment-fail { color: #ff6b6b; }
        .progress-bar { height: 6px; background: var(--bg-card); border-radius: 3px; overflow: hidden; margin: 0.5rem 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4ecdc4, #44bd32); transition: width 0.3s; }
        .progress-fill.low { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
        .stats-bar { display: flex; flex-wrap: wrap; gap: 1rem; padding: 1rem; background: var(--bg-card); border-radius: 8px; margin-bottom: 1rem; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: var(--accent-gold); }
        .stat-label { font-size: 0.7rem; color: var(--text-muted); }
        .judge-list { max-height: 200px; overflow-y: auto; margin-top: 0.5rem; }
        .log-entry { font-size: 0.75rem; color: var(--text-muted); padding: 0.15rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .controls { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .current-speaker-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4ecdc4; animation: pulse 1.5s infinite; margin-right: 0.5rem; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">跳过导航</a>
    <nav class="nav nav-sticky" aria-label="主导航">
        <a href="/" class="nav-brand">玄照 <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/">排盘</a>
            <a href="/perspectives">108视角</a>
            <a href="/debate" class="active">辩论台</a>
        </div>
    </nav>

    <div class="container debate-container" id="main-content">
        <h1 style="text-align:center;color:var(--accent-gold);margin-bottom:0.5rem;">串行审判辩论台</h1>
        <p style="text-align:center;color:var(--text-muted);font-size:0.85rem;margin-bottom:1.5rem;">
            108人轮流发言 → 逐人审判 → 90%通过率方可过关 → 下一位
        </p>

        <!-- 输入区 -->
        <div class="input-panel" id="inputPanel">
            <div class="form-grid">
                <div class="form-group">
                    <label>出生年份</label>
                    <select id="birthYear"><option value="">-- 年 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生月份</label>
                    <select id="birthMonth"><option value="">-- 月 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <select id="birthDay"><option value="">-- 日 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生时辰</label>
                    <select id="birthHour">
                        <option value="">-- 时辰 --</option>
                        <option value="00:00">子时</option><option value="01:00">丑时</option>
                        <option value="03:00">寅时</option><option value="05:00">卯时</option>
                        <option value="07:00">辰时</option><option value="09:00">巳时</option>
                        <option value="11:00">午时</option><option value="13:00">未时</option>
                        <option value="15:00">申时</option><option value="17:00">酉时</option>
                        <option value="19:00">戌时</option><option value="21:00">亥时</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>出生地点</label>
                    <input type="text" id="location" value="" placeholder="如 呼和浩特">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender"><option value="男">男</option><option value="女">女</option></select>
                </div>
            </div>
            <div class="form-group" style="margin-top:0.5rem;">
                <label>辩论问题</label>
                <input type="text" id="question" value="此人事业如何？" placeholder="输入你想问的问题">
            </div>
            <div class="controls" style="margin-top:0.8rem;">
                <button class="btn btn-primary" id="btnStart" onclick="startDebate()">开始辩论</button>
                <button class="btn btn-secondary" id="btnStop" onclick="stopDebate()" style="display:none;">停止</button>
            </div>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat-item"><div class="stat-value" id="statTotal">0</div><div class="stat-label">总人数</div></div>
            <div class="stat-item"><div class="stat-value" id="statCompleted">0</div><div class="stat-label">已完成</div></div>
            <div class="stat-item"><div class="stat-value" id="statCurrent">-</div><div class="stat-label">当前发言</div></div>
            <div class="stat-item"><div class="stat-value" id="statAttempt">0</div><div class="stat-label">当前尝试</div></div>
            <div class="stat-item"><div class="stat-value" id="statPassRate">0%</div><div class="stat-label">通过率</div></div>
        </div>

        <!-- 实时日志 -->
        <div id="logPanel" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem;">
                <span style="color:var(--accent-gold);font-size:0.85rem;">实时日志</span>
                <button class="btn btn-ghost" style="font-size:0.7rem;padding:0.2rem 0.5rem;" onclick="toggleLog()">折叠</button>
            </div>
            <div id="logContent" style="max-height:200px;overflow-y:auto;background:var(--bg-card);border-radius:6px;padding:0.5rem;margin-bottom:1rem;"></div>
        </div>

        <!-- 发言历史 -->
        <div id="historyPanel" style="display:none;">
            <div style="color:var(--accent-gold);font-size:0.85rem;margin-bottom:0.5rem;">发言记录（点击展开）</div>
            <div id="historyContent"></div>
        </div>

        <!-- 当前发言详情 -->
        <div id="currentPanel" style="display:none;">
            <div class="speaker-card active" id="currentCard">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <span class="current-speaker-indicator"></span>
                        <span style="color:var(--accent-gold);font-weight:700;font-size:1.1rem;" id="currentSpeaker"></span>
                        <span style="color:var(--text-muted);font-size:0.8rem;margin-left:0.5rem;" id="currentMethod"></span>
                    </div>
                    <span style="font-size:0.8rem;color:var(--text-muted);" id="currentAttempt"></span>
                </div>
                <div class="statement-box" id="currentStatement">等待发言...</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
                <div style="font-size:0.75rem;color:var(--text-muted);display:flex;justify-content:space-between;">
                    <span>通过率：<span id="passRateText">0%</span></span>
                    <span id="judgeCount">0/0 审判</span>
                </div>
                <div class="judge-list" id="judgeList"></div>
            </div>
        </div>

        <!-- 结论面板 -->
        <div id="conclusionPanel" style="display:none;margin-top:1.5rem;">
            <div class="card" style="border:2px solid var(--accent-gold);border-radius:12px;padding:1.5rem;">
                <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;">
                    <span style="font-size:1.5rem;">🔮</span>
                    <span style="font-size:1.2rem;font-weight:700;color:var(--accent-gold);">玄照综合判定</span>
                    <span id="conclusionConfidence" style="font-size:0.8rem;padding:0.2rem 0.6rem;border-radius:12px;background:var(--bg-card);"></span>
                </div>
                <div id="conclusionStance" style="font-size:1.1rem;font-weight:600;margin-bottom:1rem;line-height:1.6;"></div>
                <div id="conclusionKeyPoints" style="margin-bottom:1rem;"></div>
                <div id="conclusionConsensus" style="margin-bottom:0.8rem;"></div>
                <div id="conclusionDisagreements"></div>
                <div id="conclusionSummary" style="margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border-subtle);color:var(--text-muted);font-size:0.85rem;"></div>
                <div style="margin-top:1.2rem;display:flex;gap:0.8rem;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="downloadReport()" style="font-size:0.85rem;">📥 下载报告 (Markdown)</button>
                </div>
            </div>
        </div>

        <!-- 溟玄终审面板 -->
        <div id="mingxuanPanel" style="display:none;margin-top:1.5rem;">
            <div class="card" style="border:2px solid #8b5cf6;border-radius:12px;padding:1.5rem;background:linear-gradient(135deg,rgba(139,92,246,0.05),rgba(30,30,40,0.95));">
                <div style="display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;">
                    <span style="font-size:1.5rem;">👁</span>
                    <span style="font-size:1.2rem;font-weight:700;color:#8b5cf6;">溟玄终审</span>
                    <span id="mingxuanStatus" style="font-size:0.8rem;padding:0.2rem 0.6rem;border-radius:12px;background:var(--bg-card);"></span>
                </div>
                <div id="mingxuanText" style="font-size:1rem;line-height:1.8;white-space:pre-wrap;color:var(--text-primary);"></div>
                <div id="mingxuanIssues" style="margin-top:0.8rem;font-size:0.8rem;color:var(--text-muted);"></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-divider"></div>
        <p>玄照 v2.0 · 串行审判辩论台 · 108人全员参与</p>
    </footer>

    <script src="/static/js/api.js"></script>
    <script>
    // 填充下拉框
    document.addEventListener('DOMContentLoaded', function() {
        var yearSel = document.getElementById('birthYear');
        for (var y = 2026; y >= 1930; y--) { var o = document.createElement('option'); o.value = y; o.textContent = y + '年'; yearSel.appendChild(o); }
        var monthSel = document.getElementById('birthMonth');
        for (var m = 1; m <= 12; m++) { var o = document.createElement('option'); o.value = m; o.textContent = m + '月'; monthSel.appendChild(o); }
        function updateDays() {
            var daySel = document.getElementById('birthDay');
            var cur = daySel.value;
            var y = parseInt(yearSel.value), m = parseInt(monthSel.value);
            var max = m === 2 ? (y && y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0) ? 29 : 28) : ([4,6,9,11].indexOf(m) >= 0 ? 30 : 31);
            daySel.innerHTML = '<option value="">-- 日 --</option>';
            for (var d = 1; d <= (max || 31); d++) { var o = document.createElement('option'); o.value = d; o.textContent = d + '日'; daySel.appendChild(o); }
            if (cur && cur <= max) daySel.value = cur;
        }
        yearSel.addEventListener('change', updateDays);
        monthSel.addEventListener('change', updateDays);
        updateDays();
    });

    let eventSource = null;
    let completedCount = 0;
    let totalSpeakers = 0;
    let logExpanded = true;
    const allRounds = [];

    function getBirth() {
        var y = document.getElementById('birthYear').value;
        var m = document.getElementById('birthMonth').value;
        var d = document.getElementById('birthDay').value;
        var h = document.getElementById('birthHour').value;
        if (!y || !m || !d || !h) return '';
        return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0') + ' ' + h;
    }

    function addLog(text, type) {
        const log = document.getElementById('logContent');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const color = type === 'pass' ? '#4ecdc4' : type === 'fail' ? '#ff6b6b' : type === 'info' ? 'var(--accent-gold)' : 'var(--text-muted)';
        entry.innerHTML = `<span style="color:var(--text-muted)">${time}</span> <span style="color:${color}">${text}</span>`;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
    }

    function toggleLog() {
        logExpanded = !logExpanded;
        document.getElementById('logContent').style.display = logExpanded ? 'block' : 'none';
    }

    function startDebate() {
        const birth = getBirth();
        if (!birth) { alert('请选择完整的出生年月日时'); return; }
        const location = document.getElementById('location').value;
        const gender = document.getElementById('gender').value;
        const question = document.getElementById('question').value;
        if (!question) { alert('请输入问题'); return; }

        // 重置状态
        completedCount = 0;
        allRounds.length = 0;
        document.getElementById('historyContent').innerHTML = '';
        document.getElementById('logContent').innerHTML = '';
        document.getElementById('judgeList').innerHTML = '';
        document.getElementById('conclusionPanel').style.display = 'none';
        document.getElementById('mingxuanPanel').style.display = 'none';

        // 显示面板
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('logPanel').style.display = 'block';
        document.getElementById('currentPanel').style.display = 'block';
        document.getElementById('historyPanel').style.display = 'block';
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';

        addLog('辩论开始...', 'info');

        // SSE连接 - 使用快速端点（108人模板推理，实时流式）
        const params = new URLSearchParams({ birth, location, gender, question });
        eventSource = new EventSource('/api/debate/stream-fast?' + params);

        eventSource.addEventListener('start', function(e) {
            const data = JSON.parse(e.data);
            totalSpeakers = data.total_speakers;
            document.getElementById('statTotal').textContent = totalSpeakers;
            addLog(`共${totalSpeakers}位发言者参与`, 'info');
        });

        eventSource.addEventListener('speaker_start', function(e) {
            const data = JSON.parse(e.data);
            document.getElementById('currentSpeaker').textContent = data.speaker;
            document.getElementById('currentMethod').textContent = `(${data.method})`;
            document.getElementById('currentAttempt').textContent = `第${data.index}/${data.total}位`;
            document.getElementById('currentStatement').textContent = '准备发言...';
            document.getElementById('judgeList').innerHTML = '';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('passRateText').textContent = '0%';
            document.getElementById('judgeCount').textContent = '0/0';
            document.getElementById('statCurrent').textContent = data.speaker;
            addLog(`【${data.index}/${data.total}】${data.speaker}（${data.method}）准备发言`, 'info');
        });

        eventSource.addEventListener('statement', function(e) {
            const data = JSON.parse(e.data);
            document.getElementById('currentStatement').textContent = data.statement;
            document.getElementById('statAttempt').textContent = data.attempt;
            if (data.attempt > 1) {
                addLog(`${data.speaker} 第${data.attempt}次修正发言`, 'info');
            }
        });

        eventSource.addEventListener('judgment_progress', function(e) {
            const data = JSON.parse(e.data);
            document.getElementById('passRateText').textContent = data.pass_rate + '%';
            document.getElementById('judgeCount').textContent = `${data.judge_index}/${data.total_judges}`;
            document.getElementById('statPassRate').textContent = data.pass_rate + '%';

            const fill = document.getElementById('progressFill');
            fill.style.width = data.pass_rate + '%';
            fill.className = data.pass_rate >= 90 ? 'progress-fill' : 'progress-fill low';

            // 添加审判记录
            const list = document.getElementById('judgeList');
            const item = document.createElement('div');
            item.className = 'judgment-item';
            const cls = data.passed ? 'judgment-pass' : 'judgment-fail';
            const icon = data.passed ? '✓' : '✗';
            item.innerHTML = `<span class="${cls}">${icon}</span> <span style="color:var(--text-primary)">${data.judge}</span> <span class="${cls}">${data.feedback}</span>`;
            list.appendChild(item);
            list.scrollTop = list.scrollHeight;
        });

        eventSource.addEventListener('speaker_passed', function(e) {
            const data = JSON.parse(e.data);
            completedCount++;
            document.getElementById('statCompleted').textContent = completedCount;
            addLog(`✓ ${data.speaker} 通过（第${data.attempt}次，${data.pass_rate}%）`, 'pass');

            // 添加到历史
            addToHistory(data.speaker, data.statement, data.pass_rate, data.attempt, true);
        });

        eventSource.addEventListener('speaker_rejected', function(e) {
            const data = JSON.parse(e.data);
            addLog(`✗ ${data.speaker} 被驳回（${data.pass_rate}%），准备修正`, 'fail');
            // 清空审判列表准备下一轮
            document.getElementById('judgeList').innerHTML = '';
        });

        eventSource.addEventListener('speaker_forced', function(e) {
            const data = JSON.parse(e.data);
            completedCount++;
            document.getElementById('statCompleted').textContent = completedCount;
            addLog(`⚠ ${data.speaker} 强制通过（${data.attempts}次尝试，${data.pass_rate}%）`, 'fail');
            addToHistory(data.speaker, '(强制通过)', data.pass_rate, data.attempts, false);
        });

        eventSource.addEventListener('early_stop', function(e) {
            const data = JSON.parse(e.data);
            addLog(`⏩ ${data.speaker} 审判提前结束（${data.reason}）`, 'info');
        });

        eventSource.addEventListener('xuanzhao_start', function(e) {
            addLog('🔮 玄照综合推理中...', 'info');
        });

        eventSource.addEventListener('xuanzhao_result', function(e) {
            const data = JSON.parse(e.data);
            addLog(`🔮 玄照判定：${data.stance || '综合分析完成'}（置信度${Math.round((data.confidence||0)*100)}%）`, 'pass');

            // 填充结论面板
            const panel = document.getElementById('conclusionPanel');
            panel.style.display = 'block';

            document.getElementById('conclusionConfidence').textContent = `置信度 ${Math.round((data.confidence||0)*100)}%`;
            document.getElementById('conclusionStance').textContent = data.stance || '综合分析完成';

            // 核心观点
            const kp = data.key_points || [];
            const kpHtml = kp.length ? '<div style="font-weight:600;margin-bottom:0.5rem;">核心观点：</div>' +
                '<ul style="margin:0;padding-left:1.5rem;">' +
                kp.map(p => `<li style="margin-bottom:0.3rem;line-height:1.5;">${p}</li>`).join('') +
                '</ul>' : '';
            document.getElementById('conclusionKeyPoints').innerHTML = kpHtml;

            // 共识
            const consensus = data.consensus || [];
            if (consensus.length) {
                document.getElementById('conclusionConsensus').innerHTML =
                    '<div style="font-weight:600;margin-bottom:0.3rem;">✅ 共识：</div>' +
                    '<ul style="margin:0;padding-left:1.5rem;">' +
                    consensus.map(c => `<li style="color:#4ecdc4;margin-bottom:0.2rem;">${typeof c === 'string' ? c : c.finding || JSON.stringify(c)}</li>`).join('') +
                    '</ul>';
            }

            // 分歧
            const disagreements = data.disagreements || [];
            if (disagreements.length) {
                document.getElementById('conclusionDisagreements').innerHTML =
                    '<div style="font-weight:600;margin-bottom:0.3rem;">⚡ 分歧：</div>' +
                    '<ul style="margin:0;padding-left:1.5rem;">' +
                    disagreements.slice(0, 5).map(d => {
                        const names = d.between ? d.between.join(' vs ') : '';
                        return `<li style="color:#ff6b6b;margin-bottom:0.2rem;">${names}：${d.aspect || ''}</li>`;
                    }).join('') +
                    '</ul>';
            }
        });

        eventSource.addEventListener('mingxuan_start', function(e) {
            addLog('👁 溟玄审查结论中...', 'info');
            document.getElementById('mingxuanPanel').style.display = 'block';
            document.getElementById('mingxuanText').textContent = '审查中...';
            document.getElementById('mingxuanStatus').textContent = '审查中';
            document.getElementById('mingxuanStatus').style.color = '#ffd93d';
        });

        eventSource.addEventListener('mingxuan_result', function(e) {
            const data = JSON.parse(e.data);
            const panel = document.getElementById('mingxuanPanel');
            panel.style.display = 'block';

            document.getElementById('mingxuanText').textContent = data.text || '审查完成';

            const status = document.getElementById('mingxuanStatus');
            if (data.original_pass) {
                status.textContent = '原文通过';
                status.style.color = '#4ecdc4';
                addLog('👁 溟玄：原文通过审查', 'pass');
            } else {
                status.textContent = '已改写';
                status.style.color = '#8b5cf6';
                addLog('👁 溟玄：结论已改写为溟玄风格', 'info');
            }

            // 显示问题
            const issues = data.issues || [];
            if (issues.length) {
                document.getElementById('mingxuanIssues').innerHTML =
                    '<div style="color:#ff6b6b;font-weight:600;">检测到的问题：</div>' +
                    issues.map(i => `<div style="color:#ff6b6b;">• ${i}</div>`).join('');
            }

            // 滚动到溟玄面板
            panel.scrollIntoView({ behavior: 'smooth' });
        });

        eventSource.addEventListener('debate_end', function(e) {
            const data = JSON.parse(e.data);
            addLog(`辩论结束！${data.summary}`, 'info');
            document.getElementById('currentPanel').style.display = 'none';
            document.getElementById('btnStart').style.display = 'inline-block';
            document.getElementById('btnStop').style.display = 'none';

            // 更新总结
            if (data.summary) {
                document.getElementById('conclusionSummary').textContent = data.summary;
            }

            // 滚动到结论面板
            document.getElementById('conclusionPanel').scrollIntoView({ behavior: 'smooth' });

            eventSource.close();
            eventSource = null;
        });

        eventSource.addEventListener('error', function(e) {
            if (eventSource && eventSource.readyState === EventSource.CLOSED) return;
            addLog('连接断开', 'fail');
            document.getElementById('btnStart').style.display = 'inline-block';
            document.getElementById('btnStop').style.display = 'none';
        });

        eventSource.onerror = function() {
            if (eventSource && eventSource.readyState === EventSource.CLOSES) return;
            // SSE会自动重连，不处理
        };
    }

    function downloadReport() {
        const birth = getBirth();
        const location = document.getElementById('location').value;
        const gender = document.getElementById('gender').value;
        const question = document.getElementById('question').value;
        const params = new URLSearchParams({ birth, location, gender, question });
        window.open('/api/debate/report?' + params, '_blank');
    }

    function stopDebate() {
        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }
        addLog('辩论已手动停止', 'info');
        document.getElementById('btnStart').style.display = 'inline-block';
        document.getElementById('btnStop').style.display = 'none';
    }

    function addToHistory(name, statement, passRate, attempts, passed) {
        const history = document.getElementById('historyContent');
        const card = document.createElement('div');
        card.className = 'speaker-card ' + (passed ? 'passed' : 'failed');
        const rateColor = passRate >= 95 ? '#4ecdc4' : passRate >= 90 ? '#ffd93d' : '#ff6b6b';
        card.innerHTML = `
            <details>
                <summary style="cursor:pointer;color:var(--accent-gold);font-weight:600;">
                    ${name} — 通过率<span style="color:${rateColor}">${passRate}%</span>（${attempts}次尝试）
                </summary>
                <div class="statement-box" style="margin-top:0.5rem;">${statement}</div>
            </details>
        `;
        history.appendChild(card);
    }
    </script>
</body>
</html>
