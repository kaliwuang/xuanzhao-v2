<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 - 七术排盘</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">玄照 <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/" class="active">排盘</a>
            <a href="/perspectives">108视角</a>
            <a href="/debate">辩论台</a>
        </div>
    </nav>
    <div class="container">
        <div class="hero">
            <h1 class="hero-title">玄 照</h1>
            <p class="hero-subtitle">七术排盘 · 交叉验证 · 108视角群体智能</p>
            <div class="hero-divider"></div>
        </div>
        <div class="input-panel">
            <h2>出生信息</h2>
            <div class="form-grid">
                <div class="form-group"><label>出生时间</label><input type="text" id="birth" value="2005-06-09 11:50"></div>
                <div class="form-group"><label>出生地点</label><input type="text" id="location" value="呼和浩特"></div>
                <div class="form-group"><label>性别</label><select id="gender"><option value="男" selected>男</option><option value="女">女</option></select></div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnAnalyze">七术排盘</button>
                <button class="btn btn-secondary" id="btnDetail">命盘详情</button>
                <button class="btn btn-secondary" id="btnDebate">开启辩论</button>
            </div>
        </div>
        <div id="loading" class="loading" style="display:none;"><div class="spinner"></div><p>正在排盘...</p></div>
        <div id="error" class="error-message" style="display:none;"></div>
        <div id="chartResult" class="chart-result">
            <div class="method-tabs" id="methodTabs"></div>
            <div id="baziPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">八字四柱</div><div class="bazi-pillars" id="baziPillars"></div><div class="shishen-grid" id="baziShishen"></div><div style="margin-top:1rem;text-align:center;color:var(--accent-gold);">日主：<span id="dayMaster"></span><span id="dayMasterWuxing" style="margin-left:1rem;"></span><span id="tiaohou" style="margin-left:1rem;color:var(--text-muted);"></span></div><div class="feature-tags" id="baziFeatures"></div></div></div>
            <div id="ziweiPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">紫微斗数</div><div id="ziweiInfo" style="margin-bottom:1rem;"></div><div id="ziweiPalaces"></div></div></div>
            <div id="astroPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">西洋占星</div><div style="margin-bottom:1rem;text-align:center;"><span style="color:var(--accent-gold);margin-right:2rem;">太阳：<span id="sunSign"></span></span><span style="margin-right:2rem;">月亮：<span id="moonSign"></span></span><span style="color:var(--text-muted);">上升：<span id="ascSign"></span></span></div><div class="astro-planets" id="astroPlanets"></div></div></div>
            <div id="liuyaoPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">六爻</div><div id="liuyaoContent"></div></div></div>
            <div id="qimenPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">奇门遁甲</div><div style="text-align:center;margin-bottom:1rem;color:var(--accent-gold);" id="qimenJu"></div><div class="qimen-grid" id="qimenGrid"></div></div></div>
            <div id="liurenPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">大六壬</div><div id="liurenContent"></div></div></div>
            <div id="taiyiPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">太乙神数</div><div id="taiyiContent"></div></div></div>
            <div class="validation-result" id="validationResult" style="display:none;"><div class="card"><div class="card-title">七术交叉验证 <span class="confidence-badge" id="confidenceBadge" style="margin-left:1rem;"></span></div><div style="color:var(--text-muted);margin-bottom:1rem;">可用术法：<span id="availableMethods"></span></div><div class="consensus-list" id="consensusList"></div></div></div>
        </div>
        <div id="perspectivesPreview" style="margin-top:2rem;"><div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">108视角 <a href="/perspectives" class="btn btn-ghost">查看全部</a></div><div class="perspectives-gallery" id="previewGallery"></div></div></div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btnAnalyze').addEventListener('click', doAnalyze);
        document.getElementById('btnDetail').addEventListener('click', function() {
            var b = document.getElementById('birth').value, l = document.getElementById('location').value, g = document.getElementById('gender').value;
            window.location = '/chart?birth=' + encodeURIComponent(b) + '&location=' + encodeURIComponent(l) + '&gender=' + encodeURIComponent(g);
        });
        document.getElementById('btnDebate').addEventListener('click', function() {
            var b = document.getElementById('birth').value, l = document.getElementById('location').value, g = document.getElementById('gender').value;
            window.location = '/debate?birth=' + encodeURIComponent(b) + '&location=' + encodeURIComponent(l) + '&gender=' + encodeURIComponent(g);
        });
        loadPreview();
    });
    function showLoading(v) { document.getElementById('loading').style.display = v ? 'block' : 'none'; }
    function showError(msg) { var e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
    function hideError() { document.getElementById('error').style.display = 'none'; }
    function doAnalyze() {
        var birth = document.getElementById('birth').value, location = document.getElementById('location').value, gender = document.getElementById('gender').value;
        if (!birth) { showError('请输入出生时间'); return; }
        showLoading(true); hideError();
        api.getChart(birth, location, gender).then(function(chartData) {
            renderChart(chartData);
            return api.crossValidate(birth, location, gender);
        }).then(function(validateData) {
            renderValidation(validateData);
            showLoading(false);
            document.getElementById('chartResult').classList.add('active');
        }).catch(function(e) { showLoading(false); showError(e.message || '排盘失败'); });
    }
    function switchPanel(name, el) {
        document.querySelectorAll('.method-panel').forEach(function(p) { p.style.display = 'none'; });
        var panel = document.getElementById(name + 'Panel'); if (panel) panel.style.display = 'block';
        document.querySelectorAll('.method-tab').forEach(function(t) { t.classList.remove('active'); });
        if (el) el.classList.add('active');
    }
    function renderChart(data) {
        var methods = data.methods || []; var tc = document.getElementById('methodTabs'); tc.innerHTML = '';
        var mn = {'八字':'bazi','紫微':'ziwei','占星':'astro','六爻':'liuyao','奇门':'qimen','大六壬':'liuren','太乙':'taiyi'};
        methods.forEach(function(m, i) { var t = document.createElement('div'); t.className = 'method-tab' + (i === 0 ? ' active' : ''); t.textContent = m; t.addEventListener('click', function() { switchPanel(mn[m], this); }); tc.appendChild(t); });
        if (methods.length > 0 && mn[methods[0]]) switchPanel(mn[methods[0]], tc.firstChild);
        if (data.bazi) { document.getElementById('baziPanel').style.display = 'block'; renderBazi(data.bazi); }
        if (data.ziwei) { document.getElementById('ziweiPanel').style.display = 'block'; renderZiwei(data.ziwei); }
        if (data.astro) { document.getElementById('astroPanel').style.display = 'block'; renderAstro(data.astro); }
        if (data.liuyao) { document.getElementById('liuyaoPanel').style.display = 'block'; renderLiuyao(data.liuyao); }
        if (data.qimen) { document.getElementById('qimenPanel').style.display = 'block'; renderQimen(data.qimen); }
        if (data.liuren) { document.getElementById('liurenPanel').style.display = 'block'; renderLiuren(data.liuren); }
        if (data.taiyi) { document.getElementById('taiyiPanel').style.display = 'block'; renderTaiyi(data.taiyi); }
    }
    function renderBazi(bazi) {
        var ps = ['year','month','day','time'], ls = ['年柱','月柱','日柱','时柱'], c = document.getElementById('baziPillars'); c.innerHTML = '';
        ps.forEach(function(p, i) { var gz = bazi[p]; if (gz) { var d = document.createElement('div'); d.className = 'pillar'; d.innerHTML = '<div class="pillar-label">' + ls[i] + '</div><div class="pillar-gan">' + gz[0] + '</div><div class="pillar-zhi">' + gz[1] + '</div><div class="pillar-nayin">' + (bazi.nayin && bazi.nayin[p] || '') + '</div>'; c.appendChild(d); } });
        var sc = document.getElementById('baziShishen'); sc.innerHTML = ''; var sm = bazi.shishen_gan || {};
        ps.forEach(function(p, i) { var ss = sm[p]; if (ss) { var d = document.createElement('div'); d.className = 'shishen-item'; d.textContent = ls[i] + ': ' + ss; sc.appendChild(d); } });
        document.getElementById('dayMaster').textContent = bazi.day_master || '';
        document.getElementById('dayMasterWuxing').textContent = bazi.day_master_wuxing || '';
        document.getElementById('tiaohou').textContent = bazi.tiaohou ? '调候用神：' + bazi.tiaohou : '';
        var fc = document.getElementById('baziFeatures'); fc.innerHTML = '';
        (bazi.features || []).forEach(function(f) { var t = document.createElement('span'); t.className = 'feature-tag' + (f.indexOf('冲') >= 0 ? ' highlight' : ''); t.textContent = f; fc.appendChild(t); });
    }
    function renderZiwei(z) {
        var wh = z.wuxing_ju || {}; var wx = (typeof wh === 'string') ? wh : (wh.wuxing || ''); var js = (typeof wh === 'string') ? '' : (wh.ju_shu || '');
        document.getElementById('ziweiInfo').innerHTML = '<div class="ziwei-info-bar"><span>命宫：' + (z.ming_gong || '') + '</span><span>五行局：' + wx + js + '局</span><span>四化：禄' + (z.sihua && z.sihua.禄 || '') + ' 权' + (z.sihua && z.sihua.权 || '') + ' 科' + (z.sihua && z.sihua.科 || '') + ' 忌' + (z.sihua && z.sihua.忌 || '') + '</span></div>';
        var cellZhi = {0:'巳',1:'午',2:'未',3:'申',4:'辰',7:'酉',8:'卯',11:'戌',12:'寅',13:'丑',14:'子',15:'亥'}; var zm = {}; (z.palaces || []).forEach(function(p) { zm[p.zhi] = p; });
        var c = document.getElementById('ziweiPalaces'); c.innerHTML = ''; c.className = 'ziwei-board';
        var ms = ['紫微','天机','太阳','武曲','天同','廉贞','天府','太阴','贪狼','巨门','天相','天梁','七杀','破军'];
        for (var i = 0; i < 16; i++) { var cell = document.createElement('div');
            if (!cellZhi[i]) { cell.className = 'ziwei-cell empty'; } else { var zz = cellZhi[i], pal = zm[zz];
                cell.className = 'ziwei-cell' + (pal && pal.name === '命宫' ? ' ming-gong' : ''); var sh = '';
                if (pal && pal.stars) { pal.stars.forEach(function(star) { var si = ''; if (z.sihua) { if (z.sihua.禄 === star) si = ' ziwei-star-sihua-lu'; else if (z.sihua.权 === star) si = ' ziwei-star-sihua-quan'; else if (z.sihua.科 === star) si = ' ziwei-star-sihua-ke'; else if (z.sihua.忌 === star) si = ' ziwei-star-sihua-ji'; } sh += '<span class="' + (ms.indexOf(star) >= 0 ? 'ziwei-star-main' : 'ziwei-star-aux') + si + '">' + star + '</span>'; }); }
                cell.innerHTML = '<div class="ziwei-cell-header"><span class="ziwei-cell-zhi">' + zz + '</span><span class="ziwei-cell-name">' + (pal ? pal.name : '') + '</span></div><div class="ziwei-cell-stars">' + sh + '</div>'; }
            c.appendChild(cell); }
    }
    function renderAstro(a) {
        document.getElementById('sunSign').textContent = a.sun_sign || ''; document.getElementById('moonSign').textContent = a.moon_sign || ''; document.getElementById('ascSign').textContent = a.ascendant || '';
        var c = document.getElementById('astroPlanets'); c.innerHTML = '';
        Object.entries(a.planets || {}).forEach(function(e) { var n = e[0], info = e[1]; var d = document.createElement('div'); d.className = 'planet'; d.innerHTML = '<div class="planet-name">' + n + '</div><div class="planet-sign">' + (info.sign || '') + '</div><div style="color:var(--text-muted);font-size:0.75rem;">' + (info.degree || '') + '°</div>'; c.appendChild(d); });
    }
    function renderLiuyao(l) {
        var html = '<div class="gua-info" style="text-align:center;margin-bottom:1.5rem;">';
        html += '<div style="font-size:1.5rem;color:var(--accent-gold);margin-bottom:0.5rem;">' + (l.ben_gua && l.ben_gua.name || '') + '</div>';
        html += '<div style="color:var(--text-muted);">上卦：' + (l.ben_gua && l.ben_gua.shang || '') + '(' + (l.ben_gua && l.ben_gua.shang_wuxing || '') + ')　下卦：' + (l.ben_gua && l.ben_gua.xia || '') + '(' + (l.ben_gua && l.ben_gua.xia_wuxing || '') + ')</div>';
        html += '<div style="margin-top:0.5rem;">动爻：第' + (l.dong_yao || 0) + '爻　世：第' + (l.shi || 0) + '爻　应：第' + (l.ying || 0) + '爻</div>';
        html += '<div style="margin-top:0.5rem;color:var(--accent-gold);">变卦：' + (l.bian_gua && l.bian_gua.name || '') + '</div>';
        html += '</div>';
        // 六爻详细表
        if (l.lines && l.lines.length > 0) {
            html += '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;text-align:center;font-size:0.85rem;">';
            html += '<tr style="border-bottom:1px solid var(--border);color:var(--text-muted);">';
            html += '<th style="padding:0.4rem;">爻位</th><th>阴阳</th><th>六亲</th><th>纳甲</th><th>地支</th><th>五行</th>';
            if (l.liu_shen) html += '<th>六神</th>';
            html += '<th>世应</th></tr>';
            for (var i = l.lines.length - 1; i >= 0; i--) {
                var y = l.lines[i];
                var isDong = (i + 1 === l.dong_yao);
                var rowStyle = isDong ? ' style="background:rgba(255,215,0,0.08);"' : '';
                html += '<tr' + rowStyle + '>';
                html += '<td style="padding:0.4rem;">' + (isDong ? '○ ' : '') + '第' + y.position + '爻</td>';
                html += '<td>' + (y.yinyang === '阳' ? '—' : '- -') + '</td>';
                html += '<td style="color:var(--accent-gold);">' + y.liuqin + '</td>';
                html += '<td>' + y.gan + '</td>';
                html += '<td>' + y.zhi + '</td>';
                html += '<td>' + y.wuxing + '</td>';
                if (l.liu_shen) html += '<td style="color:var(--text-muted);">' + (l.liu_shen[i] || '') + '</td>';
                var mark = '';
                if (y.position === l.shi) mark = '世'; else if (y.position === l.ying) mark = '应';
                html += '<td style="color:' + (mark === '世' ? 'var(--accent-gold)' : 'var(--text-muted)') + ';">' + mark + '</td>';
                html += '</tr>';
            }
            html += '</table></div>';
        }
        document.getElementById('liuyaoContent').innerHTML = html;
    }
    function renderQimen(q) {
        document.getElementById('qimenJu').textContent = (q.ju_name || '') + '　节气：' + (q.jieqi || '') + '　值符：' + (q.zhi_fu || '');
        var go = ['巽四','离九','坤二','震三','中五','兑七','艮八','坎一','乾六'];
        var c = document.getElementById('qimenGrid'); c.innerHTML = '';
        go.forEach(function(g) {
            var d = document.createElement('div');
            d.className = 'qimen-cell' + (g === '中五' ? ' center' : '');
            d.innerHTML = '<div class="qimen-gong">' + g + '</div>' +
                '<div class="qimen-di" style="color:var(--accent-gold);">地：' + (q.di_pan && q.di_pan[g] || '') + '</div>' +
                '<div class="qimen-di" style="color:#6ea8fe;">天：' + (q.tian_pan && q.tian_pan[g] || '') + '</div>' +
                '<div class="qimen-men">' + (q.ba_men && q.ba_men[g] || '') + '</div>' +
                '<div style="font-size:0.75rem;color:var(--text-muted);">' + (q.jiu_xing && q.jiu_xing[g] || '') + '</div>' +
                '<div style="font-size:0.7rem;color:var(--text-muted);">' + (q.ba_shen && q.ba_shen[g] || '') + '</div>';
            c.appendChild(d);
        });
    }
    function renderLiuren(l) {
        var html = '<div style="text-align:center;margin-bottom:1rem;">';
        html += '<div style="font-size:1.2rem;color:var(--accent-gold);margin-bottom:0.5rem;">' + (l.jieqi || '') + '　占时：' + (l.zhan_shi || '') + '</div>';
        html += '<div>月将：<span style="color:var(--accent-gold);">' + (l.yue_jiang || '') + '</span>（' + (l.yue_jiang_zhi || '') + '）　日干寄宫：' + (l.gan_ji || '') + '</div>';
        html += '</div>';
        // 四课
        html += '<div style="margin-bottom:1rem;"><div style="color:var(--accent-gold);margin-bottom:0.5rem;font-weight:600;">四课</div>';
        (l.si_ke || []).forEach(function(k, i) {
            html += '<div style="display:inline-block;margin-right:1.5rem;padding:0.3rem 0.8rem;background:var(--bg-card);border-radius:6px;border:1px solid var(--border);">';
            html += '<span style="color:var(--text-muted);font-size:0.8rem;">' + k.name + '</span> ';
            html += '<span style="color:var(--accent-gold);">' + k.gan + '</span>上<span style="color:#6ea8fe;">' + k.zhi + '</span></div>';
        });
        html += '</div>';
        // 三传
        html += '<div style="margin-bottom:1rem;"><div style="color:var(--accent-gold);margin-bottom:0.5rem;font-weight:600;">三传</div>';
        html += '<div style="display:flex;gap:1rem;justify-content:center;">';
        (l.san_chuan || []).forEach(function(c) {
            html += '<div style="padding:0.5rem 1.2rem;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);text-align:center;">';
            html += '<div style="color:var(--text-muted);font-size:0.8rem;">' + c.chuan + '</div>';
            html += '<div style="font-size:1.2rem;color:var(--accent-gold);">' + c.name + '</div>';
            html += '<div style="font-size:0.75rem;color:var(--text-muted);">' + (c.wuxing || '') + '</div>';
            html += '</div>';
        });
        html += '</div></div>';
        // 天将
        if (l.tian_jiang) {
            html += '<div><div style="color:var(--accent-gold);margin-bottom:0.5rem;font-weight:600;">十二天将</div>';
            html += '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:0.3rem;font-size:0.8rem;">';
            var zhiOrder = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
            zhiOrder.forEach(function(z) {
                var jiang = l.tian_jiang[z] || '';
                html += '<div style="text-align:center;padding:0.2rem;background:var(--bg-card);border-radius:4px;"><span style="color:var(--text-muted);">' + z + '</span> <span style="color:var(--accent-gold);">' + jiang + '</span></div>';
            });
            html += '</div></div>';
        }
        document.getElementById('liurenContent').innerHTML = html;
    }
    function renderTaiyi(t) {
        var html = '<div style="text-align:center;margin-bottom:1rem;">';
        html += '<div style="font-size:1.5rem;color:var(--accent-gold);margin-bottom:0.5rem;">' + (t.taiyi_gong || '') + '</div>';
        html += '<div style="color:var(--text-muted);">年：<span style="color:var(--accent-gold);">' + (t.year_ganzhi || '') + '</span>　积年数：' + (t.ji_nian || 0) + '　' + (t.yin_yang || '') + '</div>';
        html += '</div>';
        // 三基
        if (t.san_ji) {
            html += '<div style="margin-bottom:1rem;"><div style="color:var(--accent-gold);margin-bottom:0.5rem;font-weight:600;">三基</div>';
            html += '<div style="display:flex;gap:1rem;justify-content:center;">';
            Object.entries(t.san_ji).forEach(function(e) {
                html += '<div style="padding:0.5rem 1rem;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);text-align:center;">';
                html += '<div style="color:var(--text-muted);font-size:0.8rem;">' + e[0] + '</div>';
                html += '<div style="color:var(--accent-gold);">' + e[1] + '</div></div>';
            });
            html += '</div></div>';
        }
        // 五福
        if (t.wu_fu) {
            html += '<div><div style="color:var(--accent-gold);margin-bottom:0.5rem;font-weight:600;">五福</div>';
            html += '<div style="display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;">';
            Object.entries(t.wu_fu).forEach(function(e) {
                html += '<div style="padding:0.4rem 0.8rem;background:var(--bg-card);border-radius:6px;border:1px solid var(--border);text-align:center;">';
                html += '<div style="color:var(--text-muted);font-size:0.75rem;">' + e[0] + '</div>';
                html += '<div style="color:var(--accent-gold);font-size:0.9rem;">' + e[1] + '</div></div>';
            });
            html += '</div></div>';
        }
        document.getElementById('taiyiContent').innerHTML = html;
    }
    function renderValidation(data) {
        document.getElementById('validationResult').style.display = 'block'; var b = document.getElementById('confidenceBadge'); b.textContent = data.overall_confidence; b.className = 'confidence-badge confidence-' + data.overall_confidence;
        document.getElementById('availableMethods').textContent = (data.available_methods || []).join('、'); var l = document.getElementById('consensusList'); l.innerHTML = '';
        (data.consensus || []).forEach(function(c) { var d = document.createElement('div'); d.className = 'consensus-item'; d.innerHTML = '<strong>' + c.aspect + '</strong>：' + c.finding + ' <span class="confidence-badge confidence-' + c.confidence + '" style="margin-left:0.5rem;">' + c.confidence + '</span>'; l.appendChild(d); });
        (data.conflicts || []).forEach(function(c) { var d = document.createElement('div'); d.className = 'conflict-item'; d.innerHTML = '<strong>' + c.aspect + '</strong>：' + c.method_a + '「' + c.finding_a + '」vs ' + c.method_b + '「' + c.finding_b + '」<br><small style="color:var(--text-muted);">建议：' + c.suggestion + '</small>'; l.appendChild(d); });
    }
    function loadPreview() {
        api.getFigures().then(function(data) { var ids = Object.keys(data); var shuffled = ids.sort(function() { return Math.random() - 0.5; }).slice(0, 6); var gallery = document.getElementById('previewGallery'); gallery.innerHTML = '';
            shuffled.forEach(function(fid) { var f = data[fid]; var card = document.createElement('div'); card.className = 'figure-card'; card.innerHTML = '<div class="figure-header"><div class="figure-avatar ' + f.faction + '">' + f.name[0] + '</div><div class="figure-info"><h4>' + f.name + '</h4><div class="figure-title-text">' + f.title + '</div></div></div><div class="figure-method-badge">' + f.primary_method + '</div>' + (f.soul && f.soul.essence ? '<div class="figure-soul-essence">' + f.soul.essence + '</div>' : ''); gallery.appendChild(card); });
        }).catch(function(e) { console.error('Preview failed:', e); });
    }
    </script>
</body>
</html>
