<body>

    <div class="container" id="main-content">
        <div class="hero">

            <p class="hero-subtitle">八术排盘 · 交叉验证 · 108视角群体智能</p>

        <div class="input-panel">
            <h2>出生信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>出生年份</label>
                    <select id="birthYear" aria-label="出生年份"><option value="">-- 年 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生月份</label>
                    <select id="birthMonth" aria-label="出生月份"><option value="">-- 月 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <select id="birthDay" aria-label="出生日期"><option value="">-- 日 --</option></select>
                </div>
                <div class="form-group">
                    <label>出生时辰</label>
                    <select id="birthHour" aria-label="出生时辰">
                        <option value="">-- 时辰 --</option>
                        <option value="00:00">子时 (23-01)</option>
                        <option value="01:00">丑时 (01-03)</option>
                        <option value="03:00">寅时 (03-05)</option>
                        <option value="05:00">卯时 (05-07)</option>
                        <option value="07:00">辰时 (07-09)</option>
                        <option value="09:00">巳时 (09-11)</option>
                        <option value="11:00">午时 (11-13)</option>
                        <option value="13:00">未时 (13-15)</option>
                        <option value="15:00">申时 (15-17)</option>
                        <option value="17:00">酉时 (17-19)</option>
                        <option value="19:00">戌时 (19-21)</option>
                        <option value="21:00">亥时 (21-23)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>出生地点</label>
                    <input type="text" id="location" aria-label="出生地点" value="北京" placeholder="如 呼和浩特">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender" aria-label="性别"><option value="男" selected>男</option><option value="女">女</option></select>
                </div>
                <div class="form-group">
                    <label>姓名（可选）</label>
                    <input type="text" id="name" aria-label="姓名" value="" placeholder="输入姓名可获得姓名学分析">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" id="btnAnalyze" aria-label="开始八术排盘">八术排盘</button>
                <button class="btn btn-secondary" id="btnDetail" aria-label="查看命盘详情">命盘详情</button>
                <button class="btn btn-secondary" id="btnDebate" aria-label="开启辩论分析">开启辩论</button>
            </div>
        </div>
        <div id="loading" class="loading hidden"><div class="spinner"></div><p>正在排盘...</p></div>
        <div id="error" class="error-message hidden"></div>

            <div class="method-tabs" id="methodTabs"></div>
            <div id="baziPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">八字四柱</div>

                    <div class="data-gold text-center" style="margin-top:1rem">日主：<span id="dayMaster"></span><span id="dayMasterWuxing" style="margin-left:1rem"></span><span id="tiaohou" class="data-muted" style="margin-left:1rem"></span></div>

                    <div id="baziChangsheng" style="margin-top:0.6rem"></div>
                    <div id="baziXunkong" style="margin-top:0.6rem"></div>
                    <div id="baziShensha" style="margin-top:0.8rem"></div>
                    <div id="baziRelations" style="margin-top:0.8rem"></div>
                    <div id="baziXiYong" style="margin-top:0.8rem"></div>
                    <div id="baziWuxingScore" style="margin-top:0.6rem"></div>
                    <div id="baziSanCai" style="margin-top:0.6rem"></div>
                    <div id="baziDayun" style="margin-top:1rem"></div>
                    <div id="baziLiunian" style="margin-top:0.8rem"></div>
                    <div class="feature-tags" id="baziFeatures"></div>

            <div id="ziweiPanel" class="method-panel hidden">
                <div class="card">

                    <div id="ziweiLunar" style="margin-bottom:0.8rem"></div>
                    <div id="ziweiPalaces"></div>
                    <div id="ziweiLiunian" style="margin-top:1rem"></div>
                </div>
            </div>
            <div id="astroPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">西洋占星</div>
                    <div class="text-center" style="margin-bottom:1rem">
                        <span class="data-gold" style="margin-right:2rem">太阳：<span id="sunSign"></span></span>
                        <span style="margin-right:2rem;">月亮：<span id="moonSign"></span></span>
                        <span class="data-muted">上升：<span id="ascSign"></span></span>
                        <span class="data-blue" style="margin-left:2rem" id="mcSign"></span>
                    </div>
                    <div class="astro-planets" id="astroPlanets"></div>
                    <div id="astroNodes" style="margin-top:1rem"></div>
                    <div id="astroHouses" style="margin-top:1rem"></div>

            <div id="liuyaoPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">六爻</div>

            </div>
            <div id="qimenPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">奇门遁甲</div>
                    <div class="data-gold text-center" style="margin-bottom:1rem" id="qimenJu"></div>
                    <div id="qimenXunkong" style="margin-bottom:0.8rem"></div>
                    <div class="qimen-grid" id="qimenGrid"></div>
                    <div id="qimenAnalysis" style="margin-top:1rem"></div>
                </div>
            </div>
            <div id="liurenPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">大六壬</div>

                </div>
            </div>
            <div id="taiyiPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">太乙神数</div>

                </div>
            </div>
            <div id="xingmingPanel" class="method-panel hidden">
                <div class="card">
                    <div class="card-title">姓名学</div>
                    <div id="xingmingContent"></div>
                </div>
            </div>
            <div id="radarSection" style="display:none;margin-top:1.5rem"><div class="card"><div class="card-title">八维命理评分 <span id="radarTotal" style="margin-left:0.5rem"></span></div><div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;justify-content:center"><canvas id="radarCanvas" width="320" height="320"></canvas><div id="radarDetails" style="flex:1;min-width:200px"></div></div></div></div>
            <div class="validation-result hidden" id="validationResult"><div class="card"><div class="card-title">八术交叉验证 <span class="confidence-badge" id="confidenceBadge" style="margin-left:1rem"></span></div><div class="data-muted" style="margin-bottom:1rem">可用术法：<span id="availableMethods"></span></div><div class="consensus-list" id="consensusList"></div></div></div>
        </div>
        <div id="perspectivesPreview" style="margin-top:2rem"><div class="card"><div class="card-title" style="display:flex;justify-content:space-between;align-items:center">108视角 <a href="/perspectives" class="btn btn-ghost">查看全部</a></div><div class="perspectives-gallery" id="previewGallery"></div></div></div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('btnAnalyze').addEventListener('click', doAnalyze);
        document.getElementById('btnDetail').addEventListener('click', function() {
            var b = getBirth(), l = document.getElementById('location').value, g = document.getElementById('gender').value, n = document.getElementById('name').value;
            window.location = '/chart?birth=' + encodeURIComponent(b) + '&location=' + encodeURIComponent(l) + '&gender=' + encodeURIComponent(g) + '&name=' + encodeURIComponent(n);
        });
        document.getElementById('btnDebate').addEventListener('click', function() {
            var b = getBirth(), l = document.getElementById('location').value, g = document.getElementById('gender').value, n = document.getElementById('name').value;
            window.location = '/debate?birth=' + encodeURIComponent(b) + '&location=' + encodeURIComponent(l) + '&gender=' + encodeURIComponent(g) + '&name=' + encodeURIComponent(n);
        });
        // 填充年月下拉框
        var yearSel = document.getElementById('birthYear');
        for (var y = 2026; y >= 1930; y--) {
            var o = document.createElement('option'); o.value = y; o.textContent = y + '年';
            yearSel.appendChild(o);
        }
        var monthSel = document.getElementById('birthMonth');
        for (var m = 1; m <= 12; m++) {
            var o = document.createElement('option'); o.value = m; o.textContent = m + '月';
            monthSel.appendChild(o);
        }
        function updateDays() {
            var daySel = document.getElementById('birthDay');
            var cur = daySel.value;
            var y = parseInt(yearSel.value), m = parseInt(monthSel.value);
            var max = m === 2 ? (y && y > 0 && y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0) ? 29 : 28)
                : ([4,6,9,11].indexOf(m) >= 0 ? 30 : 31);
            daySel.innerHTML = '<option value="">-- 日 --</option>';
            for (var d = 1; d <= (max || 31); d++) {
                var o = document.createElement('option'); o.value = d; o.textContent = d + '日';
                daySel.appendChild(o);
            }
            if (cur && cur <= max) daySel.value = cur;
        }
        yearSel.addEventListener('change', updateDays);
        monthSel.addEventListener('change', updateDays);
        updateDays();
        loadPreview();
    });
    function getBirth() {
        var y = document.getElementById('birthYear').value;
        var m = document.getElementById('birthMonth').value;
        var d = document.getElementById('birthDay').value;
        var h = document.getElementById('birthHour').value;
        if (!y || !m || !d || !h) return '';
        return y + '-' + String(m).padStart(2,'0') + '-' + String(d).padStart(2,'0') + ' ' + h;
    }
    function showLoading(v) { var el = document.getElementById('loading'); if(v) el.classList.remove('hidden'); else el.classList.add('hidden'); }
    function showError(msg) { var e = document.getElementById('error'); e.textContent = msg; e.classList.remove('hidden'); }
    function hideError() { document.getElementById('error').classList.add('hidden'); }
    function doAnalyze() {
        var birth = getBirth(), location = document.getElementById('location').value, gender = document.getElementById('gender').value, name = document.getElementById('name').value;
        if (!birth) { showError('请选择完整的出生年月日时'); return; }
        showLoading(true); hideError();
        api.getChart(birth, location, gender, name).then(function(chartData) {
            renderChart(chartData);
            return api.crossValidate(birth, location, gender);
        }).then(function(validateData) {
            renderValidation(validateData);
            showLoading(false);
            document.getElementById('chartResult').classList.add('active');
            // Smooth scroll to results
            document.getElementById('chartResult').scrollIntoView({behavior:'smooth'});
        }).catch(function(e) { showLoading(false); showError(e.message || '排盘失败'); });
    }
    function switchPanel(name, el) {
        document.querySelectorAll('.method-panel').forEach(function(p) { p.classList.add('hidden'); });
        var panel = document.getElementById(name + 'Panel'); if (panel) panel.classList.remove('hidden');
        document.querySelectorAll('.method-tab').forEach(function(t) { t.classList.remove('active'); });
        if (el) el.classList.add('active');
    }
    function renderChart(data) {
        var methods = data.methods || []; var tc = document.getElementById('methodTabs'); tc.innerHTML = '';
var mn = {'八字':'bazi','紫微':'ziwei','占星':'astro','六爻':'liuyao','奇门':'qimen','大六壬':'liuren','太乙':'taiyi','姓名学':'xingming'};
        methods.forEach(function(m, i) { var t = document.createElement('div'); t.className = 'method-tab' + (i === 0 ? ' active' : ''); t.textContent = m; t.addEventListener('click', function() { switchPanel(mn[m], this); }); tc.appendChild(t); });
        if (methods.length > 0 && mn[methods[0]]) switchPanel(mn[methods[0]], tc.firstChild);
        if (data.bazi) { document.getElementById('baziPanel').classList.remove('hidden'); renderBazi(data.bazi); }
        if (data.ziwei) { document.getElementById('ziweiPanel').classList.remove('hidden'); renderZiwei(data.ziwei); }
        if (data.astro) { document.getElementById('astroPanel').classList.remove('hidden'); renderAstro(data.astro); }
        if (data.liuyao) { document.getElementById('liuyaoPanel').classList.remove('hidden'); renderLiuyao(data.liuyao); }
        if (data.qimen) { document.getElementById('qimenPanel').classList.remove('hidden'); renderQimen(data.qimen); }
        if (data.liuren) { document.getElementById('liurenPanel').classList.remove('hidden'); renderLiuren(data.liuren); }
        if (data.taiyi) { document.getElementById('taiyiPanel').classList.remove('hidden'); renderTaiyi(data.taiyi); }
        if (data.xingming) { document.getElementById('xingmingPanel').classList.remove('hidden'); renderXingming(data.xingming); }
        renderRadarChart(data);
    }

    /* ===================== 雷达图 ===================== */
    function renderRadarChart(data) {
        var bazi = data.bazi || {};
        var shishen = bazi.shishen_gan || {};
        var shensha = bazi.shensha || [];
        var xiYong = bazi.xi_yong || {};
        var wuxingScore = bazi.wuxing_score || {};
        var features = bazi.features || [];
        var allShishen = Object.values(shishen);
        var scores = {};

        // 1. 事业运 - 正官/七杀 + 命宫
        var career = 50;
        allShishen.forEach(function(s) { if (s === '正官') career += 12; if (s === '七杀') career += 8; });
        if (bazi.ming_gong) career += 5;
        features.forEach(function(f) { if (f.indexOf('官') >= 0 || f.indexOf('杀') >= 0) career += 5; });
        scores['事业'] = Math.min(career, 95);

        // 2. 财运 - 正财/偏财 + 食伤生财
        var wealth = 45;
        allShishen.forEach(function(s) { if (s === '正财') wealth += 12; if (s === '偏财') wealth += 10; });
        allShishen.forEach(function(s) { if (s === '食神' || s === '伤官') wealth += 4; });
        scores['财运'] = Math.min(wealth, 95);

        // 3. 感情运 - 日支 + 桃花
        var love = 55;
        if (bazi.day) {
            var dayZhi = bazi.day[1];
            if ('子午卯酉'.indexOf(dayZhi) >= 0) love += 10;
        }
        shensha.forEach(function(s) { if (s.indexOf('桃花') >= 0) love += 10; if (s.indexOf('红鸾') >= 0) love += 8; });
        features.forEach(function(f) { if (f.indexOf('冲') >= 0) love -= 8; if (f.indexOf('合') >= 0) love += 5; });
        scores['感情'] = Math.max(20, Math.min(love, 95));

        // 4. 健康运 - 五行平衡
        var health = 60;
        if (xiYong.ratio) health = Math.round(xiYong.ratio * 0.8 + 20);
        if (xiYong.strength === '身弱') health -= 8;
        features.forEach(function(f) { if (f.indexOf('刑') >= 0 || f.indexOf('冲') >= 0) health -= 5; });
        scores['健康'] = Math.max(25, Math.min(health, 95));

        // 5. 学业运 - 印星 + 文昌
        var study = 50;
        allShishen.forEach(function(s) { if (s === '正印') study += 15; if (s === '偏印') study += 10; });
        shensha.forEach(function(s) { if (s.indexOf('文昌') >= 0) study += 10; });
        scores['学业'] = Math.min(study, 95);

        // 6. 贵人运 - 天乙贵人 + 天德月德
        var noble = 35;
        shensha.forEach(function(s) { if (s.indexOf('贵人') >= 0) noble += 12; if (s.indexOf('天德') >= 0 || s.indexOf('月德') >= 0) noble += 8; });
        scores['贵人'] = Math.min(noble, 95);

        // 7. 创造力 - 食神/伤官
        var creative = 45;
        allShishen.forEach(function(s) { if (s === '食神') creative += 15; if (s === '伤官') creative += 12; });
        features.forEach(function(f) { if (f.indexOf('食伤') >= 0) creative += 8; });
        scores['创造力'] = Math.min(creative, 95);

        // 8. 整体平衡 - 五行分布
        var balance = 50;
        if (xiYong.ratio) balance = xiYong.ratio > 30 ? 75 : xiYong.ratio > 20 ? 60 : 40;
        if (wuxingScore && Object.keys(wuxingScore).length > 0) {
            var vals = Object.values(wuxingScore).filter(function(v) { return typeof v === 'number'; });
            if (vals.length > 0) {
                var max = Math.max.apply(null, vals), min = Math.min.apply(null, vals);
                balance += (max - min < 5) ? 15 : (max - min < 10) ? 5 : -10;
            }
        }
        scores['平衡'] = Math.max(25, Math.min(balance, 95));

        var keys = Object.keys(scores);
        var total = Math.round(keys.reduce(function(a, k) { return a + scores[k]; }, 0) / keys.length);

        // 显示区域
        var section = document.getElementById('radarSection');
        section.style.display = 'block';
        var totalColor = total >= 70 ? '#4ecdc4' : total >= 50 ? 'var(--accent-gold)' : '#ff6b6b';
        document.getElementById('radarTotal').innerHTML = '<span style="color:' + totalColor + '">' + total + '</span><span style="font-size:0.7rem;color:var(--text-muted);margin-left:0.3rem">/100</span>';

        // Canvas 绘制
        var canvas = document.getElementById('radarCanvas');
        var ctx = canvas.getContext('2d');
        var dpr = window.devicePixelRatio || 1;
        var size = 320;
        canvas.width = size * dpr; canvas.height = size * dpr;
        canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
        ctx.scale(dpr, dpr);
        var cx = size / 2, cy = size / 2, maxR = 120;
        var n = keys.length, angleStep = (Math.PI * 2) / n, startAngle = -Math.PI / 2;
        ctx.clearRect(0, 0, size, size);

        // 背景网格
        for (var layer = 1; layer <= 5; layer++) {
            var r = maxR * layer / 5;
            ctx.beginPath();
            for (var i = 0; i <= n; i++) {
                var a = startAngle + i * angleStep;
                var x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.strokeStyle = 'rgba(201, 169, 110, 0.08)';
            ctx.lineWidth = 1; ctx.stroke();
        }

        // 轴线
        for (var i = 0; i < n; i++) {
            var a = startAngle + i * angleStep;
            ctx.beginPath(); ctx.moveTo(cx, cy);
            ctx.lineTo(cx + maxR * Math.cos(a), cy + maxR * Math.sin(a));
            ctx.strokeStyle = 'rgba(201, 169, 110, 0.12)'; ctx.stroke();
        }

        // 数据区域
        ctx.beginPath();
        for (var i = 0; i <= n; i++) {
            var idx = i % n;
            var a = startAngle + idx * angleStep;
            var r = maxR * scores[keys[idx]] / 100;
            var x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(201, 169, 110, 0.15)'; ctx.fill();
        ctx.strokeStyle = 'rgba(201, 169, 110, 0.6)'; ctx.lineWidth = 2; ctx.stroke();

        // 数据点 + 标签
        for (var i = 0; i < n; i++) {
            var a = startAngle + i * angleStep;
            var r = maxR * scores[keys[i]] / 100;
            var x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
            ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#c9a96e'; ctx.fill();
            ctx.strokeStyle = '#0a0a1a'; ctx.lineWidth = 2; ctx.stroke();
            var lx = cx + (maxR + 22) * Math.cos(a), ly = cy + (maxR + 22) * Math.sin(a);
            ctx.font = '12px Noto Sans SC, sans-serif'; ctx.fillStyle = '#f0e6d3';
            ctx.textAlign = Math.abs(Math.cos(a)) < 0.1 ? 'center' : Math.cos(a) > 0 ? 'left' : 'right';
            ctx.textBaseline = Math.abs(Math.sin(a)) < 0.1 ? 'middle' : Math.sin(a) > 0 ? 'top' : 'bottom';
            ctx.fillText(keys[i] + ' ' + scores[keys[i]], lx, ly);
        }

        // 详情条
        var details = document.getElementById('radarDetails');
        var html = '';
        var colors = ['#c9a96e','#4ecdc4','#ff6b6b','#ffd93d','#3a7bd5','#a78bfa','#ff9ff3','#2d8b56'];
        keys.forEach(function(k, i) {
            var v = scores[k];
            var color = v >= 70 ? '#4ecdc4' : v >= 50 ? colors[i % colors.length] : '#ff6b6b';
            html += '<div class="radar-score-item">'
                + '<span class="radar-score-label">' + k + '</span>'
                + '<div class="radar-score-bar"><div class="radar-score-fill" style="width:' + v + '%;background:' + color + '"></div></div>'
                + '<span class="radar-score-value" style="color:' + color + '">' + v + '</span>'
                + '</div>';
        });
        details.innerHTML = html;
    }

    /* ===================== 八字 ===================== */
    function renderBazi(bazi) {

        html += '<div class="data-row">动爻：' + (Array.isArray(l.dong_yao) ? l.dong_yao.join('、') : l.dong_yao || '') + '　世：第' + (l.shi || 0) + '爻　应：第' + (l.ying || 0) + '爻</div>';

        html += '</div>';

        html += '<div style="margin:0.5rem 0;padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem;">';
        if (riYue.ri_jian) html += '<span class="data-gold">日建：</span>' + riYue.ri_jian + ' ';
        if (riYue.yue_jian) html += '<span class="data-gold">月建：</span>' + riYue.yue_jian + ' ';
        if (wxA.yong_shen) html += '<span style="color:#4ecdc4">用神：</span>' + wxA.yong_shen + ' ';

        if (geJu.length > 0) {
            html += '<div style="margin:0.5rem 0"><div class="data-section-title">格局</div><div class="feature-tags">';

        }

        // 伏神（Fu Shen）
        var fuShen = l.fu_shen || [];
        if (fuShen.length > 0) {
            html += '<div style="margin:0.5rem 0"><div class="data-section-title">伏神</div><div style="display:flex;gap:0.5rem;flex-wrap:wrap">';
            fuShen.forEach(function(fs) {
                var name = fs.name || fs.liu_qin || '';
                var zhi = fs.dizhi || fs.zhi || '';
                var pos = fs.position || fs.yao || '';
                html += '<div style="padding:0.3rem 0.6rem;background:var(--bg-card);border-radius:6px;border:1px solid var(--border-subtle);font-size:0.8rem"><span class="data-gold">' + name + '</span> <span class="data-muted">' + zhi + '</span>' + (pos ? ' <span class="data-muted">@第' + pos + '爻</span>' : '') + '</div>';
            });
            html += '</div></div>';
        }

        // 六爻详细表
        if (l.lines && l.lines.length > 0) {
            html += '<div style="overflow-x:auto"><table class="data-table">';
            html += '<tr class="data-muted" style="border-bottom:1px solid var(--border-subtle)">';
            html += '<th style="padding:0.4rem">爻位</th><th>阴阳</th><th>六亲</th><th>地支</th><th>五行</th>';
            if (l.liu_shen) html += '<th>六神</th>';
            html += '<th>状态</th></tr>';
            var dongYaoArr = Array.isArray(l.dong_yao) ? l.dong_yao : [l.dong_yao];
            for (var i = l.lines.length - 1; i >= 0; i--) {
                var y = l.lines[i];
                var isDong = dongYaoArr.indexOf(i+1) >= 0 || y.is_dong;
                var isShi = y.is_shi || y.position === l.shi;
                var isYing = y.is_ying || y.position === l.ying;
                var rowClass = isDong ? 'dong' : '';
                if (isShi) rowClass += ' shi-yao';
                if (isYing) rowClass += ' ying-yao';
                html += '<tr class="' + rowClass.trim() + '"' + (isDong ? ' style="background:rgba(255,215,0,0.08)"' : '') + '>';
                html += '<td style="padding:0.4rem">' + (isDong ? '◆ ' : '') + '第' + (y.position || (i+1)) + '爻</td>';
                html += '<td>' + (y.yinyang === '阳' ? '—' : '- -') + '</td>';
                html += '<td class="data-gold">' + (y.liu_qin || y.liuqin || '') + '</td>';
                html += '<td>' + (y.dizhi || y.zhi || '') + '</td>';
                html += '<td>' + (y.wuxing || '') + '</td>';
                if (l.liu_shen) html += '<td class="data-muted">' + (l.liu_shen[i] || '') + '</td>';
                var mark = '';
                if (isShi) mark = '世';
                else if (isYing) mark = '应';
                html += '<td style="color:' + (mark === '世' ? 'var(--accent-gold)' : 'var(--text-muted)') + ';">' + (mark || (isDong ? '动' : '')) + '</td>';
                html += '</tr>';
            }
            html += '</table></div>';
        }

        // 变爻详细（Bian Lines）
        var bianLines = l.bian_lines || [];
        if (bianLines.length > 0) {
            html += '<div style="margin-top:0.8rem"><div class="data-section-title">变卦爻</div><div style="overflow-x:auto"><table class="data-table">';
            html += '<tr class="data-muted" style="border-bottom:1px solid var(--border-subtle)">';
            html += '<th style="padding:0.4rem">爻位</th><th>阴阳</th><th>六亲</th><th>地支</th><th>五行</th><th>状态</th></tr>';
            for (var j = bianLines.length - 1; j >= 0; j--) {
                var bl = bianLines[j];
                var blDong = dongYaoArr.indexOf(j+1) >= 0 || bl.is_dong;
                html += '<tr class="yao-bian"' + (blDong ? ' style="background:rgba(255,107,107,0.06)"' : '') + '>';
                html += '<td style="padding:0.4rem">第' + (bl.position || (j+1)) + '爻</td>';
                html += '<td>' + (bl.yinyang === '阳' ? '—' : '- -') + '</td>';
                html += '<td class="data-gold">' + (bl.liu_qin || bl.liuqin || '') + '</td>';
                html += '<td>' + (bl.dizhi || bl.zhi || '') + '</td>';
                html += '<td>' + (bl.wuxing || '') + '</td>';
                html += '<td style="color:var(--accent-crimson)">' + (blDong ? '变' : '') + '</td>';
                html += '</tr>';
            }
            html += '</table></div></div>';
        }

        document.getElementById('liuyaoContent').innerHTML = html;
    }

    /* ===================== 奇门遁甲 ===================== */
    function renderQimen(q) {
        var zhiFuStr = q.zhi_fu ? (typeof q.zhi_fu === 'object' ? q.zhi_fu.star + '(' + q.zhi_fu.gong + '宫)' : q.zhi_fu) : '';
        var zhiShiStr = q.zhi_shi ? (typeof q.zhi_shi === 'object' ? q.zhi_shi.door + '(' + q.zhi_shi.gong + '宫)' : q.zhi_shi) : '';
        var juInfo = (q.ju_name || '') + '　节气：' + (q.jieqi || '') + '　值符：' + zhiFuStr + '　值使：' + zhiShiStr;
        if (q.yin_yang) juInfo += '　阴阳：' + q.yin_yang;
        if (q.time_gan) juInfo += '　时干：' + q.time_gan;
        document.getElementById('qimenJu').textContent = juInfo;

        // 旬空/隐仪
        var xkEl = document.getElementById('qimenXunkong'); xkEl.innerHTML = '';
        var xk = q.xun_kong || {};
        if (xk.empty_zhi || q.hidden_yi || xk.ganzhi) {
            xkEl.innerHTML = '<div style="padding:0.4rem 0.8rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem">';
            if (xk.ganzhi) xkEl.innerHTML += '<span class="data-muted">旬首：' + xk.ganzhi + '</span>　';
            if (xk.empty_zhi) xkEl.innerHTML += '<span style="color:var(--accent-crimson)">空亡：' + (Array.isArray(xk.empty_zhi) ? xk.empty_zhi.join('、') : xk.empty_zhi) + '</span>　';
            if (q.hidden_yi) xkEl.innerHTML += '<span class="data-gold">隐仪：' + q.hidden_yi + '</span>';
            xkEl.innerHTML += '</div>';
        }

        var gongMap = {'4':'巽四','9':'离九','2':'坤二','3':'震三','5':'中五','7':'兑七','8':'艮八','1':'坎一','6':'乾六'};
        var go = ['4','9','2','3','5','7','8','1','6'];
        var c = document.getElementById('qimenGrid'); c.innerHTML = '';
        var palArr = q.palaces || [];
        go.forEach(function(gid) {
            var g = gongMap[gid];
            var pal = palArr.find(function(p) { return String(p.gong) === gid; }) || {};
            var d = document.createElement('div');
            d.className = 'qimen-cell' + (gid === '5' ? ' center' : '');
            d.innerHTML = '<div class="qimen-gong">' + g + '</div>' +
                '<div class="data-gold">地：' + (pal.di_pan || (q.di_pan && q.di_pan[gid]) || '') + '</div>' +
                '<div class="data-blue">天：' + (pal.tian_pan || (q.tian_pan && q.tian_pan[gid]) || '') + '</div>' +
                '<div>' + (pal.men || (q.ba_men && q.ba_men[gid]) || '') + '</div>' +
                '<div class="data-muted">' + (pal.xing || (q.jiu_xing && q.jiu_xing[gid]) || '') + '</div>' +
                '<div class="data-muted">' + (pal.shen || (q.ba_shen && q.ba_shen[gid]) || '') + '</div>';
            c.appendChild(d);
        });

        // 格局分析 & 三盘摘要
        var analysisEl = document.getElementById('qimenAnalysis'); analysisEl.innerHTML = '';
        var geJu = q.ge_ju_analysis || {}; var sanPan = q.san_pan_summary || {};
        if (Object.keys(geJu).length > 0 || Object.keys(sanPan).length > 0) {
            analysisEl.innerHTML = '';
            if (Object.keys(sanPan).length > 0) {
                analysisEl.innerHTML += '<div class="data-section-title">三盘摘要</div><div style="padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem;margin-bottom:0.8rem">';
                if (sanPan.tian_pan) analysisEl.innerHTML += '<div><span class="data-muted">天盘：</span><span class="data-blue">' + sanPan.tian_pan + '</span></div>';
                if (sanPan.di_pan) analysisEl.innerHTML += '<div><span class="data-muted">地盘：</span><span class="data-gold">' + sanPan.di_pan + '</span></div>';
                if (sanPan.ren_pan) analysisEl.innerHTML += '<div><span class="data-muted">人盘：</span>' + sanPan.ren_pan + '</div>';
                if (sanPan.shen_pan) analysisEl.innerHTML += '<div><span class="data-muted">神盘：</span>' + sanPan.shen_pan + '</div>';
                analysisEl.innerHTML += '</div>';
            }
            if (Object.keys(geJu).length > 0) {
                analysisEl.innerHTML += '<div class="data-section-title">格局分析</div><div style="padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem">';
                if (geJu.type) analysisEl.innerHTML += '<div><span class="data-gold">格局：</span>' + geJu.type + '</div>';
                if (geJu.name) analysisEl.innerHTML += '<div><span class="data-gold">名称：</span>' + geJu.name + '</div>';
                if (geJu.description) analysisEl.innerHTML += '<div class="data-muted" style="margin-top:0.3rem">' + geJu.description + '</div>';
                if (geJu.ji_xiong) analysisEl.innerHTML += '<div style="margin-top:0.3rem;color:' + (geJu.ji_xiong.indexOf('吉') >= 0 ? '#4ecdc4' : '#ff6b6b') + '">' + geJu.ji_xiong + '</div>';
                // Generic key-value rendering for unknown fields
                Object.keys(geJu).forEach(function(k) {
                    if (['type','name','description','ji_xiong'].indexOf(k) >= 0) return;
                    var v = geJu[k]; if (v && typeof v === 'string') analysisEl.innerHTML += '<div><span class="data-muted">' + k + '：</span>' + v + '</div>';
                });
                analysisEl.innerHTML += '</div>';
            }
        }
    }

    /* ===================== 大六壬 ===================== */
    function renderLiuren(l) {
        var html = '<div class="data-header">';
        var siZhu = l.si_zhu || {};
        html += '<div class="data-gold" style="font-size:1rem;margin-bottom:0.5rem">' + (siZhu.year||'') + ' ' + (siZhu.month||'') + ' ' + (siZhu.day||'') + ' ' + (siZhu.time||'') + '</div>';
        html += '<div>月将：<span class="data-gold">' + (l.yue_jiang || '') + '</span>（' + (l.yue_jiang_zhi || '') + '）　占时：' + (l.zhan_shi || '') + '　课体：<span class="data-gold">' + (l.ge_ju || '') + '</span></div>';
        if (l.day_ma) html += '<div style="margin-top:0.3rem">日马：<span style="color:#4ecdc4">' + l.day_ma + '</span></div>';
        html += '</div>';
        // 四课
        var keNames = ['第一课(日干上神)', '第二课(日干阴神)', '第三课(日支上神)', '第四课(日支阴神)'];
        html += '<div style="margin-bottom:1rem"><div class="data-section-title">四课</div>';
        html += '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:0.4rem">';
        (l.si_ke || []).forEach(function(k, i) {
            var keText = Array.isArray(k) ? k.join(' ') : (k.name || JSON.stringify(k));
            html += '<div class="data-card"><span class="data-muted">' + (keNames[i]||'第'+(i+1)+'课') + '</span><br><span class="data-gold" style="font-size:1.1rem">' + keText + '</span></div>';
        });
        html += '</div></div>';

        // 四课分析（si_ke_analysis）
        var ska = l.si_ke_analysis || {};
        if (Object.keys(ska).length > 0) {
            html += '<div style="margin-bottom:1rem"><div class="data-section-title">四课分析</div><div style="padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem">';
            Object.keys(ska).forEach(function(k) {
                var v = ska[k];
                if (typeof v === 'string') html += '<div><span class="data-muted">' + k + '：</span>' + v + '</div>';
                else if (typeof v === 'object' && v !== null) html += '<div><span class="data-muted">' + k + '：</span>' + (v.analysis || v.text || JSON.stringify(v)) + '</div>';
            });
            html += '</div></div>';
        }

        // 三传
        var scNames = ['初传(发用)', '中传', '末传'];
        var scColors = ['#ff6b6b', '#ffd93d', '#4ecdc4'];
        html += '<div style="margin-bottom:1rem"><div class="data-section-title">三传</div>';
        html += '<div class="data-flex">';
        (l.san_chuan || []).forEach(function(c, i) {
            var t = Array.isArray(c) ? c.join(' ') : (c.name || JSON.stringify(c));
            html += '<div class="data-box" style="border-top:3px solid ' + (scColors[i]||'') + '">';
            html += '<div class="data-muted">' + (scNames[i]||'') + '</div>';
            html += '<div class="data-gold" style="font-size:1.1rem">' + t + '</div>';
            html += '</div>';
        });
        html += '</div></div>';
        // 天将
        if (l.tian_jiang && Object.keys(l.tian_jiang).length > 0) {
            html += '<div><div class="data-section-title">十二天将</div>';
            html += '<div class="data-grid">';
            var zhiOrder = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
            zhiOrder.forEach(function(z) {
                var jiang = l.tian_jiang[z] || '';
                html += '<div class="data-grid-cell"><span class="data-muted">' + z + '</span> <span class="data-gold">' + jiang + '</span></div>';
            });
            html += '</div></div>';
        }
        // 用神
        var yongShen = l.yong_shen || {};
        if (yongShen.chu_chuan_zhi) {
            html += '<div style="margin-top:0.5rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem"><span class="data-gold">用神：</span>' + yongShen.chu_chuan_zhi + ' ' + yongShen.chu_chuan_jiang + ' ' + yongShen.chu_chuan_liuqin + ' — ' + (yongShen.jiang_ji_xiong||'') + '</div>';
        }

        // Positions detail
        var positions = l.positions || [];
        if (positions.length > 0) {
            html += '<div style="margin-top:0.8rem"><div class="data-section-title">天地盘</div>';
            html += '<div class="data-grid" style="grid-template-columns:repeat(4,1fr)">';
            positions.forEach(function(pos) {
                html += '<div class="data-grid-cell"><div class="data-muted" style="font-size:0.7rem">' + (pos.zhi || pos.position || '') + '</div>';
                if (pos.tian_jiang) html += '<div class="data-gold">' + pos.tian_jiang + '</div>';
                if (pos.tian_pan) html += '<div class="data-blue">' + pos.tian_pan + '</div>';
                if (pos.di_pan) html += '<div>' + pos.di_pan + '</div>';
                html += '</div>';
            });
            html += '</div></div>';
        }

        document.getElementById('liurenContent').innerHTML = html;
    }

    /* ===================== 太乙神数 ===================== */

        var dingSuan = Array.isArray(t.ding_suan) ? t.ding_suan.join(' ') : (t.ding_suan || '');
        html += '<div style="margin-bottom:0.5rem;padding:0.5rem;background:var(--bg-card);border-radius:6px;font-size:0.8rem">';
        html += '<span style="color:#4ecdc4">主算：' + zhuSuan + '</span> · ';
        html += '<span style="color:#ff6b6b">客算：' + keSuan + '</span> · ';
        html += '<span class="data-gold">定算：' + dingSuan + '</span></div>';
        // 综合判断
        var suanA = t.suan_analysis || {};
        if (suanA.pan_duan) {
            html += '<div style="padding:0.5rem;background:var(--bg-card);border-radius:6px;border-left:3px solid var(--accent-gold);font-size:0.8rem">' + suanA.pan_duan + '</div>';
        }
        document.getElementById('taiyiContent').innerHTML = html;
    }

    function renderXingming(xm) {
        var html = '';
        // 五格
        if (xm.wuge) {
            html += '<div class="data-section-title" style="margin-bottom:0.8rem">五格剖象</div>';
            html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:0.5rem;margin-bottom:1rem">';
            ['天格','人格','地格','外格','总格'].forEach(function(g) {
                var v = xm.wuge[g]; if (!v) return;
                var jx = (v['吉凶'] || '').indexOf('吉') >= 0 ? 'data-gold' : (v['吉凶'] || '').indexOf('凶') >= 0 ? 'style="color:var(--accent-crimson)"' : '';
                html += '<div style="padding:0.5rem;background:var(--bg-card);border-radius:8px;border:1px solid var(--border);text-align:center">';
                html += '<div class="data-muted" style="font-size:0.7rem">' + g + '</div>';
                html += '<div ' + jx + ' style="font-size:1.2rem;font-weight:700">' + (v['笔画'] || v['画数'] || v['数理'] || '') + '</div>';
                html += '<div class="data-muted" style="font-size:0.65rem">' + (v['五行'] || '') + ' · ' + (v['吉凶'] || '') + '</div>';
                html += '</div>';
            });
            html += '</div>';
        }
        // 三才
        if (xm.sancai) {
            html += '<div style="margin-bottom:1rem"><span class="data-section-title">三才配置：</span>';
            html += '<span class="data-gold">' + (xm.sancai['配置'] || '') + '</span>';
            html += ' <span class="data-muted">(' + (xm.sancai['吉凶'] || '') + ')</span>';
            if (xm.sancai['解释']) html += '<div class="data-muted" style="font-size:0.7rem;margin-top:0.3rem">' + xm.sancai['解释'] + '</div>';
            html += '</div>';
        }
        // 总评
        if (xm.score) {
            html += '<div style="padding:0.8rem;background:var(--bg-card);border-radius:8px;border:1px solid var(--border)">';
            html += '<span class="data-section-title">综合评分：</span><span class="data-gold" style="font-size:1.3rem">' + xm.score + '分</span>';
            html += '</div>';
        }
        // 八字配合
        if (xm.bazi_match) {
            html += '<div style="margin-top:1rem"><div class="data-section-title">八字喜用配合</div>';
            html += '<div class="data-muted" style="margin-top:0.3rem">' + (xm.bazi_match.note || JSON.stringify(xm.bazi_match)) + '</div></div>';
        }
        // 分析报告
        if (xm.analysis) {
            html += '<div style="margin-top:1rem"><div class="data-section-title">详细分析</div>';
            html += '<pre style="white-space:pre-wrap;font-size:0.75rem;color:var(--text-secondary);margin-top:0.5rem;line-height:1.6">' + xm.analysis + '</pre></div>';
        }
        document.getElementById('xingmingContent').innerHTML = html || '<div class="data-muted">暂无姓名学数据</div>';
    }

    function renderValidation(data) {
        document.getElementById('validationResult').classList.remove('hidden'); var b = document.getElementById('confidenceBadge'); b.textContent = data.overall_confidence; b.className = 'confidence-badge confidence-' + data.overall_confidence;
        document.getElementById('availableMethods').textContent = (data.available_methods || []).join('、'); var l = document.getElementById('consensusList'); l.innerHTML = '';
        (data.consensus || []).forEach(function(c) { var d = document.createElement('div'); d.className = 'consensus-item'; d.innerHTML = '<strong>' + c.aspect + '</strong>：' + c.finding + ' <span class="confidence-badge confidence-' + c.confidence + '" style="margin-left:0.5rem">' + c.confidence + '</span>'; l.appendChild(d); });
        (data.conflicts || []).forEach(function(c) { var d = document.createElement('div'); d.className = 'conflict-item'; d.innerHTML = '<strong>' + c.aspect + '</strong>：' + c.method_a + '「' + c.finding_a + '」vs ' + c.method_b + '「' + c.finding_b + '」<br><small class="data-muted">建议：' + c.suggestion + '</small>'; l.appendChild(d); });
    }
    function loadPreview() {
        api.getFigures().then(function(data) { var ids = Object.keys(data); var shuffled = ids.sort(function() { return Math.random() - 0.5; }).slice(0, 6); var gallery = document.getElementById('previewGallery'); gallery.innerHTML = '';
            shuffled.forEach(function(fid) { var f = data[fid]; var card = document.createElement('div'); card.className = 'figure-card'; card.innerHTML = '<div class="figure-header"><div class="figure-avatar ' + f.faction + '">' + f.name[0] + '</div><div class="figure-info"><h4>' + f.name + '</h4><div class="figure-title-text">' + f.title + '</div></div></div><div class="figure-method-badge">' + f.primary_method + '</div>' + (f.soul && f.soul.essence ? '<div class="figure-soul-essence">' + f.soul.essence + '</div>' : ''); gallery.appendChild(card); });
        }).catch(function(e) { console.error('Preview failed:', e); });
    }
    </script>

        <div class="footer-divider"></div>

        <p class="footer-sub">融八字·紫微·占星·六爻·奇门·大六壬·太乙·姓名学</p>
