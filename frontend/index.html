<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 — 七术排盘 × 108视角 × 群体智能</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">玄照 <span>v2.0</span></a>
        <div class="nav-links">
            <a href="/" class="active">排盘</a>
            <a href="/perspectives">108视角</a>
            <a href="/debate">辩论台</a>
        </div>
    </nav>
    <div class="container">
        <div class="hero">
            <h1 class="hero-title">玄 照</h1>
            <p class="hero-subtitle">七术排盘 · 交叉验证 · 108视角群体智能</p>
            <div class="hero-divider"></div>
        </div>
        <div class="input-panel">
            <h2>出生信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>出生时间</label>
                    <input type="text" id="birth" placeholder="2005-06-09 11:50" value="2005-06-09 11:50">
                </div>
                <div class="form-group">
                    <label>出生地点</label>
                    <input type="text" id="location" placeholder="呼和浩特" value="呼和浩特">
                </div>
                <div class="form-group">
                    <label>性别</label>
                    <select id="gender">
                        <option value="男" selected>男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>姓名（可选）</label>
                    <input type="text" id="name" placeholder="">
                </div>
            </div>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="analyze()">七术排盘</button>
                <button class="btn btn-secondary" onclick="goDetail()">命盘详情</button>
                <button class="btn btn-secondary" onclick="debate()">开启辩论</button>
            </div>
        </div>
        <div id="loading" class="loading" style="display:none;"><div class="spinner"></div><p>正在排盘，请稍候...</p></div>
        <div id="error" class="error-message" style="display:none;"></div>
        <div id="chartResult" class="chart-result">
            <div class="method-tabs" id="methodTabs"></div>
            <div id="baziPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">八字四柱</div><div class="bazi-pillars" id="baziPillars"></div><div class="shishen-grid" id="baziShishen"></div><div style="margin-top:1rem;text-align:center;color:var(--accent-gold);">日主：<span id="dayMaster"></span><span id="dayMasterWuxing" style="margin-left:1rem;"></span><span id="tiaohou" style="margin-left:1rem;color:var(--text-muted);"></span></div><div class="feature-tags" id="baziFeatures"></div></div></div>
            <div id="ziweiPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">紫微斗数</div><div id="ziweiInfo" style="margin-bottom:1rem;"></div><div id="ziweiPalaces"></div></div></div>
            <div id="astroPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">西洋占星</div><div style="margin-bottom:1rem;text-align:center;"><span style="color:var(--accent-gold);margin-right:2rem;">太阳：<span id="sunSign"></span></span><span style="color:var(--text-primary);margin-right:2rem;">月亮：<span id="moonSign"></span></span><span style="color:var(--text-muted);">上升：<span id="ascSign"></span></span></div><div class="astro-planets" id="astroPlanets"></div></div></div>
            <div id="liuyaoPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">六爻</div><div id="liuyaoContent"></div></div></div>
            <div id="qimenPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">奇门遁甲</div><div style="text-align:center;margin-bottom:1rem;color:var(--accent-gold);" id="qimenJu"></div><div class="qimen-grid" id="qimenGrid"></div></div></div>
            <div id="liurenPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">大六壬</div><div id="liurenContent"></div></div></div>
            <div id="taiyiPanel" class="method-panel" style="display:none;"><div class="card"><div class="card-title">太乙神数</div><div id="taiyiContent"></div></div></div>
            <div class="validation-result" id="validationResult" style="display:none;"><div class="card"><div class="card-title">七术交叉验证 <span class="confidence-badge" id="confidenceBadge" style="margin-left:1rem;"></span></div><div style="color:var(--text-muted);margin-bottom:1rem;">可用术法：<span id="availableMethods"></span></div><div class="consensus-list" id="consensusList"></div></div></div>
        </div>
        <div id="perspectivesPreview" style="margin-top:2rem;">
            <div class="card">
                <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">108视角 <a href="/perspectives" class="btn btn-ghost">查看全部 →</a></div>
                <div class="perspectives-gallery" id="previewGallery"></div>
            </div>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        function showLoading(v){document.getElementById("loading").style.display=v?"block":"none"}
        function showError(m){var e=document.getElementById("error");e.textContent=m;e.style.display="block"}
        function hideError(){document.getElementById("error").style.display="none"}
        function goDetail(){var b=document.getElementById("birth").value,l=document.getElementById("location").value,g=document.getElementById("gender").value;window.location="/chart?birth="+b+"&location="+l+"&gender="+g}
        function debate(){var b=document.getElementById("birth").value,l=document.getElementById("location").value,g=document.getElementById("gender").value;window.location="/debate?birth="+b+"&location="+l+"&gender="+g}

        async function analyze(){
            var birth=document.getElementById("birth").value,location=document.getElementById("location").value,gender=document.getElementById("gender").value;
            if(!birth){showError("请输入出生时间");return}
            showLoading(true);hideError();
            try{
                var d=await api.getChart(birth,location,gender);renderChart(d);
                var v=await api.crossValidate(birth,location,gender);renderValidation(v);
                showLoading(false);document.getElementById("chartResult").classList.add("active");
            }catch(e){showLoading(false);showError(e.message)}
        }

        function switchPanel(n,el){document.querySelectorAll(".method-panel").forEach(function(p){p.style.display="none"});var p=document.getElementById(n+"Panel");if(p)p.style.display="block";document.querySelectorAll(".method-tab").forEach(function(t){t.classList.remove("active")});if(el)el.classList.add("active")}

        function renderChart(data){
            var methods=data.methods||[];var tc=document.getElementById("methodTabs");tc.innerHTML="";
            var mn={"八字":"bazi","紫微":"ziwei","占星":"astro","六爻":"liuyao","奇门":"qimen","大六壬":"liuren","太乙":"taiyi"};
            methods.forEach(function(m,i){var t=document.createElement("div");t.className="method-tab"+(i===0?" active":"");t.textContent=m;t.onclick=function(){switchPanel(mn[m],this)};tc.appendChild(t)});
            if(methods.length>0&&mn[methods[0]])switchPanel(mn[methods[0]],tc.firstChild);
            if(data.bazi){document.getElementById("baziPanel").style.display="block";renderBazi(data.bazi)}
            if(data.ziwei){document.getElementById("ziweiPanel").style.display="block";renderZiwei(data.ziwei)}
            if(data.astro){document.getElementById("astroPanel").style.display="block";renderAstro(data.astro)}
            if(data.liuyao){document.getElementById("liuyaoPanel").style.display="block";renderLiuyao(data.liuyao)}
            if(data.qimen){document.getElementById("qimenPanel").style.display="block";renderQimen(data.qimen)}
            if(data.liuren){document.getElementById("liurenPanel").style.display="block";renderLiuren(data.liuren)}
            if(data.taiyi){document.getElementById("taiyiPanel").style.display="block";renderTaiyi(data.taiyi)}
        }

        function renderBazi(bazi){
            var ps=["year","month","day","time"],ls=["年柱","月柱","日柱","时柱"],c=document.getElementById("baziPillars");c.innerHTML="";
            ps.forEach(function(p,i){var gz=bazi[p];if(gz){var d=document.createElement("div");d.className="pillar";d.innerHTML="<div class=\"pillar-label\">"+ls[i]+"</div><div class=\"pillar-gan\">"+gz[0]+"</div><div class=\"pillar-zhi\">"+gz[1]+"</div><div class=\"pillar-nayin\">"+(bazi.nayin&&bazi.nayin[p]||"")+"</div>";c.appendChild(d)}});
            var sc=document.getElementById("baziShishen");sc.innerHTML="";var sm=bazi.shishen_gan||{};
            ps.forEach(function(p,i){var ss=sm[p];if(ss){var d=document.createElement("div");d.className="shishen-item";d.textContent=ls[i]+": "+ss;sc.appendChild(d)}});
            document.getElementById("dayMaster").textContent=bazi.day_master||"";
            document.getElementById("dayMasterWuxing").textContent=bazi.day_master_wuxing||"";
            document.getElementById("tiaohou").textContent=bazi.tiaohou?"调候用神："+bazi.tiaohou:"";
            var fc=document.getElementById("baziFeatures");fc.innerHTML="";
            (bazi.features||[]).forEach(function(f){var t=document.createElement("span");t.className="feature-tag"+(f.indexOf("冲")>=0?" highlight":"");t.textContent=f;fc.appendChild(t)})
        }

        function renderZiwei(z){
            var wh=z.wuxing_ju||{};var wx=(typeof wh==="string")?wh:(wh.wuxing||"");var js=(typeof wh==="string")?"":(wh.ju_shu||"");
            document.getElementById("ziweiInfo").innerHTML='<div class="ziwei-info-bar"><span>命宫：'+(z.ming_gong||"")+'</span><span>五行局：'+wx+js+'局</span><span>四化：禄'+(z.sihua&&z.sihua.禄||"")+' 权'+(z.sihua&&z.sihua.权||"")+' 科'+(z.sihua&&z.sihua.科||"")+' 忌'+(z.sihua&&z.sihua.忌||"")+'</span></div>';
            var cellZhi={0:"巳",1:"午",2:"未",3:"申",4:"辰",7:"酉",8:"卯",11:"戌",12:"寅",13:"丑",14:"子",15:"亥"};
            var zm={};(z.palaces||[]).forEach(function(p){zm[p.zhi]=p});
            var c=document.getElementById("ziweiPalaces");c.innerHTML="";c.className="ziwei-board";
            var ms=["紫微","天机","太阳","武曲","天同","廉贞","天府","太阴","贪狼","巨门","天相","天梁","七杀","破军"];
            for(var i=0;i<16;i++){var cell=document.createElement("div");
                if(!cellZhi[i]){cell.className="ziwei-cell empty"}
                else{var zz=cellZhi[i],pal=zm[zz];cell.className="ziwei-cell"+(pal&&pal.name==="命宫"?" ming-gong":"");
                    var sh="";if(pal&&pal.stars){pal.stars.forEach(function(star){
                        var si="";if(z.sihua){if(z.sihua.禄===star)si=" ziwei-star-sihua-lu";else if(z.sihua.权===star)si=" ziwei-star-sihua-quan";else if(z.sihua.科===star)si=" ziwei-star-sihua-ke";else if(z.sihua.忌===star)si=" ziwei-star-sihua-ji"}
                        sh+='<span class="'+(ms.indexOf(star)>=0?"ziwei-star-main":"ziwei-star-aux")+si+'">'+star+'</span>'})}
                    cell.innerHTML='<div class="ziwei-cell-header"><span class="ziwei-cell-zhi">'+zz+'</span><span class="ziwei-cell-name">'+(pal?pal.name:"")+'</span></div><div class="ziwei-cell-stars">'+sh+'</div>'}
                c.appendChild(cell)}
        }

        function renderAstro(a){
            document.getElementById("sunSign").textContent=a.sun_sign||"";
            document.getElementById("moonSign").textContent=a.moon_sign||"";
            document.getElementById("ascSign").textContent=a.ascendant||"";
            var c=document.getElementById("astroPlanets");c.innerHTML="";
            Object.entries(a.planets||{}).forEach(function(e){var n=e[0],info=e[1];var d=document.createElement("div");d.className="planet";d.innerHTML='<div class="planet-name">'+n+'</div><div class="planet-sign">'+(info.sign||"")+'</div><div style="color:var(--text-muted);font-size:0.75rem;">'+(info.degree||"")+'°</div>';c.appendChild(d)})
        }

        function renderLiuyao(l){document.getElementById("liuyaoContent").innerHTML='<div class="gua-info"><div class="gua-name">'+(l.ben_gua&&l.ben_gua.name||"")+'</div><div>动爻：第'+(l.dong_yao||0)+'爻</div></div>'}

        function renderQimen(q){
            document.getElementById("qimenJu").textContent=q.ju_name||"";
            var go=["巽四","离九","坤二","震三","中五","兑七","艮八","坎一","乾六"];
            var c=document.getElementById("qimenGrid");c.innerHTML="";
            go.forEach(function(g){var d=document.createElement("div");d.className="qimen-cell"+(g==="中五"?" center":"");d.innerHTML='<div class="qimen-gong">'+g+'</div><div class="qimen-di">'+(q.di_pan&&q.di_pan[g]||"")+'</div><div class="qimen-men">'+(q.ba_men&&q.ba_men[g]||"")+'</div>';c.appendChild(d)})
        }

        function renderLiuren(l){document.getElementById("liurenContent").innerHTML='<p class="info-line"><span class="label">月将：</span>'+(l.yue_jiang||"")+'</p><p class="info-line"><span class="label">四课：</span>'+(l.si_ke||[]).map(function(k){return k.ke}).join("，")+'</p><p class="info-line"><span class="label">三传：</span>'+(l.san_chuan||[]).map(function(c){return c.name}).join(" → ")+'</p>'}

        function renderTaiyi(t){document.getElementById("taiyiContent").innerHTML='<div class="taiyi-info"><div class="taiyi-gong">'+(t.taiyi_gong||"")+'</div><div class="info-line" style="margin-top:0.5rem;"><span class="label">积年数：</span>'+(t.ji_nian||0)+'</div><div class="info-line"><span class="label">阴阳遁：</span>'+(t.yin_yang||"")+'</div></div>'}

        function renderValidation(data){
            document.getElementById("validationResult").style.display="block";
            var b=document.getElementById("confidenceBadge");b.textContent=data.overall_confidence;b.className="confidence-badge confidence-"+data.overall_confidence;
            document.getElementById("availableMethods").textContent=(data.available_methods||[]).join("、");
            var l=document.getElementById("consensusList");l.innerHTML="";
            (data.consensus||[]).forEach(function(c){var d=document.createElement("div");d.className="consensus-item";d.innerHTML="<strong>"+c.aspect+"</strong>："+c.finding+' <span class="confidence-badge confidence-'+c.confidence+'" style="margin-left:0.5rem;">'+c.confidence+"</span>";l.appendChild(d)});
            (data.conflicts||[]).forEach(function(c){var d=document.createElement("div");d.className="conflict-item";d.innerHTML="<strong>"+c.aspect+"</strong>："+c.method_a+"「"+c.finding_a+"」vs "+c.method_b+"「"+c.finding_b+"」<br><small style=\"color:var(--text-muted);\">建议："+c.suggestion+"</small>";l.appendChild(d)})
        }

        async function loadPreview(){
            try{var r=await fetch("/api/perspectives");if(!r.ok)return;var d=await r.json();
            var fs=d.figures||{};var ids=Object.keys(fs);
            var sh=ids.sort(function(){return Math.random()-0.5}).slice(0,6);
            var g=document.getElementById("previewGallery");g.innerHTML="";
            sh.forEach(function(fid){var f=fs[fid];var c=document.createElement("div");c.className="figure-card";
                c.innerHTML='<div class="figure-header"><div class="figure-avatar '+f.faction+'">'+f.name[0]+'</div><div class="figure-info"><h4>'+f.name+'</h4><div class="figure-title-text">'+f.title+'</div></div></div><div class="figure-method-badge">'+f.primary_method+'</div>'+(f.soul&&f.soul.essence?'<div class="figure-soul-essence">'+f.soul.essence+'</div>':'');
                g.appendChild(c)})
            }catch(e){console.error(e)}
        }
        loadPreview();
    </script>
</body>
</html>
