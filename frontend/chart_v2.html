<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄照 - 八字排盘</title>
<style>
:root {
  --fire:#e84040; --wood:#2e8b57; --water:#2070c0; --metal:#b8860b; --earth:#8b6914;
  --bg:#f5f5f5; --card:#fff; --border:#e0e0e0; --text:#333; --text2:#666; --text3:#999;
  --accent:#1a1a2e; --gold:#b8860b; --red:#d43050; --green:#2e8b57;
  --tag-bg:#f0f0f0;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* Header */
.hdr{background:var(--accent);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.1rem;font-weight:700;color:#c9a96e;letter-spacing:2px}
.hdr-tabs{display:flex;gap:2px;margin-left:auto;overflow-x:auto}
.hdr-tabs::-webkit-scrollbar{display:none}
.hdr-tab{font-size:.75rem;padding:4px 10px;border-radius:4px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);cursor:pointer;white-space:nowrap;border:none;transition:.2s}
.hdr-tab:hover{color:rgba(255,255,255,.8)}
.hdr-tab.on{background:rgba(201,169,110,.2);color:#c9a96e}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:44px;z-index:99}
.tab-btn{flex:1;padding:10px 0;text-align:center;font-size:.85rem;font-weight:600;color:var(--text3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent);background:rgba(26,26,46,.03)}

/* Panels */
.panels{max-width:860px;margin:0 auto;padding:10px}
.panel{display:none}.panel.on{display:block}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.card-t{font-size:.8rem;font-weight:700;color:var(--accent);padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.card-t::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}
.card-b{padding:10px 12px}

/* Personal Info */
.info-bar{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:16px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;gap:16px}
.info-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#c9a96e,#e8d5a0);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.info-detail{flex:1}
.info-name{font-size:1.1rem;font-weight:700;color:#c9a96e;margin-bottom:4px}
.info-meta{font-size:.75rem;color:rgba(255,255,255,.7);display:flex;gap:12px;flex-wrap:wrap}
.info-meta span::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%;background:#c9a96e;margin-right:4px;vertical-align:middle}

/* Bazi Pillars Display */
.pillars-bar{display:flex;justify-content:center;gap:4px;margin-bottom:10px}
.pillar{text-align:center;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;min-width:60px}
.pillar-label{font-size:.65rem;color:var(--text3);margin-bottom:4px}
.pillar-gan{font-size:1.6rem;font-weight:800;line-height:1.2}
.pillar-zhi{font-size:1.6rem;font-weight:800;line-height:1.2}
.pillar-sub{font-size:.65rem;color:var(--text3);margin-top:2px}
.w-fire{color:var(--fire)}.w-wood{color:var(--wood)}.w-water{color:var(--water)}.w-metal{color:var(--metal)}.w-earth{color:var(--earth)}

/* Bazi Table */
.bz-table{width:100%;border-collapse:collapse;text-align:center}
.bz-table th{padding:6px 4px;font-size:.7rem;color:var(--text3);font-weight:600;background:#f8f8f8;border:1px solid var(--border)}
.bz-table td{padding:5px 4px;border:1px solid var(--border);font-size:.8rem}
.bz-table .row-lbl{text-align:left;font-size:.7rem;color:var(--text3);font-weight:600;background:#fafafa;width:55px;padding-left:8px}
.bz-table .gan-cell{font-size:1.4rem;font-weight:800;line-height:1.2}
.bz-table .zhi-cell{font-size:1.4rem;font-weight:800;line-height:1.2}
.bz-table .sub-cell{font-size:.7rem;color:var(--text2)}
.bz-table .highlight{background:rgba(184,134,11,.05)}

/* Five Elements */
.wx-bar{display:flex;gap:6px;flex-wrap:wrap}
.wx-item{flex:1;min-width:55px;text-align:center;padding:8px 4px;border-radius:6px;background:#fafafa;border:1px solid var(--border)}
.wx-name{font-size:1.2rem;font-weight:700}
.wx-state{font-size:.7rem;color:var(--text3)}
.wx-count{font-size:.65rem;color:var(--text3)}
.wx-旺{background:rgba(232,64,64,.08);border-color:rgba(232,64,64,.2)}
.wx-相{background:rgba(184,134,11,.08);border-color:rgba(184,134,11,.2)}
.wx-休{background:rgba(46,139,87,.06);border-color:rgba(46,139,87,.15)}
.wx-囚{background:rgba(32,112,192,.06);border-color:rgba(32,112,192,.15)}
.wx-死{background:rgba(139,105,20,.06);border-color:rgba(139,105,20,.15)}

/* Relations */
.rels{display:flex;flex-wrap:wrap;gap:6px}
.rel-tag{padding:3px 10px;border-radius:14px;font-size:.75rem;font-weight:600}
.rel-合{background:rgba(46,139,87,.1);color:var(--green);border:1px solid rgba(46,139,87,.2)}
.rel-冲{background:rgba(212,48,80,.1);color:var(--red);border:1px solid rgba(212,48,80,.2)}
.rel-刑{background:rgba(184,134,11,.1);color:var(--metal);border:1px solid rgba(184,134,11,.2)}
.rel-破,.rel-害{background:rgba(139,105,20,.08);color:var(--earth);border:1px solid rgba(139,105,20,.15)}

/* Horizontal scroll tables */
.hscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;padding:0 2px}
.h-table{border-collapse:collapse;font-size:.75rem;min-width:100%}
.h-table th,.h-table td{padding:5px 8px;text-align:center;border:1px solid var(--border);white-space:nowrap}
.h-table th{background:#f8f8f8;color:var(--text3);font-weight:600;position:sticky;left:0;z-index:1}
.h-table .now{background:rgba(184,134,11,.1);border-color:var(--gold);font-weight:700}

/* Shen Sha */
.ss-tags{display:flex;flex-wrap:wrap;gap:4px}
.ss-tag{font-size:.7rem;padding:2px 8px;border-radius:10px;background:#f0f0f0;color:var(--text2);border:1px solid var(--border)}

/* Score */
.score-wrap{text-align:center;padding:16px}
.score-ring{position:relative;width:120px;height:120px;margin:0 auto 12px}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .bg{fill:none;stroke:#e8e8e8;stroke-width:8}
.score-ring .fg{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:800;color:var(--accent)}
.score-grade{font-size:.85rem;color:var(--text2);margin-bottom:8px}
.score-summary{font-size:.85rem;color:var(--text2);line-height:1.8;text-align:left;padding:0 8px}

/* Interpretation */
.interp-item{padding:10px 0;border-bottom:1px solid var(--border)}
.interp-item:last-child{border-bottom:none}
.interp-head{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.interp-icon{font-size:1rem}
.interp-title{font-weight:700;font-size:.85rem}
.interp-score{margin-left:auto;font-size:.8rem;font-weight:700;color:var(--accent)}
.interp-bar{height:4px;background:#e8e8e8;border-radius:2px;margin:4px 0}
.interp-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .6s}
.interp-text{font-size:.8rem;color:var(--text2);line-height:1.7}

/* Xi Yong tags */
.xy-tags{display:flex;gap:6px;flex-wrap:wrap}
.xy-t{padding:4px 12px;border-radius:14px;font-size:.8rem;font-weight:600}
.xy-xi{background:rgba(46,139,87,.1);color:var(--green);border:1px solid rgba(46,139,87,.2)}
.xy-ji{background:rgba(212,48,80,.1);color:var(--red);border:1px solid rgba(212,48,80,.2)}

/* Loading */
.ld{text-align:center;padding:60px;color:var(--text3)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:768px){
  .hdr-tabs{display:none}
  .panels{padding:6px}
  .info-bar{flex-direction:column;text-align:center;gap:8px;padding:12px}
  .info-meta{justify-content:center}
  .pillars-bar{gap:2px}
  .pillar{min-width:50px;padding:6px 8px}
  .pillar-gan,.pillar-zhi{font-size:1.3rem}
  .bz-table .gan-cell,.bz-table .zhi-cell{font-size:1.2rem}
}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-title">玄照</span>
  <div class="hdr-tabs" id="methodTabs"></div>
</header>

<nav class="tabs" id="tabs">
  <button class="tab-btn on" data-t="basic">基本信息</button>
  <button class="tab-btn" data-t="paipan">基本排盘</button>
  <button class="tab-btn" data-t="pro">专业细盘</button>
  <button class="tab-btn" data-t="score">评分解析</button>
  <button class="tab-btn" data-t="notes">断事笔记</button>
</nav>

<div class="ld" id="loader"><div class="spinner"></div><p style="margin-top:8px">排盘中…</p></div>

<main class="panels" id="panels" style="display:none">

<!-- Tab: 基本信息 -->
<section class="panel on" id="t-basic">
  <div id="infoBar"></div>
  <div class="card"><div class="card-t">四柱概览</div><div class="card-b" id="pillarsBar"></div></div>
  <div class="card"><div class="card-t">五行旺衰</div><div class="card-b" id="wuxingBar"></div></div>
  <div class="card"><div class="card-t">喜用神</div><div class="card-b" id="xiyong"></div></div>
  <div class="card"><div class="card-t">天干关系</div><div class="card-b" id="ganRels"></div></div>
  <div class="card"><div class="card-t">地支关系</div><div class="card-b" id="zhiRels"></div></div>
</section>

<!-- Tab: 基本排盘 -->
<section class="panel" id="t-paipan">
  <div class="card"><div class="card-t">八字排盘</div><div class="card-b" style="overflow-x:auto"><table class="bz-table" id="bzTable"><thead id="bzHead"></thead><tbody id="bzBody"></tbody></table></div></div>
  <div class="card"><div class="card-t">神煞</div><div class="card-b"><div class="ss-tags" id="shensha"></div></div></div>
</section>

<!-- Tab: 专业细盘 -->
<section class="panel" id="t-pro">
  <div class="card"><div class="card-t">大运</div><div class="card-b"><div class="hscroll"><table class="h-table" id="dayunTable"></table></div></div></div>
  <div class="card"><div class="card-t">流年</div><div class="card-b"><div class="hscroll"><table class="h-table" id="liunianTable"></table></div></div></div>
  <div class="card"><div class="card-t">命宫·胎元·身宫</div><div class="card-b" id="gongInfo"></div></div>
</section>

<!-- Tab: 评分解析 -->
<section class="panel" id="t-score">
  <div class="card">
    <div class="card-t">综合评分</div>
    <div class="card-b">
      <div class="score-wrap" id="scoreWrap">
        <div class="score-ring">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle class="bg" cx="60" cy="60" r="52"/>
            <circle class="fg" id="scoreArc" cx="60" cy="60" r="52" stroke-dasharray="326.73" stroke-dashoffset="326.73"/>
          </svg>
          <div class="score-num" id="scoreNum">--</div>
        </div>
        <div class="score-grade" id="scoreGrade"></div>
        <div class="score-summary" id="scoreSummary"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-t">详细解析</div>
    <div class="card-b" id="interpretations"></div>
  </div>
</section>

<!-- Tab: 断事笔记 -->
<section class="panel" id="t-notes">
  <div class="card">
    <div class="card-t">断事笔记</div>
    <div class="card-b">
      <textarea id="notesText" style="width:100%;min-height:300px;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:.85rem;line-height:1.8;resize:vertical;font-family:inherit" placeholder="在此记录断事笔记...&#10;&#10;提示：可记录八字特征、流年吉凶、重要事件等。"></textarea>
    </div>
  </div>
</section>

</main>

<script>
'use strict';
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s);
const WX={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水',子:'水',丑:'土',寅:'木',卯:'木',辰:'土',巳:'火',午:'火',未:'土',申:'金',酉:'金',戌:'土',亥:'水'};
const WXC={'金':'w-metal','木':'w-wood','水':'w-water','火':'w-fire','土':'w-earth'};

function wxClass(c){return WXC[WX[c]]||''}
function colorSpan(v){if(!v)return'--';const c=wxClass(String(v).charAt(0));return c?`<span class="${c}">${v}</span>`:v}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// Tab switching
$$('.tab-btn').forEach(b=>b.onclick=()=>{
  $$('.tab-btn').forEach(x=>x.classList.remove('on'));
  $$('.panel').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const p=$('#t-'+b.dataset.t);
  if(p)p.classList.add('on');
});

// URL params
const P=new URLSearchParams(location.search);
const BIRTH=P.get('birth')||'',LOC=P.get('location')||'北京',GENDER=P.get('gender')||'男',NAME=P.get('name')||'';

// Method tabs (placeholder)
const METHODS=[{k:'bazi',n:'八字',on:true},{k:'ziwei',n:'紫微'},{k:'astro',n:'占星'},{k:'liuyao',n:'六爻'},{k:'qimen',n:'奇门'},{k:'liuren',n:'大六壬'},{k:'taiyi',n:'太乙'},{k:'xm',n:'姓名'}];
$('#methodTabs').innerHTML=METHODS.map(m=>`<span class="hdr-tab ${m.on?'on':''}">${m.n}</span>`).join('');

// Notes
const nKey='xz_notes_'+(BIRTH||'default');
const saved=localStorage.getItem(nKey);
if(saved)$('#notesText').value=saved;
$('#notesText').addEventListener('input',e=>localStorage.setItem(nKey,e.target.value));

// Fetch data
function loadChart(birth,loc,gender,name){
  const chartUrl=`/api/chart?birth=${encodeURIComponent(birth)}&location=${encodeURIComponent(loc)}&gender=${encodeURIComponent(gender)}&name=${encodeURIComponent(name||'')}`;
  const scoreUrl=`/api/bazi/score?birth=${encodeURIComponent(birth)}&location=${encodeURIComponent(loc)}&gender=${encodeURIComponent(gender)}`;
  fetch(chartUrl).then(r=>r.json()).then(chart=>{
    render(chart,null);
    // Load score separately
    fetch(scoreUrl).then(r=>r.json()).then(score=>{
      renderScore(score);
    }).catch(()=>{});
  }).catch(e=>{
    $('#loader').innerHTML=`<p style="color:var(--red)">加载失败: ${e.message}</p>`;
  });
}
// Default test data when no birth param
if(!BIRTH){
  loadChart('2005-06-09 11:50','Beijing','male');
} else {
  loadChart(BIRTH,LOC,GENDER,NAME);
}

function render(data,score){
  const bz=data.bazi||{};
  renderInfo(bz,data);
  renderPillars(bz);
  renderWuxing(bz);
  renderXiyong(bz);
  renderGanRels(bz);
  renderZhiRels(bz);
  renderBaziTable(bz);
  renderShensha(bz);
  renderDayun(bz);
  renderLiunian(bz);
  renderGong(bz);
  renderScore(score);
}

function renderInfo(bz,data){
  const genderIcon=GENDER==='女'?'👩':'👨';
  const solar=BIRTH||'--';
  const lunar=bz.location?`农历: ${bz.location.lunar_year||''}年${bz.location.lunar_month||''}月${bz.location.lunar_day||''}日`:'';
  const pillars=`${bz.year||''} ${bz.month||''} ${bz.day||''} ${bz.time||''}`;
  $('#infoBar').innerHTML=`
    <div class="info-avatar">${genderIcon}</div>
    <div class="info-detail">
      <div class="info-name">${esc(NAME)||'未命名'}</div>
      <div class="info-meta">
        <span>阳历: ${esc(solar)}</span>
        ${lunar?`<span>${esc(lunar)}</span>`:''}
        <span>${esc(GENDER)}</span>
      </div>
      <div style="margin-top:6px;font-size:.85rem;color:#c9a96e;letter-spacing:1px">${pillars}</div>
    </div>`;
}

function renderPillars(bz){
  const cols=[
    {label:'年柱',gan:(bz.year||'').charAt(0),zhi:(bz.year||'').charAt(1)},
    {label:'月柱',gan:(bz.month||'').charAt(0),zhi:(bz.month||'').charAt(1)},
    {label:'日柱',gan:(bz.day||'').charAt(0),zhi:(bz.day||'').charAt(1)},
    {label:'时柱',gan:(bz.time||'').charAt(0),zhi:(bz.time||'').charAt(1)}
  ];
  const ss=bz.shishen_gan||{};
  const ssKeys=['year','month','day','time'];
  $('#pillarsBar').innerHTML='<div class="pillars-bar">'+cols.map((c,i)=>{
    const ssName=ssKeys[i]==='day'?'日元':(ss[ssKeys[i]]||'');
    const nayin=(bz.nayin||{})[ssKeys[i]]||'';
    return `<div class="pillar">
      <div class="pillar-label">${c.label}</div>
      <div class="pillar-gan ${wxClass(c.gan)}">${c.gan||'--'}</div>
      <div class="pillar-zhi ${wxClass(c.zhi)}">${c.zhi||'--'}</div>
      <div class="pillar-sub">${esc(ssName)}</div>
      <div class="pillar-sub">${esc(nayin)}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderWuxing(bz){
  const ws=bz.wuxing_score||{};
  const total=Object.values(ws).reduce((a,b)=>a+b,0)||1;
  // Determine旺相休囚死 based on month
  const monthZhi=(bz.month||'').charAt(1);
  const monthWx=WX[monthZhi]||'';
  const sheng={'木':'火','火':'土','土':'金','金':'水','水':'木'};
  const ke={'木':'土','火':'金','土':'水','金':'木','水':'火'};
  const stateMap={};
  if(monthWx){
    stateMap[monthWx]='旺';
    stateMap[sheng[monthWx]]='相';
    // 休 = 生我者, 囚 = 克我者, 死 = 我克者
    const beiSheng={'木':'水','火':'木','土':'火','金':'土','水':'金'};
    const beiKe={'木':'金','火':'水','土':'木','金':'火','水':'土'};
    stateMap[beiSheng[monthWx]]='休';
    stateMap[beiKe[monthWx]]='囚';
    stateMap[ke[monthWx]]='死';
  }
  const order=['火','土','金','水','木'];
  const stateCls={'旺':'wx-旺','相':'wx-相','休':'wx-休','囚':'wx-囚','死':'wx-死'};
  $('#wuxingBar').innerHTML='<div class="wx-bar">'+order.map(el=>{
    const count=ws[el]||0;
    const pct=total?Math.round(count/total*100):0;
    const state=stateMap[el]||'';
    return `<div class="wx-item ${stateCls[state]||''}">
      <div class="wx-name ${WXC[el]||''}">${el}</div>
      <div class="wx-state">${state||'--'}</div>
      <div class="wx-count">${pct}%</div>
    </div>`;
  }).join('')+'</div>';
}

function renderXiyong(bz){
  const xy=bz.xi_yong||{};
  const strength=xy.strength||'';
  const reason=xy.reason||'';
  const xi=xy.xi||[];
  const ji=xy.ji||[];
  let html='';
  if(strength)html+=`<div style="margin-bottom:8px;font-weight:700;font-size:.9rem">${esc(strength)} <span style="color:var(--text3);font-weight:400;font-size:.8rem">日主占比 ${xy.ratio||0}%</span></div>`;
  if(xi.length)html+=`<div style="margin-bottom:6px">喜用：<div class="xy-tags" style="display:inline-flex">${xi.map(x=>`<span class="xy-t xy-xi">${x}</span>`).join('')}</div></div>`;
  if(ji.length)html+=`<div style="margin-bottom:6px">忌神：<div class="xy-tags" style="display:inline-flex">${ji.map(x=>`<span class="xy-t xy-ji">${x}</span>`).join('')}</div></div>`;
  if(reason)html+=`<div style="margin-top:6px;font-size:.8rem;color:var(--text2)">${esc(reason)}</div>`;
  $('#xiyong').innerHTML=html||'暂无喜用神数据';
}

function renderGanRels(bz){
  const rels=bz.gan_relations||[];
  if(!rels.length){$('#ganRels').innerHTML='<span style="color:var(--text3);font-size:.8rem">暂无特殊天干关系</span>';return}
  $('#ganRels').innerHTML='<div class="rels">'+rels.map(r=>{
    const cls=r.includes('冲')?'rel-冲':r.includes('合')?'rel-合':r.includes('克')?'rel-冲':'rel-合';
    return `<span class="rel-tag ${cls}">${esc(r)}</span>`;
  }).join('')+'</div>';
}

function renderZhiRels(bz){
  const rels=bz.zhi_relations||[];
  if(!rels.length){$('#zhiRels').innerHTML='<span style="color:var(--text3);font-size:.8rem">暂无特殊地支关系</span>';return}
  $('#zhiRels').innerHTML='<div class="rels">'+rels.map(r=>{
    const cls=r.includes('冲')?'rel-冲':r.includes('刑')?'rel-刑':r.includes('破')?'rel-破':r.includes('害')?'rel-害':'rel-合';
    return `<span class="rel-tag ${cls}">${esc(r)}</span>`;
  }).join('')+'</div>';
}

function renderBaziTable(bz){
  const cols=['year','month','day','time'];
  const colLabels=['年柱','月柱','日柱','时柱'];
  // Header
  $('#bzHead').innerHTML='<tr><th class="row-lbl"></th>'+colLabels.map((l,i)=>`<th class="${i===3?'highlight':''}">${l}</th>`).join('')+'</tr>';
  // Rows
  const shishenGan=bz.shishen_gan||{};
  const shishenZhi=bz.shishen_zhi||{};
  const hiddenGans=bz.hidden_gans||{};
  const nayin=bz.nayin||{};
  const xunkong=bz.xunkong||{};
  const changsheng=bz.changsheng||{};
  const shenshaP=bz.shensha_per_pillar||{};

  const rows=[
    {label:'十神',fn:c=>c==='day'?'日元':(shishenGan[c]||'--')},
    {label:'天干',fn:c=>{const g=(bz[c]||'').charAt(0);return g?`<span class="gan-cell ${wxClass(g)}">${g}</span>`:'--'}},
    {label:'地支',fn:c=>{const z=(bz[c]||'').charAt(1);return z?`<span class="zhi-cell ${wxClass(z)}">${z}</span>`:'--'}},
    {label:'藏干',fn:c=>{const h=hiddenGans[c]||[];const ss=shishenZhi[c]||[];return h.map((g,i)=>`<span class="${wxClass(g)}">${g}</span>${ss[i]?'<span class="sub-cell">'+ss[i]+'</span>':''}`).join(' ')||'--'}},
    {label:'纳音',fn:c=>nayin[c]||'--'},
    {label:'空亡',fn:c=>xunkong[c]||'--'},
    {label:'星运',fn:c=>changsheng[c]||'--'},
  ];

  let body='';
  rows.forEach(r=>{
    body+='<tr>';
    body+=`<td class="row-lbl">${r.label}</td>`;
    cols.forEach(c=>{body+=`<td>${r.fn(c)}</td>`});
    body+='</tr>';
  });
  // Shen sha per pillar
  body+='<tr><td class="row-lbl">神煞</td>';
  cols.forEach(c=>{
    const ss=shenshaP[c]||[];
    body+=`<td style="font-size:.65rem;color:var(--text2)">${ss.length?ss.join(' '):'--'}</td>`;
  });
  body+='</tr>';

  $('#bzBody').innerHTML=body;
}

function renderShensha(bz){
  const ss=bz.shensha||[];
  if(!ss.length){$('#shensha').innerHTML='<span style="color:var(--text3)">暂无神煞数据</span>';return}
  if(Array.isArray(ss)){
    $('#shensha').innerHTML=ss.map(s=>{
      if(typeof s==='string')return `<span class="ss-tag">${esc(s)}</span>`;
      return `<span class="ss-tag">${esc(s.name||s.text||'')}: ${esc(s.value||s.desc||'')}</span>`;
    }).join('');
  } else if(typeof ss==='object'){
    $('#shensha').innerHTML=Object.entries(ss).map(([k,v])=>`<span class="ss-tag">${esc(k)}: ${Array.isArray(v)?v.join(', '):esc(String(v))}</span>`).join('');
  }
}

function renderDayun(bz){
  const list=bz.dayun||[];
  const table=$('#dayunTable');
  if(!list.length){table.innerHTML='<tr><td>暂无大运数据</td></tr>';return}
  const currentAge=22; // TODO: calculate from birth year
  let html='<thead><tr><th>年龄</th><th>天干</th><th>地支</th><th>十神</th><th>星运</th><th>年份</th></tr></thead><tbody>';
  list.forEach(d=>{
    const age=d.start_age||d.age||'';
    const isNow=currentAge&&age&&Math.abs(currentAge-age)<10;
    const cls=isNow?' class="now"':'';
    const tg=d.tg||d.tiangan||'';
    const dz=d.dz||d.dizhi||'';
    const ss=d.shishen||'';
    const cs=d.changsheng||'';
    const yr=d.start_year||d.year||'';
    html+=`<tr${cls}><td>${age}岁</td><td>${colorSpan(tg)}</td><td>${colorSpan(dz)}</td><td>${esc(ss)}</td><td>${esc(cs)}</td><td>${yr}</td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function renderLiunian(bz){
  const list=bz.liunian||[];
  const table=$('#liunianTable');
  if(!list.length){table.innerHTML='<tr><td>暂无流年数据</td></tr>';return}
  const curYear=new Date().getFullYear();
  let html='<thead><tr><th>年份</th><th>天干</th><th>地支</th></tr></thead><tbody>';
  list.forEach(d=>{
    const yr=d.year||'';
    const tg=d.tg||d.tiangan||'';
    const dz=d.dz||d.dizhi||'';
    const isNow=yr==curYear;
    html+=`<tr${isNow?' class="now"':''}><td>${yr}</td><td>${colorSpan(tg)}</td><td>${colorSpan(dz)}</td></tr>`;
  });
  html+='</tbody>';
  table.innerHTML=html;
}

function renderGong(bz){
  const mg=bz.ming_gong||'';
  const ty=bz.tai_yuan||'';
  const sg=bz.shen_gong||'';
  let html='';
  if(mg)html+=`<div style="margin-bottom:6px"><strong>命宫：</strong><span class="${wxClass(mg.charAt(0))}">${mg}</span>${bz.ming_gong_shishen?' ('+esc(bz.ming_gong_shishen.shishen||'')+')':''}</div>`;
  if(ty)html+=`<div style="margin-bottom:6px"><strong>胎元：</strong><span class="${wxClass(ty.charAt(0))}">${ty}</span>${bz.tai_yuan_shishen?' ('+esc(bz.tai_yuan_shishen.shishen||'')+')':''}</div>`;
  if(sg)html+=`<div><strong>身宫：</strong><span class="${wxClass(sg.charAt(0))}">${sg}</span>${bz.shen_gong_shishen?' ('+esc(bz.shen_gong_shishen.shishen||'')+')':''}</div>`;
  $('#gongInfo').innerHTML=html||'暂无命宫数据';
}

function renderScore(score){
  if(!score||score.error){
    $('#scoreSummary').innerHTML='<span style="color:var(--text3)">暂无评分数据</span>';
    return;
  }
  const total=score.total_score||0;
  const grade=score.grade||'';
  const summary=score.summary||'';
  const details=score.details||[];
  // Animate ring
  const circumference=2*Math.PI*52;
  const offset=circumference*(1-total/100);
  $('#scoreArc').style.strokeDashoffset=offset;
  $('#scoreNum').textContent=total;
  $('#scoreGrade').textContent=grade;
  // Color based on score
  const color=total>=80?'#2e8b57':total>=60?'#b8860b':'#d43050';
  $('#scoreArc').style.stroke=color;
  $('#scoreNum').style.color=color;
  // Summary
  $('#scoreSummary').innerHTML=summary?`<p>${esc(summary)}</p>`:'';
  // Details
  if(details.length){
    $('#interpretations').innerHTML=details.map(d=>{
      const pct=d.max?Math.round(d.score/d.max*100):0;
      return `<div class="interp-item">
        <div class="interp-head">
          <span class="interp-icon">${d.icon||'📊'}</span>
          <span class="interp-title">${esc(d.title)}</span>
          <span class="interp-score">${d.score}/${d.max}</span>
        </div>
        <div class="interp-bar"><div class="interp-bar-fill" style="width:${pct}%;background:${pct>=70?'#2e8b57':pct>=50?'#b8860b':'#d43050'}"></div></div>
        <div class="interp-text">${esc(d.text)}</div>
      </div>`;
    }).join('');
  }
}
</script>
