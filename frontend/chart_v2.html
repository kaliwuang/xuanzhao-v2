<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄照 - 八字排盘</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-dark: #1a1a2e;
  --bg-card: #16213e;
  --bg-table: #0f3460;
  --text-primary: #e8e8e8;
  --text-secondary: #a0a0b8;
  --fire: #e94560;
  --wood: #4ecca3;
  --water: #3498db;
  --metal: #c9b458;
  --earth: #a0522d;
  --gold: #d4af37;
  --border: #2a2a4a;
  --tab-active: #e94560;
  --tab-inactive: #2a2a4a;
}
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}
.container { max-width: 1200px; margin: 0 auto; padding: 10px; }

/* ===== Tabs ===== */
.tabs {
  display: flex;
  background: var(--bg-card);
  border-radius: 12px 12px 0 0;
  overflow: hidden;
  margin-bottom: 0;
}
.tab {
  flex: 1;
  padding: 14px 8px;
  text-align: center;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  background: var(--tab-inactive);
  color: var(--text-secondary);
  transition: all 0.3s;
  border-bottom: 3px solid transparent;
}
.tab:hover { background: #1e2d50; }
.tab.active {
  background: var(--bg-card);
  color: var(--gold);
  border-bottom-color: var(--gold);
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ===== Personal Info ===== */
.personal-info {
  background: var(--bg-card);
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  border-bottom: 1px solid var(--border);
}
.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--fire), var(--gold));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  flex-shrink: 0;
  border: 2px solid var(--gold);
}
.info-detail { flex: 1; }
.info-detail .name {
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
}
.info-detail .meta {
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.info-detail .meta span::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
  margin-right: 6px;
  vertical-align: middle;
}

/* ===== Section Title ===== */
.section-title {
  font-size: 16px;
  font-weight: 700;
  padding: 14px 16px 8px;
  color: var(--gold);
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  width: 4px;
  height: 18px;
  background: var(--gold);
  border-radius: 2px;
}

/* ===== Bazi Table ===== */
.bazi-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  background: var(--bg-card);
}
.bazi-table th, .bazi-table td {
  border: 1px solid var(--border);
  padding: 8px 4px;
  text-align: center;
  vertical-align: middle;
}
.bazi-table th {
  background: var(--bg-table);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 600;
}
.bazi-table .col-header {
  background: #1a3a5c;
  color: var(--gold);
  font-size: 15px;
  font-weight: 700;
  padding: 12px 4px;
}
.bazi-table .row-label {
  background: #1a2540;
  color: var(--text-secondary);
  font-size: 12px;
  width: 70px;
  font-weight: 600;
}
/* Element colors in cells */
.el-火 { color: var(--fire); font-weight: 700; }
.el-木 { color: var(--wood); font-weight: 700; }
.el-水 { color: var(--water); font-weight: 700; }
.el-金 { color: var(--metal); font-weight: 700; }
.el-土 { color: var(--earth); font-weight: 700; }

/* ===== Five Elements Bar ===== */
.wuxing-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  flex-wrap: wrap;
}
.wx-item {
  flex: 1;
  min-width: 60px;
  text-align: center;
  padding: 10px 6px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
}
.wx-item .wx-name {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 2px;
}
.wx-item .wx-state {
  font-size: 11px;
  color: var(--text-secondary);
}
.wx-item .wx-count {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 2px;
}
.wx-火 .wx-name { color: var(--fire); }
.wx-木 .wx-name { color: var(--wood); }
.wx-水 .wx-name { color: var(--water); }
.wx-金 .wx-name { color: var(--metal); }
.wx-土 .wx-name { color: var(--earth); }
.wx-旺 { background: rgba(233,69,96,0.15); }
.wx-相 { background: rgba(201,180,88,0.12); }
.wx-休 { background: rgba(78,204,163,0.1); }
.wx-囚 { background: rgba(52,152,219,0.1); }
.wx-死 { background: rgba(160,82,45,0.1); }

/* ===== Relations ===== */
.relations {
  padding: 8px 16px 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.rel-tag {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.rel-合 { background: rgba(78,204,163,0.2); color: var(--wood); border: 1px solid var(--wood); }
.rel-冲 { background: rgba(233,69,96,0.2); color: var(--fire); border: 1px solid var(--fire); }
.rel-刑 { background: rgba(201,180,88,0.2); color: var(--metal); border: 1px solid var(--metal); }
.rel-害 { background: rgba(160,82,45,0.2); color: var(--earth); border: 1px solid var(--earth); }

/* ===== Horizontal Tables (Dayun/Liunian/Liuyue) ===== */
.h-table-wrap {
  overflow-x: auto;
  padding: 0 8px 12px;
  -webkit-overflow-scrolling: touch;
}
.h-table {
  border-collapse: collapse;
  font-size: 13px;
  min-width: 100%;
  background: var(--bg-card);
}
.h-table th, .h-table td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: center;
  white-space: nowrap;
}
.h-table th {
  background: var(--bg-table);
  color: var(--text-secondary);
  font-weight: 600;
  position: sticky;
  left: 0;
}
.h-table .current {
  background: rgba(233,69,96,0.2);
  border-color: var(--fire);
}

/* ===== Notes Section ===== */
.notes-area {
  padding: 16px;
}
.notes-area textarea {
  width: 100%;
  min-height: 300px;
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  font-size: 14px;
  line-height: 1.8;
  resize: vertical;
  font-family: inherit;
}
.notes-area textarea:focus {
  outline: none;
  border-color: var(--gold);
}

/* ===== Loading ===== */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-secondary);
}
.loading::after {
  content: '';
  display: inline-block;
  width: 30px;
  height: 30px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 10px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .container { padding: 4px; }
  .tab { font-size: 13px; padding: 10px 4px; }
  .personal-info { flex-direction: column; text-align: center; gap: 10px; padding: 14px; }
  .info-detail .meta { justify-content: center; }
  .bazi-table { font-size: 12px; }
  .bazi-table .col-header { font-size: 13px; }
  .wx-item { min-width: 50px; }
  .wx-item .wx-name { font-size: 16px; }
}
@media (max-width: 480px) {
  .bazi-table th, .bazi-table td { padding: 5px 2px; font-size: 11px; }
  .bazi-table .row-label { width: 50px; font-size: 10px; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="basic">基本信息</div>
    <div class="tab" data-tab="paipan">基本排盘</div>
    <div class="tab" data-tab="pro">专业细盘</div>
    <div class="tab" data-tab="notes">断事笔记</div>
  </div>

  <!-- Tab: 基本信息 -->
  <div class="tab-content active" id="tab-basic">
    <div class="personal-info" id="personal-info">
      <div class="avatar" id="avatar">👤</div>
      <div class="info-detail">
        <div class="name" id="p-name">加载中...</div>
        <div class="meta">
          <span id="p-solar">--</span>
          <span id="p-lunar">--</span>
          <span id="p-gender">--</span>
        </div>
      </div>
    </div>
    <div class="section-title">五行旺衰</div>
    <div class="wuxing-bar" id="wuxing-bar"></div>
    <div class="section-title">喜用神</div>
    <div style="padding:8px 16px 16px;color:var(--text-secondary);font-size:14px" id="xiyong"></div>
    <div class="section-title">天干地支关系</div>
    <div class="relations" id="relations"></div>
  </div>

  <!-- Tab: 基本排盘 -->
  <div class="tab-content" id="tab-paipan">
    <div class="section-title">八字排盘</div>
    <div style="overflow-x:auto">
      <table class="bazi-table" id="bazi-table">
        <thead>
          <tr>
            <th class="row-label"></th>
            <th class="col-header">流年</th>
            <th class="col-header">大运</th>
            <th class="col-header">年柱</th>
            <th class="col-header">月柱</th>
            <th class="col-header">日柱</th>
            <th class="col-header">时柱</th>
          </tr>
        </thead>
        <tbody id="bazi-body"></tbody>
      </table>
    </div>
    <div class="section-title">神煞</div>
    <div style="padding:8px 16px 16px;color:var(--text-secondary);font-size:13px;line-height:2" id="shensha"></div>
  </div>

  <!-- Tab: 专业细盘 -->
  <div class="tab-content" id="tab-pro">
    <div class="section-title">大运</div>
    <div class="h-table-wrap"><table class="h-table" id="dayun-table"></table></div>
    <div class="section-title">流年</div>
    <div class="h-table-wrap"><table class="h-table" id="liunian-table"></table></div>
    <div class="section-title">流月</div>
    <div class="h-table-wrap"><table class="h-table" id="liuyue-table"></table></div>
  </div>

  <!-- Tab: 断事笔记 -->
  <div class="tab-content" id="tab-notes">
    <div class="section-title">断事笔记</div>
    <div class="notes-area">
      <textarea id="notes-text" placeholder="在此记录断事笔记...&#10;&#10;提示：可记录八字特征、流年吉凶、重要事件等。"></textarea>
    </div>
  </div>
</div>

<script>
// ===== Tab switching =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ===== Element color helper =====
function elClass(str) {
  if (!str) return '';
  const s = String(str);
  if (/丙|丁|巳|午/.test(s)) return 'el-火';
  if (/甲|乙|寅|卯/.test(s)) return 'el-木';
  if (/壬|癸|亥|子/.test(s)) return 'el-水';
  if (/庚|辛|申|酉/.test(s)) return 'el-金';
  if (/戊|己|辰|戌|丑|未/.test(s)) return 'el-土';
  return '';
}
function colorSpan(val) {
  const cls = elClass(val);
  return cls ? `<span class="${cls}">${val}</span>` : (val || '--');
}

// ===== Parse URL params =====
const params = new URLSearchParams(window.location.search);
const birth = params.get('birth') || '';
const location = params.get('location') || '';
const gender = params.get('gender') || '';
const name = params.get('name') || '';

// Notes persistence
const notesKey = 'xz_notes_' + (birth || 'default');
const savedNotes = localStorage.getItem(notesKey);
if (savedNotes) document.getElementById('notes-text').value = savedNotes;
document.getElementById('notes-text').addEventListener('input', e => {
  localStorage.setItem(notesKey, e.target.value);
});

// ===== Fetch chart data =====
if (!birth) {
  document.getElementById('personal-info').innerHTML =
    '<div style="text-align:center;padding:30px;color:var(--text-secondary)">请通过入口页面输入出生信息后查看排盘</div>';
} else {
  fetchChart();
}

async function fetchChart() {
  const url = `/api/chart?birth=${encodeURIComponent(birth)}&location=${encodeURIComponent(location)}&gender=${encodeURIComponent(gender)}&name=${encodeURIComponent(name)}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API error ' + resp.status);
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('personal-info').innerHTML =
      `<div style="text-align:center;padding:30px;color:var(--fire)">加载失败: ${e.message}</div>`;
  }
}

function render(data) {
  const bz = data.bazi || {};
  renderPersonal(bz, data);
  renderWuxing(bz);
  renderRelations(bz);
  renderBaziTable(bz);
  renderShensha(bz);
  renderDayun(bz);
  renderLiunian(bz);
  renderLiuyue(bz);
  renderXiyong(bz);
}

function renderPersonal(bz, data) {
  document.getElementById('avatar').textContent = gender === '女' ? '👩' : '👨';
  document.getElementById('p-name').textContent = name || '未命名';
  document.getElementById('p-solar').textContent = '阳历: ' + (birth || '--');
  document.getElementById('p-lunar').textContent = '阴历: ' + (bz.lunar || '--');
  document.getElementById('p-gender').textContent = '性别: ' + (gender || '--');
}

function renderWuxing(bz) {
  const wxData = bz.wuxing || {};
  const states = bz.wangshuai || {};
  const order = ['火', '木', '水', '金', '土'];
  const stateMap = { 旺: 'wx-旺', 相: 'wx-相', 休: 'wx-休', 囚: 'wx-囚', 死: 'wx-死' };
  let html = '';
  order.forEach(el => {
    const count = wxData[el] || 0;
    const state = states[el] || '';
    const cls = stateMap[state] || '';
    html += `<div class="wx-item wx-${el} ${cls}">
      <div class="wx-name">${el}</div>
      <div class="wx-state">${state || '--'}</div>
      <div class="wx-count">${count}个</div>
    </div>`;
  });
  document.getElementById('wuxing-bar').innerHTML = html;
}

function renderXiyong(bz) {
  const xy = bz.xiyongshen || bz.xiyong || '';
  document.getElementById('xiyong').innerHTML = xy
    ? `喜用神: <strong style="color:var(--gold)">${xy}</strong>`
    : '暂无喜用神数据';
}

function renderRelations(bz) {
  const rels = bz.relations || bz.ganchong || [];
  let html = '';
  if (Array.isArray(rels)) {
    rels.forEach(r => {
      const type = r.type || r.rel || '';
      const cls = type.includes('冲') ? 'rel-冲' : type.includes('刑') ? 'rel-刑' : type.includes('害') ? 'rel-害' : 'rel-合';
      html += `<span class="rel-tag ${cls}">${r.text || r.desc || r.label || JSON.stringify(r)}</span>`;
    });
  } else if (typeof rels === 'object') {
    Object.entries(rels).forEach(([type, items]) => {
      const cls = type.includes('冲') ? 'rel-冲' : type.includes('刑') ? 'rel-刑' : type.includes('害') ? 'rel-害' : 'rel-合';
      if (Array.isArray(items)) {
        items.forEach(t => { html += `<span class="rel-tag ${cls}">${type}: ${t}</span>`; });
      }
    });
  }
  document.getElementById('relations').innerHTML = html || '<span style="color:var(--text-secondary);font-size:13px">暂无特殊关系</span>';
}

function renderBaziTable(bz) {
  const pillars = bz.pillars || bz.sizhu || {};
  const year = pillars.year || {};
  const month = pillars.month || {};
  const day = pillars.day || {};
  const hour = pillars.hour || {};

  // Try to get current liunian/dayun
  const liunian = bz.liunian_current || bz.current_liunian || {};
  const dayun = bz.dayun_current || bz.current_dayun || {};

  const rows = [
    { label: '主星',   key: 'zhuxing', fallback: 'shishen' },
    { label: '天干',   key: 'tg' },
    { label: '地支',   key: 'dz' },
    { label: '藏干',   key: 'canggan', fallback: 'cg' },
    { label: '星运',   key: 'xingyun' },
    { label: '自坐',   key: 'zizuo' },
    { label: '空亡',   key: 'kongwang' },
    { label: '纳音',   key: 'nayin' },
    { label: '神煞',   key: 'shensha_row' },
  ];

  const sources = [liunian, dayun, year, month, day, hour];

  let html = '';
  rows.forEach(row => {
    html += '<tr>';
    html += `<td class="row-label">${row.label}</td>`;
    sources.forEach(src => {
      let val = src[row.key] || src[row.fallback] || '';
      if (Array.isArray(val)) val = val.join(' ');
      if (typeof val === 'object' && val !== null) val = val.text || val.name || JSON.stringify(val);
      // Color the cell
      if (['天干', '地支', '藏干', '纳音'].includes(row.label)) {
        val = colorSpan(val);
      }
      html += `<td>${val || '--'}</td>`;
    });
    html += '</tr>';
  });

  document.getElementById('bazi-body').innerHTML = html;
}

function renderShensha(bz) {
  const ss = bz.shensha || bz.shensha_list || [];
  if (Array.isArray(ss)) {
    document.getElementById('shensha').innerHTML = ss.map(s => {
      if (typeof s === 'string') return `<span style="margin-right:12px">★ ${s}</span>`;
      return `<span style="margin-right:12px">★ ${s.name || s.text || ''}: ${s.value || s.desc || ''}</span>`;
    }).join('') || '暂无神煞数据';
  } else if (typeof ss === 'object') {
    document.getElementById('shensha').innerHTML = Object.entries(ss)
      .map(([k, v]) => `<span style="margin-right:12px">★ ${k}: ${Array.isArray(v) ? v.join(', ') : v}</span>`)
      .join('') || '暂无神煞数据';
  }
}

function renderDayun(bz) {
  const list = bz.dayun || bz.dayun_list || [];
  const table = document.getElementById('dayun-table');
  if (!list.length) { table.innerHTML = '<tr><td>暂无大运数据</td></tr>'; return; }
  const currentAge = bz.current_age || bz.age || 0;
  let thead = '<thead><tr><th>年龄</th>';
  let tgRow = '<tr><td class="row-label" style="position:sticky;left:0">天干</td>';
  let dzRow = '<tr><td class="row-label" style="position:sticky;left:0">地支</td>';
  let ageRow = '<tr><td class="row-label" style="position:sticky;left:0">起运</td>';
  list.forEach(d => {
    const age = d.age || d.start_age || '';
    const tg = d.tg || d.tiangan || '';
    const dz = d.dz || d.dizhi || '';
    const isCurrent = currentAge && age && Math.abs(currentAge - age) < 10;
    const cls = isCurrent ? ' class="current"' : '';
    thead += `<th${cls}>${age}岁</th>`;
    tgRow += `<td${cls}>${colorSpan(tg)}</td>`;
    dzRow += `<td${cls}>${colorSpan(dz)}</td>`;
    ageRow += `<td${cls}>${d.start_year || ''}</td>`;
  });
  thead += '</tr></thead>';
  table.innerHTML = thead + '<tbody>' + tgRow + '</tr>' + dzRow + '</tr>' + ageRow + '</tr></tbody>';
}

function renderLiunian(bz) {
  const list = bz.liunian || bz.liunian_list || [];
  const table = document.getElementById('liunian-table');
  if (!list.length) { table.innerHTML = '<tr><td>暂无流年数据</td></tr>'; return; }
  const currentYear = new Date().getFullYear();
  let thead = '<thead><tr><th>年份</th>';
  let tgRow = '<tr><td class="row-label" style="position:sticky;left:0">天干</td>';
  let dzRow = '<tr><td class="row-label" style="position:sticky;left:0">地支</td>';
  list.forEach(d => {
    const yr = d.year || '';
    const tg = d.tg || d.tiangan || '';
    const dz = d.dz || d.dizhi || '';
    const isCurrent = yr == currentYear;
    const cls = isCurrent ? ' class="current"' : '';
    thead += `<th${cls}>${yr}</th>`;
    tgRow += `<td${cls}>${colorSpan(tg)}</td>`;
    dzRow += `<td${cls}>${colorSpan(dz)}</td>`;
  });
  thead += '</tr></thead>';
  table.innerHTML = thead + '<tbody>' + tgRow + '</tr>' + dzRow + '</tr></tbody>';
}

function renderLiuyue(bz) {
  const list = bz.liuyue || bz.liuyue_list || [];
  const table = document.getElementById('liuyue-table');
  if (!list.length) { table.innerHTML = '<tr><td>暂无流月数据</td></tr>'; return; }
  const currentMonth = new Date().getMonth() + 1;
  let thead = '<thead><tr><th>月份</th>';
  let tgRow = '<tr><td class="row-label" style="position:sticky;left:0">天干</td>';
  let dzRow = '<tr><td class="row-label" style="position:sticky;left:0">地支</td>';
  list.forEach(d => {
    const mo = d.month || '';
    const tg = d.tg || d.tiangan || '';
    const dz = d.dz || d.dizhi || '';
    const isCurrent = mo == currentMonth;
    const cls = isCurrent ? ' class="current"' : '';
    thead += `<th${cls}>${mo}月</th>`;
    tgRow += `<td${cls}>${colorSpan(tg)}</td>`;
    dzRow += `<td${cls}>${colorSpan(dz)}</td>`;
  });
  thead += '</tr></thead>';
  table.innerHTML = thead + '<tbody>' + tgRow + '</tr>' + dzRow + '</tr></tbody>';
}
</script>
</body>
</html>
