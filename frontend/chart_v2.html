<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄照 v2 - 八术排盘</title>
<style>
:root{--bg:#080810;--bg1:#0c0c1a;--bg2:#12122a;--bg3:#181838;--gold:#c9a96e;--gold-dim:rgba(201,169,110,.15);--gold-border:rgba(201,169,110,.25);--txt:#e8dcc8;--txt2:#b0a890;--txt3:#606080;--fire:#e84040;--wood:#40a060;--water:#4080d0;--metal:#c0a040;--earth:#a08050;--jade:#3aaf6a;--purple:#8060c0;--blue:#4a90d9;--crimson:#d43050}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;scroll-behavior:smooth}
body{font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}

/* Header */
.hdr{background:var(--bg1);border-bottom:1px solid var(--gold-border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:2px}
.hdr-info{font-size:.75rem;color:var(--txt2)}
.hdr-pills{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.hdr-pill{font-size:.65rem;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--txt3);border:1px solid rgba(255,255,255,.05)}

/* 八维雷达图 - 固定骨架 */
.radar-section{background:var(--bg1);border-bottom:1px solid var(--gold-border);padding:16px;position:relative}
.radar-container{display:flex;align-items:center;justify-content:center;gap:20px;flex-wrap:wrap}
.radar-svg{flex-shrink:0}
.radar-legend{flex:1;min-width:200px}
.radar-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.75rem}
.radar-item-name{width:60px;color:var(--txt2)}
.radar-item-bar{flex:1;height:12px;background:var(--bg);border-radius:6px;overflow:hidden}
.radar-item-fill{height:100%;border-radius:6px;transition:width .8s ease}
.radar-item-score{width:30px;text-align:right;font-weight:700;font-size:.7rem}

/* 术法切换器 */
.method-tabs{display:flex;background:var(--bg1);border-bottom:2px solid var(--gold-border);overflow-x:auto;position:sticky;top:44px;z-index:99}
.method-tabs::-webkit-scrollbar{display:none}
.method-tab{flex:1;min-width:0;padding:10px 0;text-align:center;font-size:.8rem;font-weight:600;color:var(--txt3);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:.2s;white-space:nowrap}
.method-tab:hover{color:var(--txt2)}
.method-tab.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--gold-dim)}

/* 术法面板容器 - 翻页叠影 */
.panels-wrapper{position:relative;min-height:60vh}
.panel{display:none;position:relative;animation:fadeIn .3s ease}
.panel.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* 暗影层 - 前一个术法的残影 */
.panel-shadow{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;opacity:.08;z-index:0}
.panel-content{position:relative;z-index:1}

/* 评分卡片 */
.score-card{background:var(--bg2);border:1px solid var(--gold-border);border-radius:12px;padding:16px;margin-bottom:16px}
.score-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.score-circle{width:60px;height:60px;position:relative}
.score-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-circle-bg{fill:none;stroke:var(--bg);stroke-width:6}
.score-circle-fill{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.score-number{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:1.1rem;font-weight:800;color:var(--gold)}
.score-title{font-size:.9rem;font-weight:700;color:var(--gold)}
.score-analysis{font-size:.75rem;color:var(--txt2);line-height:1.7}
.score-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.score-tag{font-size:.65rem;padding:3px 8px;border-radius:10px}
.score-tag.good{background:rgba(58,175,106,.12);color:var(--jade);border:1px solid rgba(58,175,106,.25)}
.score-tag.bad{background:rgba(212,48,80,.12);color:var(--crimson);border:1px solid rgba(212,48,80,.25)}

/* 通用section */
.sec{background:var(--bg2);border:1px solid rgba(255,255,255,.04);border-radius:8px;margin-bottom:10px;overflow:hidden}
.sec-t{font-size:.75rem;font-weight:700;color:var(--gold);padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);background:rgba(201,169,110,.03);letter-spacing:1px}
.sec-b{padding:10px 12px}

/* 八字表格 */
.bz-table{width:100%;border-collapse:collapse;text-align:center}
.bz-table th{padding:5px 4px;font-size:.65rem;color:var(--txt3);font-weight:600;background:var(--bg3);border:1px solid rgba(255,255,255,.04)}
.bz-table td{padding:4px;border:1px solid rgba(255,255,255,.04);background:var(--bg)}
.bz-gan,.bz-zhi{font-size:1.4rem;font-weight:800;line-height:1.2;padding:8px 4px!important}
.bz-sub{font-size:.65rem;color:var(--txt2)}
.bz-ss{font-size:.7rem;color:var(--gold)}
.bz-small{font-size:.6rem;color:var(--txt3)}
.wx-j{color:var(--metal)}.wx-m{color:var(--wood)}.wx-s{color:var(--water)}.wx-h{color:var(--fire)}.wx-t{color:var(--earth)}

/* 五行柱 */
.wx-bars{display:flex;flex-direction:column;gap:4px}
.wx-row{display:flex;align-items:center;gap:6px}
.wx-lbl{width:24px;text-align:center;font-weight:700;font-size:.85rem}
.wx-trk{flex:1;height:14px;background:var(--bg);border-radius:3px;overflow:hidden}
.wx-fill{height:100%;border-radius:3px;transition:width .5s}
.wx-val{width:28px;text-align:right;font-size:.65rem;color:var(--txt3)}

/* 大运横滚 */
.dy-scroll{overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.dy-row{display:flex;gap:2px;min-width:max-content}
.dy-col{min-width:48px;text-align:center;background:var(--bg);border-radius:4px;padding:3px 2px}
.dy-col.now{border:1px solid var(--gold);background:var(--gold-dim)}
.dy-age{font-size:.55rem;color:var(--txt3)}
.dy-g,.dy-z{font-size:.9rem;font-weight:700}
.dy-yr{font-size:.5rem;color:var(--txt3)}

/* 喜忌标签 */
.xy-tags{display:flex;gap:6px;flex-wrap:wrap}
.xy-t{padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.xy-xi{background:rgba(58,175,106,.12);color:var(--jade);border:1px solid rgba(58,175,106,.25)}
.xy-ji{background:rgba(212,48,80,.12);color:var(--crimson);border:1px solid rgba(212,48,80,.25)}

/* 神煞 */
.ss-tags{display:flex;flex-wrap:wrap;gap:4px}
.ss-t{font-size:.65rem;padding:2px 6px;border-radius:8px;background:var(--bg3);color:var(--txt2);border:1px solid rgba(255,255,255,.04)}

/* 紫微 */
.zw-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.zw-c{background:var(--bg);padding:5px;min-height:120px;position:relative}
.zw-c.center{background:var(--bg3);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.zw-name{font-size:.7rem;font-weight:700;color:var(--gold)}
.zw-gz{font-size:.55rem;color:var(--txt3);margin:1px 0}
.zw-stars{flex:1;display:flex;flex-wrap:wrap;gap:2px;align-content:flex-start;margin-top:2px}
.zw-s{font-size:.6rem;padding:1px 2px;border-radius:2px;background:rgba(201,169,110,.08);color:var(--txt)}
.zw-s.main{color:var(--gold);font-weight:700;background:rgba(201,169,110,.15)}
.zw-s.lu{color:var(--jade)}.zw-s.quan{color:var(--purple)}.zw-s.ke{color:var(--blue)}.zw-s.ji{color:var(--crimson)}
.zw-sh{position:absolute;top:2px;right:3px;font-size:.5rem;color:var(--crimson);font-weight:700}
.zw-sihua{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.zw-sh-item{text-align:center;padding:6px 4px;background:var(--bg);border-radius:6px}
.zw-sh-type{font-size:.55rem;color:var(--txt3)}.zw-sh-star{font-size:.85rem;font-weight:700}

/* 六爻 */
.ly-dual{display:grid;grid-template-columns:1fr 1fr;gap:2px}
.ly-gua{background:var(--bg);padding:6px;border-radius:4px}
.ly-gua-t{text-align:center;font-size:.8rem;font-weight:700;color:var(--gold);margin-bottom:3px}
.ly-gua-sub{text-align:center;font-size:.6rem;color:var(--txt3);margin-bottom:4px}
.ly-row{display:grid;grid-template-columns:24px 1fr 32px 32px 32px;gap:2px;align-items:center;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.7rem}
.ly-yao{display:flex;align-items:center;justify-content:center;height:12px}
.ly-yao.yang{background:var(--gold);border-radius:2px}
.ly-yao.yin{background:linear-gradient(var(--gold) 40%,transparent 40%,transparent 60%,var(--gold) 60%);border-radius:2px}
.ly-shi{color:var(--crimson);font-weight:700;font-size:.6rem}

/* 奇门 */
.qm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.qm-cell{background:var(--bg);padding:5px;min-height:100px;position:relative}
.qm-gong{position:absolute;top:2px;left:4px;font-size:.5rem;color:var(--txt3)}
.qm-shen{position:absolute;top:2px;right:4px;font-size:.5rem;color:var(--purple)}
.qm-star{font-size:.65rem;color:var(--gold);margin-top:10px}
.qm-men{font-size:.6rem;color:var(--jade)}
.qm-tg{font-size:.55rem;color:var(--wood)}
.qm-dg{font-size:.55rem;color:var(--fire)}
.qm-info{font-size:.65rem;color:var(--txt2);margin-bottom:6px;line-height:1.6}
.qm-mark{display:inline-block;font-size:.45rem;padding:1px 3px;border-radius:2px;margin-left:3px}
.qm-mark.ma{background:rgba(232,64,64,.15);color:var(--fire)}
.qm-mark.kong{background:rgba(96,96,128,.15);color:var(--txt3)}

/* 大六壬 */
.lr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(255,255,255,.03);border-radius:6px;overflow:hidden}
.lr-cell{background:var(--bg);padding:4px;min-height:50px;text-align:center}
.lr-zhi{font-size:.9rem;font-weight:700;color:var(--gold)}
.lr-jun{font-size:.5rem;color:var(--txt3)}
.lr-info{font-size:.65rem;color:var(--txt2);margin-bottom:6px;line-height:1.6}
.lr-sk{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.lr-sk-item{background:var(--bg);padding:5px;border-radius:4px}
.lr-sk-label{font-size:.55rem;color:var(--txt3);margin-bottom:2px}
.lr-sk-val{font-size:.75rem;font-weight:600}

/* 太乙 */
.ty-table{width:100%;border-collapse:collapse;font-size:.7rem}
.ty-table th{padding:3px 5px;background:var(--bg3);color:var(--txt3);font-weight:600;text-align:left;border:1px solid rgba(255,255,255,.04)}
.ty-table td{padding:3px 5px;border:1px solid rgba(255,255,255,.04)}
.ty-suan{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.ty-suan-item{background:var(--bg);padding:6px;border-radius:6px;text-align:center}
.ty-suan-label{font-size:.55rem;color:var(--txt3)}.ty-suan-val{font-size:1.1rem;font-weight:700;color:var(--gold)}

/* 占星 */
.astro-wrap{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap}
.astro-legend{flex:1;min-width:180px;font-size:.65rem}
.astro-p{display:flex;gap:4px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.astro-p-name{width:32px;font-weight:700;color:var(--gold)}
.astro-p-sign{flex:1}
.astro-p-house{width:28px;text-align:right;color:var(--txt3)}

/* 姓名学 */
.xm-score{text-align:center;padding:12px}
.xm-num{font-size:2rem;font-weight:800;color:var(--gold)}
.xm-lbl{font-size:.7rem;color:var(--txt3);margin-top:3px}
.xm-wg{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.xm-wg-i{text-align:center;padding:6px 3px;background:var(--bg);border-radius:6px}
.xm-wg-l{font-size:.55rem;color:var(--txt3)}
.xm-wg-n{font-size:1rem;font-weight:700;margin:3px 0}
.xm-wg-wx{font-size:.5rem;color:var(--txt3)}
.xm-wg-j{font-size:.55rem;padding:1px 3px;border-radius:2px;margin-top:3px}
.xm-wg-j.ok{background:rgba(58,175,106,.12);color:var(--jade)}
.xm-wg-j.bad{background:rgba(212,48,80,.12);color:var(--crimson)}
.sc-card{background:var(--bg);padding:8px;border-radius:6px}
.sc-wx{font-size:.9rem;font-weight:700;color:var(--gold);margin-bottom:3px}
.sc-rst{font-size:.75rem;font-weight:600;margin-bottom:3px}
.sc-desc{font-size:.7rem;color:var(--txt2)}
.sl-card{background:var(--bg);padding:6px;border-radius:4px;margin-bottom:4px}
.sl-title{font-size:.75rem;font-weight:600;margin-bottom:3px}
.sl-ji{font-size:.6rem;padding:1px 5px;border-radius:2px;margin-left:3px}
.sl-ji.ok{background:rgba(58,175,106,.12);color:var(--jade)}
.sl-ji.bad{background:rgba(212,48,80,.12);color:var(--crimson)}
.sl-body{font-size:.7rem;color:var(--txt2)}

/* Loading */
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-title">玄照</span>
  <span class="hdr-info" id="hBirth"></span>
  <span class="hdr-info" id="hLoc"></span>
  <div class="hdr-pills" id="hPills"></div>
</header>

<!-- 八维雷达图 - 固定骨架 -->
<section class="radar-section" id="radarSection">
  <div class="radar-container">
    <svg class="radar-svg" id="radarSvg" width="200" height="200" viewBox="0 0 200 200"></svg>
    <div class="radar-legend" id="radarLegend"></div>
  </div>
</section>

<!-- 术法切换器 -->
<nav class="method-tabs" id="methodTabs">
  <button class="method-tab on" data-m="bazi">八字</button>
  <button class="method-tab" data-m="ziwei">紫微</button>
  <button class="method-tab" data-m="liuyao">六爻</button>
  <button class="method-tab" data-m="qimen">奇门</button>
  <button class="method-tab" data-m="liuren">大六壬</button>
  <button class="method-tab" data-m="taiyi">太乙</button>
  <button class="method-tab" data-m="astro">占星</button>
  <button class="method-tab" data-m="xm">姓名</button>
</nav>

<div class="ld" id="loader"><div class="spinner"></div><div style="color:var(--txt3);font-size:.85rem">排盘中…</div></div>

<div class="panels-wrapper" id="panelsWrapper" style="display:none">

<!-- 八字面板 -->
<div class="panel on" id="p-bazi">
  <div class="panel-shadow" id="shadow-bazi"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">四柱命盘</div><div class="sec-b" id="bzPillars"></div></div>
    <div class="sec"><div class="sec-t">五行旺衰</div><div class="sec-b" id="bzWx"></div></div>
    <div class="sec"><div class="sec-t">喜用神</div><div class="sec-b" id="bzXiYong"></div></div>
    <div class="sec"><div class="sec-t">神煞</div><div class="sec-b" id="bzShensha"></div></div>
    <div class="sec"><div class="sec-t">大运</div><div class="sec-b" id="bzDayun"></div></div>
  </div>
</div>

<!-- 紫微面板 -->
<div class="panel" id="p-ziwei">
  <div class="panel-shadow" id="shadow-ziwei"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">紫微命盘</div><div class="sec-b" id="zwGrid"></div></div>
    <div class="sec"><div class="sec-t">四化飞星</div><div class="sec-b" id="zwSihua"></div></div>
  </div>
</div>

<!-- 六爻面板 -->
<div class="panel" id="p-liuyao">
  <div class="panel-shadow" id="shadow-liuyao"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">六爻排盘</div><div class="sec-b" id="lyGua"></div></div>
  </div>
</div>

<!-- 奇门面板 -->
<div class="panel" id="p-qimen">
  <div class="panel-shadow" id="shadow-qimen"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">奇门遁甲</div><div class="sec-b"><div class="qm-info" id="qmInfo"></div><div class="qm-grid" id="qmGrid"></div></div></div>
  </div>
</div>

<!-- 大六壬面板 -->
<div class="panel" id="p-liuren">
  <div class="panel-shadow" id="shadow-liuren"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">大六壬</div><div class="sec-b"><div class="lr-info" id="lrInfo"></div><div id="lrPan"></div></div></div>
    <div class="sec"><div class="sec-t">四课三传</div><div class="sec-b" id="lrSk"></div></div>
  </div>
</div>

<!-- 太乙面板 -->
<div class="panel" id="p-taiyi">
  <div class="panel-shadow" id="shadow-taiyi"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">太乙神数</div><div class="sec-b" id="tyInfo"></div></div>
    <div class="sec"><div class="sec-t">主客算</div><div class="sec-b" id="tySuan"></div></div>
  </div>
</div>

<!-- 占星面板 -->
<div class="panel" id="p-astro">
  <div class="panel-shadow" id="shadow-astro"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-t">星盘</div><div class="sec-b"><div class="astro-wrap"><svg id="astroSvg" width="280" height="280" viewBox="0 0 280 280"></svg><div class="astro-legend" id="astroLg"></div></div></div></div>
    <div class="sec"><div class="sec-t">相位</div><div class="sec-b" id="astroAspects"></div></div>
  </div>
</div>

<!-- 姓名面板 -->
<div class="panel" id="p-xm">
  <div class="panel-shadow" id="shadow-xm"></div>
  <div class="panel-content">
    <div class="sec"><div class="sec-b"><div class="xm-score"><div class="xm-num" id="xmScore">0</div><div class="xm-lbl">姓名评分</div></div></div></div>
    <div class="sec"><div class="sec-t">五格命盘</div><div class="sec-b" id="xmWuge"></div></div>
    <div class="sec"><div class="sec-t">三才配置</div><div class="sec-b" id="xmSancai"></div></div>
    <div class="sec"><div class="sec-t">数理剖析</div><div class="sec-b" id="xmShuli"></div></div>
  </div>
</div>

</div>

<script>
(function(){
'use strict';
const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),
WX={'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水','子':'水','丑':'土','寅':'木','卯':'木','辰':'土','巳':'火','午':'火','未':'土','申':'金','酉':'金','戌':'土','亥':'水'},
WXC={'金':'var(--metal)','木':'var(--wood)','水':'var(--water)','火':'var(--fire)','土':'var(--earth)'},
WXCL={'金':'#c0a040','木':'#40a060','水':'#4080d0','火':'#e84040','土':'#a08050'},
WXK={'金':'wx-j','木':'wx-m','水':'wx-s','火':'wx-h','土':'wx-t'},
esc=s=>{if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML};

// 术法列表（用于暗影层）
const METHODS=['bazi','ziwei','liuyao','qimen','liuren','taiyi','astro','xm'];
let currentMethod='bazi';

// Tab切换 - 带叠影效果
$$('.method-tab').forEach(t=>t.onclick=()=>{
  const prev=currentMethod;
  currentMethod=t.dataset.m;
  $$('.method-tab').forEach(x=>x.classList.remove('on'));
  $$('.panel').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  const p=$('#p-'+currentMethod);
  if(p)p.classList.add('on');
  // 设置暗影层：显示前一个术法的残影
  updateShadow(prev, currentMethod);
});

function updateShadow(prev, current){
  const shadowEl=$('#shadow-'+current);
  if(!shadowEl)return;
  const prevPanel=$('#p-'+prev);
  if(prevPanel){
    // 复制前一个面板的内容到暗影层
    shadowEl.innerHTML=prevPanel.querySelector('.panel-content')?.innerHTML||'';
    shadowEl.style.opacity='.06';
  }
}

/* ===== 八维雷达图 ===== */
function renderRadar(scores){
  const dims=[
    {key:'八字',label:'八字'},
    {key:'紫微斗数',label:'紫微'},
    {key:'六爻',label:'六爻'},
    {key:'奇门遁甲',label:'奇门'},
    {key:'大六壬',label:'大六壬'},
    {key:'太乙神数',label:'太乙'},
    {key:'占星',label:'占星'},
    {key:'姓名学',label:'姓名'}
  ];
  
  const cx=100,cy=100,r=80;
  const n=dims.length;
  const angleStep=2*Math.PI/n;
  
  let svgH='';
  // 背景圈
  for(let i=1;i<=4;i++){
    const ri=r*i/4;
    let points='';
    for(let j=0;j<n;j++){
      const angle=j*angleStep-Math.PI/2;
      const x=cx+ri*Math.cos(angle),y=cy+ri*Math.sin(angle);
      points+=`${x},${y} `;
    }
    svgH+=`<polygon points="${points}" fill="none" stroke="rgba(255,255,255,.1)" stroke-width=".5"/>`;
  }
  // 轴线
  for(let i=0;i<n;i++){
    const angle=i*angleStep-Math.PI/2;
    const x=cx+r*Math.cos(angle),y=cy+r*Math.sin(angle);
    svgH+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>`;
  }
  // 数据多边形
  let dataPoints='';
  const colors=['#e84040','#40a060','#4080d0','#c0a040','#a08050','#8060c0','#4a90d9','#d43050'];
  for(let i=0;i<n;i++){
    const angle=i*angleStep-Math.PI/2;
    const score=(scores[dims[i].key]?.score||0)/100;
    const ri=r*score;
    const x=cx+ri*Math.cos(angle),y=cy+ri*Math.sin(angle);
    dataPoints+=`${x},${y} `;
  }
  svgH+=`<polygon points="${dataPoints}" fill="rgba(201,169,110,.15)" stroke="var(--gold)" stroke-width="1.5"/>`;
  // 数据点
  for(let i=0;i<n;i++){
    const angle=i*angleStep-Math.PI/2;
    const score=(scores[dims[i].key]?.score||0)/100;
    const ri=r*score;
    const x=cx+ri*Math.cos(angle),y=cy+ri*Math.sin(angle);
    svgH+=`<circle cx="${x}" cy="${y}" r="3" fill="var(--gold)"/>`;
  }
  // 标签
  for(let i=0;i<n;i++){
    const angle=i*angleStep-Math.PI/2;
    const lx=cx+(r+15)*Math.cos(angle),ly=cy+(r+15)*Math.sin(angle);
    svgH+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" fill="var(--txt2)" font-size="8">${dims[i].label}</text>`;
  }
  $('#radarSvg').innerHTML=svgH;
  
  // 图例
  let lgH='';
  dims.forEach((d,i)=>{
    const score=scores[d.key]?.score||0;
    const color=colors[i];
    lgH+=`<div class="radar-item"><span class="radar-item-name">${d.label}</span><div class="radar-item-bar"><div class="radar-item-fill" style="width:${score}%;background:${color}"></div></div><span class="radar-item-score" style="color:${color}">${score}</span></div>`;
  });
  $('#radarLegend').innerHTML=lgH;
}

/* ===== 通用评分卡片 ===== */
function renderScoreCard(score, analysis, strengths, weaknesses){
  if(!score&&score!==0)return'';
  const circumference=2*Math.PI*26;
  const offset=circumference*(1-score/100);
  const color=score>=70?'var(--jade)':score>=50?'var(--metal)':'var(--crimson)';
  let h=`<div class="score-card"><div class="score-header"><div class="score-circle"><svg viewBox="0 0 60 60"><circle class="score-circle-bg" cx="30" cy="30" r="26"/><circle class="score-circle-fill" cx="30" cy="30" r="26" stroke="${color}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/></svg><div class="score-number">${score}</div></div><div class="score-title">综合评分</div></div>`;
  if(analysis)h+=`<div class="score-analysis">${esc(analysis)}</div>`;
  if(strengths?.length||weaknesses?.length){
    h+='<div class="score-tags">';
    (strengths||[]).forEach(s=>{h+=`<span class="score-tag good">✓ ${esc(s)}</span>`});
    (weaknesses||[]).forEach(s=>{h+=`<span class="score-tag bad">✗ ${esc(s)}</span>`});
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderAstro(a){
  const svg=$('#astroSvg');

  svgH+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--gold-border)" stroke-width="1"/>`;
  svgH+=`<circle cx="${cx}" cy="${cy}" r="${r*0.6}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>`;
  for(let i=0;i<12;i++){
    const angle=i*30-90;
    const rad=angle*Math.PI/180;
    const x1=cx+r*Math.cos(rad),y1=cy+r*Math.sin(rad);
    const x2=cx+r*0.6*Math.cos(rad),y2=cy+r*0.6*Math.sin(rad);
    svgH+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`;
  }
  const planets=a.planets||[];
  planets.forEach((p,i)=>{
    const signIdx=['白羊','金牛','双子','巨蟹','狮子','处女','天秤','天蝎','射手','摩羯','水瓶','双鱼'].indexOf(p.sign)||0;
    const angle=signIdx*30+p.degree-90;
    const rad=angle*Math.PI/180;
    const pr=r*0.75-i*6;
    const px=cx+pr*Math.cos(rad),py=cy+pr*Math.sin(rad);
    svgH+=`<text x="${px}" y="${py}" text-anchor="middle" dominant-baseline="middle" fill="var(--gold)" font-size="9" font-weight="700">${esc(p.name?.substring(0,1)||'?')}</text>`;
  });
  svg.innerHTML=svgH;
  let lgH='';
  planets.forEach(p=>{
    lgH+=`<div class="astro-p"><span class="astro-p-name">${esc(p.name)}</span><span class="astro-p-sign">${esc(p.sign)} ${p.degree?.toFixed(1)||''}°</span><span class="astro-p-house">${p.house||''}宫</span></div>`;
  });
  $('#astroLg').innerHTML=lgH;
  const aspects=a.aspects||[];
  if(aspects.length){
    let ah='<table class="ty-table"><tr><th>行星1</th><th>相位</th><th>行星2</th><th>容许度</th></tr>';
    aspects.forEach(a=>{
      ah+=`<tr><td style="color:var(--gold)">${esc(a.planet1||a[0]||'')}</td><td>${esc(a.aspect||a.type||a[1]||'')}</td><td style="color:var(--gold)">${esc(a.planet2||a[2]||'')}</td><td>${esc(a.orb||a[3]||'')}</td></tr>`;
    });
    ah+='</table>';
    $('#astroAspects').innerHTML=ah;
  }
}

/* ===== 姓名学 ===== */
function renderXm(xm){
  const score=xm.total_score||xm.score||0;
  $('#xmScore').textContent=score;
  const wg=xm.wu_ge||xm.wuge||{};
  const names=['天格','人格','地格','外格','总格'],keys=['tiange','renge','dige','waige','zongge'];
  let wh='<div class="xm-wg">';
  names.forEach((n,i)=>{
    const ge=wg[keys[i]]||wg[n]||{};
    const num=ge.score||ge.num||'',wx=ge.wuxing||'',ji=ge.ji_xiong||'';
    const jCls=ji.includes('吉')?'ok':'bad';
    wh+=`<div class="xm-wg-i"><div class="xm-wg-l">${n}</div><div class="xm-wg-n" style="color:${WXC[wx]||'var(--txt)'}">${num}</div><div class="xm-wg-wx">${esc(wx)}</div><div class="xm-wg-j ${jCls}">${esc(ji)}</div></div>`;
  });
  wh+='</div>';
  $('#xmWuge').innerHTML=wh;
  const sc=xm.san_cai||xm.sancai||{};
  const scWx=sc.wuxing||'',scRst=sc.result||sc.ji_xiong||'',scDesc=sc.description||sc.analysis||'';
  $('#xmSancai').innerHTML=`<div class="sc-card"><div class="sc-wx">${esc(scWx)}</div><div class="sc-rst">${esc(scRst)}</div><div class="sc-desc">${esc(scDesc)}</div></div>`;
  const sl=xm.shu_li||xm.shuli||xm.ge_analysis||{};
  let slh='';
  names.forEach((n,i)=>{
    const ge=sl[keys[i]]||sl[n]||wg[keys[i]]||wg[n]||{};
    const num=ge.score||ge.num||'',ji=ge.ji_xiong||'',desc=ge.analysis||ge.description||ge.detail||'';
    if(!num&&!desc)return;
    const jCls=ji.includes('吉')?'ok':'bad';
    slh+=`<div class="sl-card"><div class="sl-title">${n} <span style="color:var(--gold)">(${num})</span>${ji?`<span class="sl-ji ${jCls}">${esc(ji)}</span>`:''}</div><div class="sl-body">${esc(desc)}</div></div>`;
  });
  $('#xmShuli').innerHTML=slh||'<div style="color:var(--txt3);font-size:.75rem">数理数据不可用</div>';
}

document.addEventListener('DOMContentLoaded',init);
})();
</script>
