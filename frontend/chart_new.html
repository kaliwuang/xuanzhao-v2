<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄照 v2.0 - 八术排盘</title>
    <link rel="stylesheet" href="/static/css/chart-pro.css">
</head>
<body>
    <!-- 顶部信息栏 -->
    <header class="chart-header">
        <div class="header-info">
            <span class="header-title">玄照</span>
            <span class="header-sub" id="headerBirth"></span>
            <span class="header-sub" id="headerLocation"></span>
        </div>
        <div class="header-pills" id="headerPills"></div>
    </header>

    <!-- 八术Tab导航 -->
    <nav class="method-tabs" id="methodTabs">
        <button class="tab active" data-method="bazi">八字</button>
        <button class="tab" data-method="ziwei">紫微</button>
        <button class="tab" data-method="liuyao">六爻</button>
        <button class="tab" data-method="qimen">奇门</button>
        <button class="tab" data-method="liuren">大六壬</button>
        <button class="tab" data-method="taiyi">太乙</button>
        <button class="tab" data-method="astro">占星</button>
        <button class="tab" data-method="xingming">姓名</button>
    </nav>

    <!-- 加载状态 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">排盘中...</div>
    </div>

    <!-- 八术面板容器 -->
    <main class="panels-container" id="panelsContainer" style="display:none;">

        <!-- ===== 八字面板 ===== -->
        <section class="method-panel active" id="panel-bazi">
            <!-- 四柱核心 -->
            <div class="panel-section">
                <div class="section-title">四柱命盘</div>
                <div class="bazi-pillars" id="baziPillars"></div>
            </div>
            <!-- 五行旺衰 -->
            <div class="panel-section">
                <div class="section-title">五行旺衰</div>
                <div class="wuxing-bars" id="baziWuxing"></div>
            </div>
            <!-- 十神 -->
            <div class="panel-section">
                <div class="section-title">十神关系</div>
                <div class="shishen-grid" id="baziShishen"></div>
            </div>
            <!-- 神煞 -->
            <div class="panel-section">
                <div class="section-title">神煞</div>
                <div class="shensha-list" id="baziShensha"></div>
            </div>
            <!-- 大运 -->
            <div class="panel-section">
                <div class="section-title">大运流年</div>
                <div class="dayun-scroll" id="baziDayun"></div>
            </div>
            <!-- 喜忌 -->
            <div class="panel-section">
                <div class="section-title">喜用神</div>
                <div class="xiyong-card" id="baziXiyong"></div>
            </div>
        </section>

        <!-- ===== 紫微面板 ===== -->
        <section class="method-panel" id="panel-ziwei">
            <div class="panel-section">
                <div class="section-title">紫微命盘</div>
                <div class="ziwei-grid" id="ziweiGrid"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">四化飞星</div>
                <div class="sihua-table" id="ziweiSihua"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">大限流年</div>
                <div class="dayun-scroll" id="ziweiDayun"></div>
            </div>
        </section>

        <!-- ===== 六爻面板 ===== -->
        <section class="method-panel" id="panel-liuyao">
            <div class="panel-section">
                <div class="section-title">六爻排盘</div>
                <div class="liuyao-dual" id="liuyaoGua"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">六神配置</div>
                <div class="liushen-table" id="liuyaoLiushen"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">五行分析</div>
                <div class="wuxing-analysis" id="liuyaoWuxing"></div>
            </div>
        </section>

        <!-- ===== 奇门面板 ===== -->
        <section class="method-panel" id="panel-qimen">
            <div class="panel-section">
                <div class="section-title">奇门遁甲</div>
                <div class="qimen-info" id="qimenInfo"></div>
                <div class="qimen-grid" id="qimenGrid"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">格局分析</div>
                <div class="geju-analysis" id="qimenGeju"></div>
            </div>
        </section>

        <!-- ===== 大六壬面板 ===== -->
        <section class="method-panel" id="panel-liuren">
            <div class="panel-section">
                <div class="section-title">大六壬排盘</div>
                <div class="liuren-info" id="liurenInfo"></div>
                <div class="liuren-pan" id="liurenPan"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">四课三传</div>
                <div class="liuren-sike" id="liurenSike"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">天将分析</div>
                <div class="liuren-tianjiang" id="liurenTianjiang"></div>
            </div>
        </section>

        <!-- ===== 太乙面板 ===== -->
        <section class="method-panel" id="panel-taiyi">
            <div class="panel-section">
                <div class="section-title">太乙神数</div>
                <div class="taiyi-info" id="taiyiInfo"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">三基五福</div>
                <div class="taiyi-sanji" id="taiyiSanji"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">太乙八门</div>
                <div class="taiyi-bamen" id="taiyiBamen"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">算术分析</div>
                <div class="taiyi-suan" id="taiyiSuan"></div>
            </div>
        </section>

        <!-- ===== 占星面板 ===== -->
        <section class="method-panel" id="panel-astro">
            <div class="panel-section">
                <div class="section-title">星盘总览</div>
                <div class="astro-chart-wrap">
                    <canvas id="astroCanvas" width="360" height="360"></canvas>
                    <div class="astro-legend" id="astroLegend"></div>
                </div>
            </div>
            <div class="panel-section">
                <div class="section-title">行星落座</div>
                <div class="astro-planets" id="astroPlanets"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">相位表</div>
                <div class="astro-aspects" id="astroAspects"></div>
            </div>
        </section>

        <!-- ===== 姓名学面板 ===== -->
        <section class="method-panel" id="panel-xingming">
            <div class="panel-section">
                <div class="section-title">姓名五格</div>
                <div class="xm-score" id="xmScore"></div>
                <div class="xm-wuge" id="xmWuge"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">三才配置</div>
                <div class="xm-sancai" id="xmSancai"></div>
            </div>
            <div class="panel-section">
                <div class="section-title">数理剖析</div>
                <div class="xm-shuli" id="xmShuli"></div>
            </div>
        </section>

    </main>

    <script src="/static/js/chart-pro.js"></script>
</body>
</html>
