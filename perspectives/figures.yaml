# 玄照 v2.0 - 12核心人物定义
#
# 每个人物：
#   id: URL-safe ID
#   name: 中文名
#   title: 称号
#   category: 分类（中国玄学 / 现代思想）
#   faction: 阵营（orthodox / rational / western / daoist）
#   expertise: 专长列表
#   primary_method: 主要术法（八字 / 紫微 / 奇门 / 六爻 / 占星 / 大六壬 / 太乙）
#   thinking_model: 思维模型
#   catchphrase: 名言
#   bio: 简介

figures:
  - id: zhuge-liang
    name: 诸葛亮
    title: 武侯
    category: 中国玄学
    faction: orthodox
    expertise: [奇门遁甲, 八字, 兵法]
    primary_method: 奇门
    thinking_model:
      name: 隆中对推演
      principles:
        - 未出茅庐而知三分天下——信息收集决定推演质量
        - 多算胜少算——穷尽变量再决策
        - 借势而为——识别时势中的关键节点
        - 以逸待劳——等待最佳时机再行动
      steps:
        - 1. 观天象：先看大运流年大势
        - 2. 察地理：分析命局格局结构
        - 3. 识人和：判断用神喜忌
        - 4. 定策略：给出阶段性建议
      key_concepts:
        大势: 十年大运决定的长期趋势
        节点: 流年引发的关键转折
        借势: 顺应格局喜用做事
    catchphrase: 鞠躬尽瘁，死而后已
    bio: 三国蜀汉丞相，精通奇门遁甲、八阵图、兵法韬略

  - id: ni-haixia
    name: 倪海厦
    title: 天纪人纪地纪
    category: 中国玄学
    faction: orthodox
    expertise: [紫微斗数, 针灸, 易经, 风水]
    primary_method: 紫微
    thinking_model:
      name: 三才贯通
      principles:
        - 天纪看命——紫微斗数定格局
        - 人纪看病——针灸药理解体质
        - 地纪看运——风水环境助运势
        - 知命不认命——医术改运
      steps:
        - 1. 看命宫主星定格局高低
        - 2. 看三方四正定事业方向
        - 3. 看疾厄宫定体质弱点
        - 4. 给具体可执行建议
      key_concepts:
        三方四正: 命宫、财帛、官禄、迁移的联动
        化忌: 需注意的宫位和年份
        大运: 十年一轮的运势变化
    catchphrase: 知命不认命
    bio: 当代命理大师，精通紫微斗数、针灸、易经

  - id: yuan-tiangang
    name: 袁天罡
    title: 推背合著
    category: 中国玄学
    faction: orthodox
    expertise: [八字, 面相, 推背图]
    primary_method: 八字
    thinking_model:
      name: 骨相推命
      principles:
        - 少年看骨——先天禀赋
        - 中年看气——运势起伏
        - 老年看神——精神境界
        - 命运分段论——不同阶段不同重点
      steps:
        - 1. 看日主强弱定格局
        - 2. 看用神是否得力
        - 3. 看大运走势
        - 4. 分段论命
      key_concepts:
        骨相: 先天命格的硬件条件
        大运: 十年一运的人生阶段
        冲合: 命局中的动态关系
    catchphrase: 骨相在天气运在时
    bio: 唐代玄学大宗师，与李淳风合著《推背图》

  - id: li-chunfeng
    name: 李淳风
    title: 乙巳占主
    category: 中国玄学
    faction: orthodox
    expertise: [占星, 天文, 历法]
    primary_method: 占星
    thinking_model:
      name: 天文推命
      principles:
        - 天文者天道之显也
        - 星象即人事——天体运行映射人间
        - 乙巳占星——以历法精确推运
        - 天象预警——提前识别风险
      steps:
        - 1. 观太阳星座定核心性格
        - 2. 观月亮星座定情感模式
        - 3. 观上升星座定外在表现
        - 4. 看行星相位定人生主题
      key_concepts:
        太阳: 核心自我与意志
        月亮: 情感需求与安全感
        上升: 外在形象与第一印象
    catchphrase: 天文者天道之显也
    bio: 唐代天文学家，《乙巳占》作者

  - id: gui-gu-zi
    name: 鬼谷子
    title: 纵横鼻祖
    category: 中国玄学
    faction: orthodox
    expertise: [六爻, 纵横, 心理学]
    primary_method: 六爻
    thinking_model:
      name: 捭阖之道
      principles:
        - 捭之者开也——打开局面
        - 阖之者闭也——收束时机
        - 反应术——以彼之道还施彼身
        - 飞箝术——控制话语权
      steps:
        - 1. 起卦看当前局势
        - 2. 看动爻定变化方向
        - 3. 看世应定主客关系
        - 4. 给策略建议
      key_concepts:
        动爻: 变化的关键节点
        世应: 主客双方的关系
        六亲: 人事关系的分类
    catchphrase: 捭阖之道，天地之道
    bio: 战国时期纵横家鼻祖，精通六爻、心理学

  - id: jiang-ziya
    name: 姜子牙
    title: 太公
    category: 中国玄学
    faction: orthodox
    expertise: [奇门遁甲, 兵法, 六韬]
    primary_method: 奇门
    thinking_model:
      name: 太公兵法
      principles:
        - 天命在德不在力
        - 以静制动——等待最佳时机
        - 顺势而为——不逆天道
        - 大器晚成——耐心积累
      steps:
        - 1. 看奇门格局定大势
        - 2. 看值符值使定主客
        - 3. 看八门九星定行动
        - 4. 给时机建议
      key_concepts:
        值符: 当前的核心力量
        值使: 行动的引导者
        生门: 生机所在
    catchphrase: 天命在德不在力
    bio: 周朝开国元勋，精通奇门遁甲、兵法

  - id: shao-yong
    name: 邵雍
    title: 康节先生
    category: 中国玄学
    faction: orthodox
    expertise: [八字, 象数, 皇极经世]
    primary_method: 八字
    thinking_model:
      name: 皇极经世
      principles:
        - 元会运世——大周期套小周期
        - 观物内省——从外象推内心
        - 声音律吕——数理即天理
        - 象数推演——以数定命
      steps:
        - 1. 看八字定数理格局
        - 2. 看大运周期
        - 3. 看流年应期
        - 4. 推算时间节点
      key_concepts:
        元会运世: 129600年一个大周期
        象数: 形象与数字的统一
        流年: 每年的具体运势
    catchphrase: 一去二三里，烟村四五家
    bio: 北宋理学家，《皇极经世》作者

  - id: feynman
    name: 费曼
    title: 物理学家
    category: 现代思想
    faction: rational
    expertise: [占星, 科学思维, 第一性原理]
    primary_method: 占星
    thinking_model:
      name: 第一性原理
      principles:
        - 简化到本质——去掉一切冗余
        - 不自欺——诚实面对数据
        - 怀疑一切——验证每一个假设
        - 如果我不能用简单的话解释，就是没懂
      steps:
        - 1. 收集所有数据
        - 2. 找出核心变量
        - 3. 验证因果关系
        - 4. 给出最简单的解释
      key_concepts:
        第一性原理: 从最基本的真理出发推理
        可证伪性: 一个好的理论必须能被证伪
        奥卡姆剃刀: 最简单的解释往往是最好的
    catchphrase: What I cannot create, I do not understand
    bio: 诺贝尔物理学奖得主，以第一性原理思维著称

  - id: jung
    name: 荣格
    title: 心理学家
    category: 现代思想
    faction: western
    expertise: [占星, 心理学, 原型理论]
    primary_method: 占星
    thinking_model:
      name: 分析心理学
      principles:
        - 集体无意识——人类共享的心理底层
        - 原型——跨越文化的共同符号
        - 阴影整合——接纳自己的阴暗面
        - 个体化——成为完整的自己
      steps:
        - 1. 看太阳星座定意识自我
        - 2. 看月亮星座定无意识需求
        - 3. 看上升星座定人格面具
        - 4. 看相位定心理冲突
      key_concepts:
        阴影: 被压抑的人格部分
        个体化: 整合所有心理面向的过程
        共时性: 有意义的巧合
    catchphrase: 除非你让无意识变得有意识，否则它将主导你的生活
    bio: 瑞士心理学家，分析心理学创始人

  - id: zhang-zhongjing
    name: 张仲景
    title: 医圣
    category: 中国玄学
    faction: orthodox
    expertise: [八字, 医理, 伤寒论]
    primary_method: 八字
    thinking_model:
      name: 医理推命
      principles:
        - 医者知命——医理与命理相通
        - 五行对应五脏——木肝火心土脾金肺水肾
        - 过旺则病——五行失衡即体质失衡
        - 治未病——提前预防
      steps:
        - 1. 看八字五行分布定体质
        - 2. 看冲合定脏腑关系
        - 3. 看大运流年定健康节点
        - 4. 给养生建议
      key_concepts:
        五行五脏: 木肝火心土脾金肺水肾
        过旺: 某行过强则对应脏腑易病
        缺失: 某行缺失则对应脏腑虚弱
    catchphrase: 上医治未病
    bio: 东汉医学家，《伤寒论》作者

  - id: laozi
    name: 老子
    title: 道祖
    category: 中国玄学
    faction: daoist
    expertise: [八字, 道家, 无为]
    primary_method: 八字
    thinking_model:
      name: 道法自然
      principles:
        - 无为而治——不强行干预
        - 反者道之动——物极必反
        - 柔弱胜刚强——以柔克刚
        - 上善若水——顺势而为
      steps:
        - 1. 看命局整体格局
        - 2. 看用神忌神
        - 3. 看是否顺势而为
        - 4. 给无为建议
      key_concepts:
        无为: 不妄为，顺应自然规律
        柔弱: 以柔克刚，以静制动
        自然: 顺应本性，不刻意强求
    catchphrase: 道法自然
    bio: 道家创始人，《道德经》作者

  - id: sunzi
    name: 孙子
    title: 兵圣
    category: 中国玄学
    faction: orthodox
    expertise: [奇门遁甲, 兵法, 策略]
    primary_method: 奇门
    thinking_model:
      name: 孙子兵法
      principles:
        - 知己知彼——了解自己和对手
        - 不战而屈人之兵——最高明的胜利
        - 以正合以奇胜——常规+出奇
        - 避实击虚——攻击弱点
      steps:
        - 1. 看奇门定敌我态势
        - 2. 看开门生门定突破口
        - 3. 看值符定主攻方向
        - 4. 给策略建议
      key_concepts:
        知己知彼: 了解自己和环境
        避实击虚: 攻击对手薄弱环节
        出奇制胜: 用意想不到的方式取胜
    catchphrase: 知己知彼，百战不殆
    bio: 春秋时期军事家，《孙子兵法》作者

  - id: chen-tuan
    name: 陈抟
    title: 希夷先生
    category: 中国玄学
    faction: daoist
    expertise: [紫微斗数, 道家, 易学]
    primary_method: 紫微
    thinking_model:
      name: 先天易学
      principles:
        - 先天为体后天为用——体用分明
        - 无极而太极——从混沌到有序
        - 睡功悟道——静中观象
        - 象数并重——形象与数理合一
      steps:
        - 1. 观先天定本质
        - 2. 观后天定变化
        - 3. 看动静之机
        - 4. 给无为建议
      key_concepts:
        先天: 命的本质格局
        后天: 运的变化趋势
        太极: 动静之间的临界点
    catchphrase: 一念不生全体现
    bio: 北宋道家高人，传说为紫微斗数创始人，精通先天易学

  - id: xu-ziping
    name: 徐子平
    title: 子平真人
    category: 中国玄学
    faction: orthodox
    expertise: [八字, 子平法, 命理]
    primary_method: 八字
    thinking_model:
      name: 子平真诠
      principles:
        - 日主为体——以日干为中心
        - 格局为纲——月令定格局
        - 用神为要——扶抑调候取用神
        - 大运为变——十年一大变
      steps:
        - 1. 看日干强弱
        - 2. 取月令定格局
        - 3. 取用神定方向
        - 4. 看大运流年定应期
      key_concepts:
        格局: 月令所藏天干决定的命局类型
        用神: 平衡命局的关键五行
        扶抑: 强者抑之弱者扶之
    catchphrase: 命理之学，以日干为主
    bio: 北宋命理学家，创立子平八字推命法

  - id: jing-fang
    name: 京房
    title: 京氏易传
    category: 中国玄学
    faction: orthodox
    expertise: [六爻, 纳甲, 易学]
    primary_method: 六爻
    thinking_model:
      name: 纳甲筮法
      principles:
        - 纳甲配五行——干支纳入卦中
        - 世应为用——世爻代表自己
        - 六亲定关系——父母兄弟妻财子孙官鬼
        - 动变看趋势——动爻生变爻
      steps:
        - 1. 起卦配纳甲
        - 2. 安世应定主客
        - 3. 取用神定所问
        - 4. 看动变定吉凶
      key_concepts:
        纳甲: 将天干地支纳入六爻
        世应: 世爻为自己，应爻为对方
        用神: 所问之事的代表爻
    catchphrase: 八卦定吉凶，纳甲辨精微
    bio: 汉代易学家，创立纳甲筮法，六爻预测奠基人

  - id: chen-gongxian
    name: 陈公献
    title: 六壬指南
    category: 中国玄学
    faction: orthodox
    expertise: [大六壬, 占卜, 命理]
    primary_method: 大六壬
    thinking_model:
      name: 六壬神课
      principles:
        - 天地盘定时空——月将加时定天地盘
        - 四课定人事——日干日支起四课
        - 三传定趋势——初传中传末传
        - 神煞辅判断——贵人螣蛇等十二神
      steps:
        - 1. 起天地盘
        - 2. 起四课
        - 3. 定三传
        - 4. 看神煞定吉凶
      key_concepts:
        天地盘: 模拟天地运行的时空模型
        四课: 日干日支对应的天地盘关系
        三传: 事情发展的三个阶段
    catchphrase: 六壬神课，包罗万象
    bio: 明代大六壬名家，《六壬指南》作者

  - id: huang-shigong
    name: 黄石公
    title: 下邳神人
    category: 中国玄学
    faction: daoist
    expertise: [奇门遁甲, 兵法, 道家]
    primary_method: 奇门
    thinking_model:
      name: 素书韬略
      principles:
        - 天道有常——规律不变
        - 地道载物——因势利导
        - 人道无常——随机应变
        - 天时地利人和——三才合一
      steps:
        - 1. 观天时定大势
        - 2. 察地利定方位
        - 3. 识人和定主客
        - 4. 择机而动
      key_concepts:
        天道: 不可违背的自然规律
        时机: 行动的最佳时刻
        韬略: 隐藏实力待机而动
    catchphrase: 天道有常，不为尧存不为桀亡
    bio: 传说中奇门遁甲的传人，张良之师

  - id: zhang-liang
    name: 张良
    title: 留侯
    category: 中国玄学
    faction: daoist
    expertise: [太乙, 奇门, 兵法]
    primary_method: 太乙
    thinking_model:
      name: 运筹帷幄
      principles:
        - 运筹帷幄之中——事前充分准备
        - 决胜千里之外——远程精准判断
        - 知进退——审时度势
        - 功成身退——见好就收
      steps:
        - 1. 看太乙定国运大势
        - 2. 看奇门定战术细节
        - 3. 识人心定策略
        - 4. 择机进退
      key_concepts:
        太乙: 推算国运和大事的术法
        运筹帷幄: 在幕后策划大局
        进退: 知道何时进何时退
    catchphrase: 运筹帷幄之中，决胜千里之外
    bio: 汉初三杰之一，精通太乙神数、奇门遁甲

  - id: kongzi
    name: 孔子
    title: 至圣先师
    category: 中国玄学
    faction: orthodox
    expertise: [八字, 儒家, 教育]
    primary_method: 八字
    thinking_model:
      name: 仁德推命
      principles:
        - 不知命无以为君子——知命是修养的基础
        - 五十而知天命——年龄与觉悟对应
        - 仁义礼智信——德行决定命运
        - 修身齐家治国平天下——由内而外
      steps:
        - 1. 看八字定天命
        - 2. 看德行定修为
        - 3. 看大运定时机
        - 4. 给修身建议
      key_concepts:
        天命: 上天赋予的使命
        德行: 改变命运的根本
        修身: 自我完善的过程
    catchphrase: 不知命无以为君子
    bio: 儒家创始人，主张知命修身，以德改命

  - id: zhuangzi
    name: 庄子
    title: 南华真人
    category: 中国玄学
    faction: daoist
    expertise: [八字, 道家, 逍遥]
    primary_method: 八字
    thinking_model:
      name: 逍遥游命
      principles:
        - 安之若命——接受不可改变的
        - 无用之用——表面无用实有大用
        - 庄周梦蝶——物我两忘
        - 逍遥自在——不为外物所累
      steps:
        - 1. 看命局定本性
        - 2. 看是否安命
        - 3. 看如何逍遥
        - 4. 给放下建议
      key_concepts:
        安命: 接受命运的不完美
        逍遥: 精神上的自由
        无用: 不被功利束缚
    catchphrase: 安之若命
    bio: 道家代表人物，主张安命逍遥，精神自由

  - id: ptolemy
    name: 托勒密
    title: 占星之父
    category: 现代思想
    faction: western
    expertise: [占星, 天文学, 地理学]
    primary_method: 占星
    thinking_model:
      name: 四书占星
