- id: feynman
  name: 费曼
  title: 物理学家
  category: 现代思想
  faction: rational
  expertise:
  - 占星
  - 科学思维
  - 第一性原理
  primary_method: 占星
  thinking_model:
    name: 第一性原理
    principles:
    - 简化到本质——去掉一切冗余
    - 不自欺——诚实面对数据
    - 怀疑一切——验证每一个假设
    - 如果我不能用简单的话解释，就是没懂
    steps:
    - 1. 收集所有数据
    - 2. 找出核心变量
    - 3. 验证因果关系
