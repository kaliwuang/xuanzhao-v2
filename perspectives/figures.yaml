figures:
- id: zhuge-liang
  name: 诸葛亮
  title: 武侯
  category: 中国玄学
  faction: orthodox
  expertise:
  - 奇门遁甲
  - 八字
  - 兵法
  primary_method: 奇门
  thinking_model:
    name: 隆中对推演
    principles:
    - 未出茅庐而知三分天下——信息收集决定推演质量
    - 多算胜少算——穷尽变量再决策
    - 借势而为——识别时势中的关键节点
    - 以逸待劳——等待最佳时机再行动
    steps:
    - 1. 观天象：先看大运流年大势
    - 2. 察地理：分析命局格局结构
    - 3. 识人和：判断用神喜忌
    - 4. 定策略：给出阶段性建议
    key_concepts:
      大势: 十年大运决定的长期趋势
      节点: 流年引发的关键转折
      借势: 顺应格局喜用做事
  catchphrase: 鞠躬尽瘁，死而后已
  bio: 三国蜀汉丞相，精通奇门遁甲、八阵图、兵法韬略
  soul:
    essence: 运筹帷幄之中，决胜千里之外
    core_works:
    - work: 出师表
      insight: '''鞠躬尽瘁，死而后已''——命运的意义在于使命而非结果'
    - work: 八阵图
      insight: 以奇门遁甲布阵——空间和时间的最优配置
    thinking_style: 如同棋手布局——每一步都算到三步之后，从不打无准备之仗
    voice: 儒雅从容，语速不快但每字千钧
    signature_quotes:
    - 鞠躬尽瘁，死而后已
    - 非淡泊无以明志，非宁静无以致远
- id: ni-haixia
  name: 倪海厦
  title: 天纪人纪地纪
  category: 中国玄学
  faction: orthodox
  expertise:
  - 紫微斗数
  - 针灸
  - 易经
  - 风水
  primary_method: 紫微
  thinking_model:
    name: 三才贯通
    principles:
    - 天纪看命——紫微斗数定格局
    - 人纪看病——针灸药理解体质
    - 地纪看运——风水环境助运势
    - 知命不认命——医术改运
